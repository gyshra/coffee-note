<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>커피 노트</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css"/>
  <link rel="stylesheet" href="common.css"/>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body>
  <div class="wrap home-wrap">
    <div class="logo-area home-logo-area">
      <div class="thick-rule"></div>
      <h1 class="logo home-logo-single">Coffee Note.</h1>
    </div>

    <div class="home-camera-block">
      <input type="file" id="homeCameraInput" class="home-camera-input" accept="image/*" capture="environment" tabindex="-1" aria-hidden="true"/>
      <button type="button" id="homeCameraBtn" class="home-camera-fab" aria-label="커피 사진 촬영">
        <span class="home-camera-fab-inner">
          <svg class="home-camera-svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.35" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>
            <circle cx="12" cy="13" r="4"/>
          </svg>
        </span>
      </button>
      <p class="home-camera-caption">커피를 촬영하세요</p>
      <p id="homeOcrStatus" class="home-ocr-status" aria-live="polite"></p>
    </div>

    <a href="index.html" class="home-search-link">또는 직접 검색</a>

    <section class="home-section" aria-labelledby="homeRecentHeading">
      <h2 id="homeRecentHeading" class="section-heading home-section-title">최근 센서리</h2>
      <div id="homeRecentStrip" class="home-recent-scroll"></div>
    </section>

    <section class="home-section" aria-labelledby="homeCalTitle">
      <div class="home-cal-head">
        <h2 id="homeCalTitle" class="section-heading home-section-title home-cal-month"></h2>
        <a href="notes.html" class="home-cal-link">전체보기 →</a>
      </div>
      <div class="home-cal-weekdays" id="homeCalWeekdays"></div>
      <div id="homeCalGrid" class="home-cal-grid"></div>
    </section>
  </div>

  <div id="globalToast" class="toast"></div>

  <nav id="bottomNav" class="bottom-nav">
    <a href="home.html" class="nav-item active" data-nav="home"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span class="nav-label">홈</span></a>
    <a href="index.html" class="nav-item" data-nav="search"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg><span class="nav-label">검색</span></a>
    <a href="notes.html" class="nav-item" data-nav="notes"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg><span class="nav-label">노트</span></a>
    <a href="#" class="nav-item" data-nav="map" onclick="CoffeeNote.openCoffeeMap();return false"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg><span class="nav-label">커피맵</span></a>
    <a href="mypage.html" class="nav-item" data-nav="mypage"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span class="nav-label">마이</span></a>
  </nav>

  <script src="common.js"></script>
  <script>
(function () {
  var CN = window.CoffeeNote;
  CN.renderBottomNav("home");

  function esc(s) {
    return String(s || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function textColorForBg(hex) {
    var h = String(hex || "").replace(/^#/, "");
    if (h.length !== 6) return "var(--text)";
    var r = parseInt(h.slice(0, 2), 16) / 255;
    var g = parseInt(h.slice(2, 4), 16) / 255;
    var b = parseInt(h.slice(4, 6), 16) / 255;
    var L = 0.2126 * r + 0.7152 * g + 0.0722 * b;
    return L > 0.55 ? "#121212" : "#F4F3F0";
  }

  var records = CN.getTastingRecords();
  var recentEl = document.getElementById("homeRecentStrip");

  if (!records.length) {
    recentEl.innerHTML = '<p class="home-recent-empty caption">아직 센서리 기록이 없습니다.</p>';
  } else {
    recentEl.innerHTML = records.slice(0, 5).map(function (r, i) {
      var bg = CN.getDominantColor(r);
      var fg = textColorForBg(bg);
      var dateStr = r.createdAt ? new Date(r.createdAt).toLocaleDateString("ko-KR", { month: "numeric", day: "numeric" }) : "";
      var stars = r.starRating != null && r.starRating !== "" ? Number(r.starRating).toFixed(1) : "—";
      return (
        '<button type="button" class="home-mini-card" data-idx="' + i + '" style="background-color:' + esc(bg) + ";color:" + fg + '">' +
        '<span class="home-mini-card-name">' + esc(r.coffeeName || "무제") + "</span>" +
        '<span class="home-mini-card-stars">★ ' + esc(String(stars)) + "</span>" +
        '<span class="home-mini-card-date">' + esc(dateStr) + "</span>" +
        "</button>"
      );
    }).join("");
    recentEl.querySelectorAll(".home-mini-card").forEach(function (btn) {
      btn.addEventListener("click", function () {
        location.href = "note-detail.html?idx=" + btn.getAttribute("data-idx");
      });
    });
  }

  var now = new Date();
  var y = now.getFullYear();
  var m = now.getMonth();
  document.getElementById("homeCalTitle").textContent = now.toLocaleDateString("ko-KR", { year: "numeric", month: "long" });

  var first = new Date(y, m, 1);
  var lastDay = new Date(y, m + 1, 0).getDate();
  var pad = first.getDay();
  var byDay = {};
  records.forEach(function (r) {
    if (!r.createdAt) return;
    var d = new Date(r.createdAt);
    if (d.getFullYear() !== y || d.getMonth() !== m) return;
    var day = d.getDate();
    if (!byDay[day]) byDay[day] = r;
  });

  var wd = ["일", "월", "화", "수", "목", "금", "토"];
  document.getElementById("homeCalWeekdays").innerHTML = wd.map(function (w) {
    return '<span class="home-cal-wd">' + esc(w) + "</span>";
  }).join("");

  var cells = [];
  for (var p = 0; p < pad; p++) {
    cells.push('<div class="home-cal-cell home-cal-cell--empty"></div>');
  }
  for (var day = 1; day <= lastDay; day++) {
    var rec = byDay[day];
    var dot = rec
      ? '<span class="home-cal-dot" style="background-color:' + esc(CN.getDominantColor(rec)) + '" title="' + esc(rec.coffeeName || "") + '"></span>'
      : "";
    cells.push(
      '<div class="home-cal-cell">' +
      '<span class="home-cal-daynum">' + day + "</span>" +
      dot +
      "</div>"
    );
  }
  document.getElementById("homeCalGrid").innerHTML = cells.join("");

  var camInput = document.getElementById("homeCameraInput");
  var camBtn = document.getElementById("homeCameraBtn");
  var ocrStatus = document.getElementById("homeOcrStatus");

  camBtn.addEventListener("click", function () {
    camInput.click();
  });

  camInput.addEventListener("change", function () {
    var file = camInput.files && camInput.files[0];
    camInput.value = "";
    if (!file) return;
    ocrStatus.textContent = "텍스트 인식 중…";
    camBtn.disabled = true;
    camBtn.setAttribute("aria-busy", "true");
    CN.recognizeImageText(file)
      .then(function (text) {
        ocrStatus.textContent = "";
        var q = (text || "").trim();
        if (!q) {
          CN.showToast("인식된 텍스트가 없습니다. 검색어를 입력해 보세요.");
          location.href = "index.html";
          return;
        }
        location.href = "index.html?q=" + encodeURIComponent(q);
      })
      .catch(function () {
        ocrStatus.textContent = "";
        CN.showToast("인식에 실패했습니다. 다시 시도하거나 검색으로 이동해 주세요.");
      })
      .then(function () {
        camBtn.disabled = false;
        camBtn.removeAttribute("aria-busy");
      });
  });
})();
  </script>
</body>
</html>
