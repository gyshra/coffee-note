<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="manifest" href="/manifest.json">
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>커피 노트</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css"/>
  <link rel="stylesheet" href="common.css"/>
  <style>
    .home-logo-area{padding:32px 0 8px;text-align:center;}
    .home-logo{font-family:'Playfair Display',serif;font-weight:900;font-size:32px;letter-spacing:-2px;color:var(--text);line-height:1;}
    .home-date{font-size:12px;color:var(--text-sub);margin-top:6px;font-weight:400;}

    /* ── 액션 영역 ── */
    .action-area{margin:20px 0 0;display:flex;flex-direction:column;gap:8px;}
    .action-btn-primary{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:18px;background:#121212;color:#fff;border:none;cursor:pointer;font-size:15px;font-weight:700;font-family:inherit;letter-spacing:.02em;transition:opacity .12s;}
    .action-btn-primary:active{opacity:.85;}
    .action-btn-secondary{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;background:#fff;color:#121212;border:1.5px solid #121212;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;transition:background .12s;}
    .action-btn-secondary:active{background:#F5F3F0;}

    /* ── 최근 원두 카드 ── */
    .recent-beans{margin-top:8px;display:flex;flex-direction:column;gap:6px;}
    .recent-bean-row{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border:0.5px solid #E0E0E0;}
    .recent-bean-info{min-width:0;}
    .recent-bean-name{font-size:13px;font-weight:700;color:#121212;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .recent-bean-meta{font-size:11px;color:#888;margin-top:2px;}
    .recent-bean-rebrew{flex-shrink:0;margin-left:12px;padding:7px 12px;background:#121212;color:#fff;border:none;font-size:11px;font-weight:600;font-family:inherit;cursor:pointer;white-space:nowrap;}
    .recent-bean-rebrew:active{opacity:.8;}

    /* ── 미니 센서리 카드 ── */
    .cards-section{margin-top:28px;}
    .cards-scroll{display:flex;gap:10px;overflow-x:auto;padding:4px 0 12px;-webkit-overflow-scrolling:touch;scroll-snap-type:x mandatory;}
    .cards-scroll::-webkit-scrollbar{display:none;}
    .mini-card{flex-shrink:0;width:140px;height:190px;background:#1a1812;position:relative;overflow:hidden;cursor:pointer;scroll-snap-align:start;transition:transform .12s ease;}
    .mini-card:active{transform:scale(.96);}
    .mc-wheel-ring{position:absolute;top:-20px;right:-20px;width:80px;height:80px;border-radius:50%;opacity:.15;pointer-events:none;}
    .mc-content{position:relative;z-index:1;height:100%;display:flex;flex-direction:column;justify-content:space-between;padding:14px 12px;}
    .mc-top{display:flex;justify-content:space-between;align-items:flex-start;}
    .mc-date{font-size:9px;color:rgba(244,243,240,0.4);}
    .mc-stars{display:flex;gap:1px;}
    .mc-star{width:8px;height:8px;}
    .mc-star polygon{fill:#8C7355;stroke:#8C7355;}
    .mc-bottom{}
    .mc-flavors{display:flex;gap:3px;margin-bottom:6px;}
    .mc-fdot{width:6px;height:6px;border-radius:50%;}
    .mc-name{font-size:12px;font-weight:600;color:#FFFFFF;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
    .mc-roaster{font-size:9px;color:rgba(244,243,240,0.4);margin-top:3px;}
    .mc-star-label{font-size:9px;font-weight:700;color:#8C7355;flex-shrink:0;}
    .mc-recipe{font-size:9px;color:rgba(244,243,240,0.38);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-style:italic;}

    /* 빈 카드 */
    .empty-card{flex-shrink:0;width:140px;height:190px;border:1.5px dashed var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;cursor:pointer;transition:border-color .15s;}
    .empty-card:active{border-color:var(--accent-warm);}
    .empty-card svg{color:var(--text-sub);}
    .empty-card-label{font-size:11px;color:var(--text-sub);text-align:center;line-height:1.4;}

    /* ── 달력 ── */
    .cal-section{margin-top:24px;padding-bottom:8px;}
    .cal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
    .cal-month-nav{display:flex;align-items:center;gap:12px;}
    .cal-month-btn{background:none;border:none;color:var(--text-sub);cursor:pointer;padding:4px;display:flex;}
    .cal-month-label{font-size:15px;font-weight:600;color:var(--text);min-width:90px;text-align:center;}
    .cal-cup-count{font-size:12px;color:var(--accent-warm);font-weight:500;}
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
    .cal-day-label{font-size:10px;text-align:center;color:var(--text-sub);padding:4px 0;font-weight:500;}
    .cal-cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text-sub);position:relative;border-radius:4px;}
    .cal-cell.empty{opacity:0;}
    .cal-cell.has-record{color:#fff;font-weight:600;font-size:10px;}
    .cal-cell.today{box-shadow:inset 0 0 0 1.5px var(--text);}
    .cal-dna{margin-top:14px;}
    .cal-dna-bar{display:flex;height:6px;border-radius:3px;overflow:hidden;}
    .cal-dna-seg{height:100%;}
    .cal-dna-legend{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
    .cal-dna-item{display:flex;align-items:center;gap:3px;font-size:10px;color:var(--text-sub);}
    .cal-dna-dot{width:6px;height:6px;border-radius:50%;}
    @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
    .ai-spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,0.15);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto;}
  </style>
  <link rel="stylesheet" href="app-shell.css">
  <link rel="stylesheet" href="feature-global-search.css">
</head>
<body>
  <div class="wrap">
    <!-- AI 분석 오버레이 -->
    <div id="aiOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:9999;flex-direction:column;align-items:center;justify-content:center;padding:20px"></div>
    <!-- 1. 로고 -->
    <div class="home-logo-area">
      <div class="home-logo">Coffee Note.</div>
      <div class="home-date" id="todayDate"></div>
    </div>

    <!-- 2. 액션 영역 -->
    <div class="action-area">
      <button class="action-btn-primary" onclick="location.href='brew.html'">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>
        내리기 시작하기
      </button>
      <button class="action-btn-secondary" onclick="location.href='bean-register.html'">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        새 원두 등록
      </button>
      <div class="recent-beans" id="recentBeans"></div>
    </div>

    <!-- 3. 나의 커피카드 -->
    <div class="cards-section">
      <p class="section-heading">나의 커피카드</p>
      <div class="cards-scroll" id="cardsScroll"></div>
    </div>

    <!-- 4. 캘린더 -->
    <div class="cal-section">
      <div class="cal-header">
        <div class="cal-month-nav">
          <button class="cal-month-btn" id="calPrev"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg></button>
          <span class="cal-month-label" id="calMonthLabel"></span>
          <button class="cal-month-btn" id="calNext"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg></button>
        </div>
        <span class="cal-cup-count" id="calCupCount"></span>
      </div>
      <div class="cal-grid" id="calGrid"></div>
      <div class="cal-dna" id="calDna"></div>
    </div>
  </div>

  <div id="globalToast" class="toast"></div>
  <nav id="bottomNav" class="bottom-nav">
    <a href="home.html" class="nav-item active" data-nav="home"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span class="nav-label">홈</span></a>
    <a href="index.html" class="nav-item" data-nav="search"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg><span class="nav-label">검색</span></a>
    <a href="notes.html" class="nav-item" data-nav="notes"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg><span class="nav-label">노트</span></a>
    <a href="mypage.html" class="nav-item" data-nav="mypage"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span class="nav-label">마이</span></a>
  </nav>

  <script src="common.js"></script>
  <script src="supabase.js"></script>
  <script type="module" src="/src/ui/global-search.js"></script>
  <script type="module" src="/src/pages/home.js"></script>
</body>
</html>
