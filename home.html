<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>커피 노트</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css"/>
  <link rel="stylesheet" href="common.css"/>
</head>
<body>
  <div class="wrap">
    <div class="logo-area">
      <div class="thick-rule"></div>
      <h1 class="logo">Coffee<br/>Note.</h1>
    </div>

    <div id="welcomeMsg" class="subtitle"></div>

    <!-- 최근 기록 -->
    <p class="section-heading">최근 기록</p>
    <div id="recentRecords"></div>

    <!-- 퀵 액션 -->
    <div style="margin-top:24px;display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <a href="index.html" class="btn-secondary" style="text-align:center;text-decoration:none;padding:14px">원두 검색</a>
      <a href="notes.html" class="btn-secondary" style="text-align:center;text-decoration:none;padding:14px">내 노트</a>
    </div>
  </div>

  <div id="globalToast" class="toast"></div>

  <nav id="bottomNav" class="bottom-nav">
    <a href="home.html" class="nav-item active" data-nav="home"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span class="nav-label">홈</span></a>
    <a href="index.html" class="nav-item" data-nav="search"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg><span class="nav-label">검색</span></a>
    <a href="notes.html" class="nav-item" data-nav="notes"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg><span class="nav-label">노트</span></a>
    <a href="#" class="nav-item" data-nav="map" onclick="CoffeeNote.openCoffeeMap();return false"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg><span class="nav-label">커피맵</span></a>
    <a href="mypage.html" class="nav-item" data-nav="mypage"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span class="nav-label">마이</span></a>
  </nav>

  <script src="common.js"></script>
  <script>
(function(){
  var CN=window.CoffeeNote;
  CN.renderBottomNav("home");

  var nick=CN.getNickname();
  var records=CN.getTastingRecords();
  document.getElementById("welcomeMsg").textContent=nick?(nick+"님, 오늘도 좋은 커피 한 잔"):"커피 한 잔의 여유를 기록하세요";

  function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

  var recent=document.getElementById("recentRecords");
  if(!records.length){
    recent.innerHTML='<div class="empty">아직 기록이 없습니다.<br/>검색에서 원두를 찾고 테이스팅을 시작해보세요.</div>';
  } else {
    recent.innerHTML=records.slice(0,3).map(function(r,i){
      var date=r.createdAt?new Date(r.createdAt).toLocaleDateString("ko-KR"):"";
      var flavors=(r.tasteTags||[]).slice(0,3).join(" · ");
      return '<div class="listCard card" style="cursor:pointer;margin-bottom:1px" data-ri="'+i+'">'+
        '<p class="card-title" style="font-size:15px">'+esc(r.coffeeName)+'</p>'+
        (flavors?'<p class="caption" style="margin-top:4px;color:var(--accent-warm)">'+esc(flavors)+'</p>':"")+
        '<p class="caption" style="margin-top:2px">'+esc(date)+'</p></div>';
    }).join("");
    recent.querySelectorAll("[data-ri]").forEach(function(el){
      el.addEventListener("click",function(){
        location.href="note-detail.html?idx="+el.getAttribute("data-ri");
      });
    });
  }
})();
  </script>
</body>
</html>
