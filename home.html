<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>커피 노트</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css"/>
  <link rel="stylesheet" href="common.css"/>
  <style>
    .home-logo-area{padding:32px 0 8px;text-align:center;}
    .home-logo{font-family:'Playfair Display',serif;font-weight:900;font-size:32px;letter-spacing:-2px;color:var(--text);line-height:1;}
    .home-date{font-size:12px;color:var(--text-sub);margin-top:6px;font-weight:400;}

    /* ── 오늘의 커피는? 카드 ── */
    .finder-card{background:#1a1812;color:#FFFFFF;padding:28px 24px 24px;margin:20px 0 0;position:relative;overflow:hidden;}
    .finder-bg{position:absolute;top:-30px;right:-30px;width:180px;height:180px;border-radius:50%;border:1.5px solid rgba(140,115,85,0.15);pointer-events:none;}
    .finder-bg2{position:absolute;top:-10px;right:-10px;width:120px;height:120px;border-radius:50%;border:1px solid rgba(140,115,85,0.08);pointer-events:none;}
    .finder-question{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;letter-spacing:-0.5px;line-height:1.3;position:relative;}
    .finder-sub{font-size:13px;color:rgba(244,243,240,0.5);margin-top:6px;position:relative;}
    .finder-actions{display:flex;gap:10px;margin-top:20px;position:relative;}
    .finder-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;padding:16px 8px;border:1px solid rgba(244,243,240,0.12);background:rgba(244,243,240,0.04);cursor:pointer;transition:background .15s ease,border-color .15s ease;}
    .finder-btn:active{background:rgba(244,243,240,0.1);border-color:rgba(140,115,85,0.4);}
    .finder-btn svg{color:rgba(244,243,240,0.7);}
    .finder-btn-label{font-size:11px;font-weight:500;color:rgba(244,243,240,0.6);}
    .finder-btn input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;}
    .finder-btn{position:relative;}

    /* ── 미니 센서리 카드 ── */
    .cards-section{margin-top:28px;}
    .cards-scroll{display:flex;gap:10px;overflow-x:auto;padding:4px 0 12px;-webkit-overflow-scrolling:touch;scroll-snap-type:x mandatory;}
    .cards-scroll::-webkit-scrollbar{display:none;}
    .mini-card{flex-shrink:0;width:140px;height:190px;background:#1a1812;position:relative;overflow:hidden;cursor:pointer;scroll-snap-align:start;transition:transform .12s ease;}
    .mini-card:active{transform:scale(.96);}
    .mc-wheel-ring{position:absolute;top:-20px;right:-20px;width:80px;height:80px;border-radius:50%;opacity:.15;pointer-events:none;}
    .mc-content{position:relative;z-index:1;height:100%;display:flex;flex-direction:column;justify-content:space-between;padding:14px 12px;}
    .mc-top{display:flex;justify-content:space-between;align-items:flex-start;}
    .mc-date{font-size:9px;color:rgba(244,243,240,0.4);}
    .mc-stars{display:flex;gap:1px;}
    .mc-star{width:8px;height:8px;}
    .mc-star polygon{fill:#8C7355;stroke:#8C7355;}
    .mc-bottom{}
    .mc-flavors{display:flex;gap:3px;margin-bottom:6px;}
    .mc-fdot{width:6px;height:6px;border-radius:50%;}
    .mc-name{font-size:12px;font-weight:600;color:#FFFFFF;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
    .mc-roaster{font-size:9px;color:rgba(244,243,240,0.4);margin-top:3px;}

    /* 빈 카드 */
    .empty-card{flex-shrink:0;width:140px;height:190px;border:1.5px dashed var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;cursor:pointer;transition:border-color .15s;}
    .empty-card:active{border-color:var(--accent-warm);}
    .empty-card svg{color:var(--text-sub);}
    .empty-card-label{font-size:11px;color:var(--text-sub);text-align:center;line-height:1.4;}

    /* ── 달력 ── */
    .cal-section{margin-top:24px;padding-bottom:8px;}
    .cal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
    .cal-month-nav{display:flex;align-items:center;gap:12px;}
    .cal-month-btn{background:none;border:none;color:var(--text-sub);cursor:pointer;padding:4px;display:flex;}
    .cal-month-label{font-size:15px;font-weight:600;color:var(--text);min-width:90px;text-align:center;}
    .cal-cup-count{font-size:12px;color:var(--accent-warm);font-weight:500;}
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
    .cal-day-label{font-size:10px;text-align:center;color:var(--text-sub);padding:4px 0;font-weight:500;}
    .cal-cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text-sub);position:relative;border-radius:4px;}
    .cal-cell.empty{opacity:0;}
    .cal-cell.has-record{color:#fff;font-weight:600;font-size:10px;}
    .cal-cell.today{box-shadow:inset 0 0 0 1.5px var(--text);}
    .cal-dna{margin-top:14px;}
    .cal-dna-bar{display:flex;height:6px;border-radius:3px;overflow:hidden;}
    .cal-dna-seg{height:100%;}
    .cal-dna-legend{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
    .cal-dna-item{display:flex;align-items:center;gap:3px;font-size:10px;color:var(--text-sub);}
    .cal-dna-dot{width:6px;height:6px;border-radius:50%;}
    @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
    .ai-spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,0.15);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto;}
  </style>
  <link rel="stylesheet" href="common.css">
  <link rel="stylesheet" href="app-shell.css">
  <link rel="stylesheet" href="feature-global-search.css">  <!-- ★ 추가 -->
</head>
<body>
  <div class="wrap">
    <!-- AI 분석 오버레이 -->
    <div id="aiOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:9999;flex-direction:column;align-items:center;justify-content:center;padding:20px"></div>
    <!-- 1. 로고 -->
    <div class="home-logo-area">
      <div class="home-logo">Coffee Note.</div>
      <div class="home-date" id="todayDate"></div>
    </div>

    <!-- 2. 오늘의 커피는? -->
    <div class="finder-card">
      <div class="finder-bg"></div>
      <div class="finder-bg2"></div>
      <div class="finder-question">오늘의 커피는<br/>어떤 맛인가요?</div>
      <div class="finder-sub">사진 한 장이면 충분해요</div>
      <div class="finder-actions">
        <div class="finder-btn" id="btnCamera" onclick="CoffeeNote.openGlobalSearch('camera')"">
          <input type="file" accept="image/*" capture="environment" id="camInput" style="display:none"/>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
          <span class="finder-btn-label">촬영</span>
        </div>
        <div class="finder-btn" id="btnGallery" onclick="CoffeeNote.openGlobalSearch('camera')"">
          <input type="file" accept="image/*" id="galInput" style="display:none"/>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          <span class="finder-btn-label">갤러리</span>
        </div>
        <div class="finder-btn" onclick="CoffeeNote.openGlobalSearch()"'">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
          <span class="finder-btn-label">직접 기록</span>
        </div>
        <div class="finder-btn" onclick="CoffeeNote.openGlobalSearch()"">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
          <span class="finder-btn-label">검색</span>
        </div>
      </div>
    </div>

    <!-- 3. 나의 커피카드 -->
    <div class="cards-section">
      <p class="section-heading">나의 커피카드</p>
      <div class="cards-scroll" id="cardsScroll"></div>
    </div>

    <!-- 4. 캘린더 -->
    <div class="cal-section">
      <div class="cal-header">
        <div class="cal-month-nav">
          <button class="cal-month-btn" id="calPrev"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg></button>
          <span class="cal-month-label" id="calMonthLabel"></span>
          <button class="cal-month-btn" id="calNext"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg></button>
        </div>
        <span class="cal-cup-count" id="calCupCount"></span>
      </div>
      <div class="cal-grid" id="calGrid"></div>
      <div class="cal-dna" id="calDna"></div>
    </div>
  </div>

  <div id="globalToast" class="toast"></div>
  <nav id="bottomNav" class="bottom-nav">
    <a href="home.html" class="nav-item active" data-nav="home"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span class="nav-label">홈</span></a>
    <a href="index.html" class="nav-item" data-nav="search"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg><span class="nav-label">검색</span></a>
    <a href="notes.html" class="nav-item" data-nav="notes"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg><span class="nav-label">노트</span></a>
    <a href="#" class="nav-item" data-nav="map" onclick="CoffeeNote.openCoffeeMap();return false"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg><span class="nav-label">커피맵</span></a>
    <a href="mypage.html" class="nav-item" data-nav="mypage"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span class="nav-label">마이</span></a>
  </nav>

  <script src="common.js"></script>
  <script src="shared-utils.js"></script>
  <script>
(function(){
  var CN=window.CoffeeNote;
  CN.renderBottomNav("home");

  // 오늘 날짜
  var now=new Date();
  var days=["일","월","화","수","목","금","토"];
  document.getElementById("todayDate").textContent=
    now.getFullYear()+"년 "+(now.getMonth()+1)+"월 "+now.getDate()+"일 "+days[now.getDay()]+"요일";

  // 카메라/갤러리 → common.js OCR 시트 (index.html과 동일한 흐름)
  function handlePhoto(file){
    if(!file)return;
    // OCR 시트를 열고 파일을 바로 처리하도록 이벤트 전달
    CN.openPhotoSearchSheet();
    // 파일을 시트의 file input에 주입
    setTimeout(function(){
      var galEl = document.getElementById("fileGallery");
      var camEl = document.getElementById("fileCamera");
      if(!galEl && !camEl){ return; }
      // DataTransfer로 파일 주입
      try {
        var dt = new DataTransfer();
        dt.items.add(file);
        var inputEl = galEl || camEl;
        inputEl.files = dt.files;
        inputEl.dispatchEvent(new Event("change",{bubbles:true}));
      } catch(ex) {
        // DataTransfer 미지원 브라우저 → 시트만 열기 (수동 선택)
        CN.showToast("이미지를 다시 선택해주세요.");
      }
    }, 200);
  }

  function showAnalyzing(){
    var ol=document.getElementById("aiOverlay");
    if(!ol)return;
    ol.innerHTML='<div style="text-align:center;color:#fff"><div class="ai-spinner"></div><p style="font-size:18px;font-weight:600;margin-top:20px">이미지 분석 중...</p><p style="font-size:13px;opacity:.5;margin-top:8px">잠시만 기다려주세요</p></div>';
    ol.style.display="flex";
  }
  function hideAnalyzing(){var ol=document.getElementById("aiOverlay");if(ol)ol.style.display="none";}

  function showAiResult(ai, photoUrl){
    var flavors=(ai.predictedFlavors||[]).slice(0,5);
    var flavorTags=flavors.map(function(f){return'<span style="display:inline-flex;align-items:center;gap:4px;font-size:14px"><span style="width:8px;height:8px;border-radius:50%;background:'+getCatColor(f.category)+'"></span>'+esc(f.ko)+'</span>';}).join("&nbsp;&nbsp;");
    var scores=ai.predictedScores||{};
    var scoreList=["아로마","산미","단맛","바디감","여운"].map(function(k){return'<div style="display:flex;justify-content:space-between;font-size:13px;padding:4px 0"><span style="opacity:.6">'+k+'</span><span style="font-weight:600">'+esc(scores[k]||"—")+'</span></div>';}).join("");

    var h='<div style="max-width:360px;width:100%;max-height:90vh;overflow-y:auto;background:#1a1812;color:#fff;padding:28px 24px">';
    if(photoUrl) h+='<img src="'+esc(photoUrl)+'" style="width:100%;height:160px;object-fit:cover;margin-bottom:16px"/>';
    h+='<p style="font-size:11px;opacity:.4;margin-bottom:4px">AI 분석 결과</p>';
    h+='<p style="font-size:22px;font-weight:700;line-height:1.3;margin-bottom:4px">'+esc(ai.name||"알 수 없는 원두")+'</p>';
    h+='<p style="font-size:13px;opacity:.5;margin-bottom:16px">'+esc(ai.roaster||"")+(ai.country?" · "+esc(ai.country):"")+'</p>';

    if(ai.confidence){var confPct=Math.max(0,Math.min(100,parseInt(ai.confidence)||0));h+='<div style="display:flex;align-items:center;gap:6px;margin-bottom:16px"><div style="flex:1;height:4px;background:rgba(255,255,255,0.1);border-radius:2px"><div style="height:100%;width:'+confPct+'%;background:#8C7355;border-radius:2px"></div></div><span style="font-size:11px;opacity:.5">신뢰도 '+confPct+'%</span></div>';}

    h+='<p style="font-size:12px;opacity:.4;margin-bottom:8px;font-weight:500">AI의 맛 예측</p>';
    h+='<div style="margin-bottom:16px">'+flavorTags+'</div>';
    h+='<div style="margin-bottom:20px;border-top:1px solid rgba(255,255,255,0.08);padding-top:12px">'+scoreList+'</div>';

    if(ai.description) h+='<p style="font-size:13px;opacity:.5;line-height:1.6;margin-bottom:20px">'+esc(ai.description)+'</p>';

    h+='<div style="display:flex;gap:10px">';
    h+='<button onclick="goTasting()" style="flex:1;padding:16px;background:#fff;color:#121212;border:none;font-size:15px;font-weight:600;cursor:pointer">마시고 기록하기</button>';
    h+='<button onclick="hideAnalyzing()" style="padding:16px 20px;background:none;border:1px solid rgba(255,255,255,.2);color:#fff;font-size:14px;cursor:pointer">닫기</button>';
    h+='</div></div>';

    document.getElementById("aiOverlay").innerHTML=h;
  }

  function getCatColor(cat){
    var c={"Fruity":"#E83D51","Floral":"#E75480","Sweet":"#F19A38","Nutty/Cocoa":"#8B6A3E","Spices":"#A0522D","Roasted":"#7B5B3A","Green/Vegetative":"#5A9E6F","Sour/Fermented":"#E8A836","Other":"#7BAFB0"};
    return c[cat]||"#999";
  }

  window.goTasting=function(){
    hideAnalyzing();
    location.href="tasting.html";
  };

  document.getElementById("camInput").addEventListener("change",function(){handlePhoto(this.files[0]);});
  document.getElementById("galInput").addEventListener("change",function(){handlePhoto(this.files[0]);});

  // OCR 결과를 index.html로 전달 (검색 화면에서 결과 표시)
  document.addEventListener("coffeeNote:ocrText", function(e){
    var detail = e.detail||{};
    var coffee = detail.coffee||null;
    if(coffee && coffee.name){
      try{ sessionStorage.setItem("ocr_pending", JSON.stringify({coffee:coffee,text:coffee.name})); }catch(ex){}
    }
    CN.closePhotoSearchSheet();
    location.href = "index.html?from=ocr";
  });
  document.getElementById("galInput").addEventListener("change",function(){handlePhoto(this.files[0]);});

  // 미니 커피카드
  var records=CN.getTastingRecords();
  var scroll=document.getElementById("cardsScroll");
  var cardImages={};
  try{cardImages=JSON.parse(localStorage.getItem("cardImages")||"{}");}catch(e){}

  if(!records.length){
    scroll.innerHTML=
      '<div class="empty-card" onclick="location.href=\'tasting.html\'">'+
      '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>'+
      '<span class="empty-card-label">첫 번째 커피를<br/>기록해보세요</span></div>'+
      '<div class="empty-card" style="border-style:dotted;opacity:.5"></div>'+
      '<div class="empty-card" style="border-style:dotted;opacity:.3"></div>';
  } else {
    var html=records.slice(0,10).map(function(r,i){
      var hasImg=!!cardImages[i];
      if(hasImg){
        return '<div class="mini-card" data-ri="'+i+'" style="padding:0"><img src="'+cardImages[i]+'" style="width:100%;height:100%;object-fit:cover;display:block"/></div>';
      }
      var color=CN.getDominantColor(r);
      var date=r.createdAt?new Date(r.createdAt).toLocaleDateString("ko-KR",{month:"short",day:"numeric"}):"";
      var flavors=(r.flavorSelections||[]).slice(0,3);
      return '<div class="mini-card" data-ri="'+i+'">'+
        '<div class="mc-wheel-ring" style="border:8px solid '+color+';border-radius:50%"></div>'+
        '<div class="mc-content"><div class="mc-top"><div class="mc-date">'+esc(date)+'</div></div>'+
        '<div class="mc-bottom"><div class="mc-flavors">'+flavors.map(function(f){return'<div class="mc-fdot" style="background:'+(f.color||color)+'"></div>';}).join("")+'</div>'+
        '<div class="mc-name">'+esc(r.coffeeName)+'</div>'+
        '</div></div></div>';
    }).join("");
    // 끝에 + 카드
    html+='<div class="empty-card" onclick="location.href=\'tasting.html\'" style="background:var(--bg)">'+
      '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>'+
      '<span class="empty-card-label">새 기록</span></div>';
    scroll.innerHTML=html;
    scroll.querySelectorAll("[data-ri]").forEach(function(el){
      el.addEventListener("click",function(){location.href="note-detail.html?idx="+el.getAttribute("data-ri");});
    });
  }

  // 달력
  var calYear=now.getFullYear(), calMonth=now.getMonth();

  function renderCalendar(){
    var yr=calYear, mo=calMonth;
    document.getElementById("calMonthLabel").textContent=yr+"."+(mo<9?"0":"")+(mo+1);
    var firstDay=new Date(yr,mo,1).getDay();
    var daysInMonth=new Date(yr,mo+1,0).getDate();
    var today=(yr===now.getFullYear()&&mo===now.getMonth())?now.getDate():-1;

    // 해당 월 기록 색상
    var dayColors={}, dayCount=0;
    records.forEach(function(r){
      if(!r.createdAt)return;
      var d=new Date(r.createdAt);
      if(d.getFullYear()===yr&&d.getMonth()===mo){
        dayColors[d.getDate()]=CN.getDominantColor(r);
        dayCount++;
      }
    });
    document.getElementById("calCupCount").textContent=dayCount?dayCount+" cups":"";

    var grid=document.getElementById("calGrid");
    var dayLabels=["일","월","화","수","목","금","토"];
    var h=dayLabels.map(function(d){return'<div class="cal-day-label">'+d+'</div>';}).join("");
    for(var b=0;b<firstDay;b++) h+='<div class="cal-cell empty"></div>';
    for(var d=1;d<=daysInMonth;d++){
      var has=!!dayColors[d];
      var cls="cal-cell"+(has?" has-record":"")+(d===today?" today":"");
      h+='<div class="'+cls+'"'+(has?' style="background:'+dayColors[d]+'"':"")+'>'+d+'</div>';
    }
    grid.innerHTML=h;

    // Flavor DNA 바
    var dna=document.getElementById("calDna");
    if(!dayCount){dna.innerHTML="";return;}
    var catCount={};
    records.forEach(function(r){
      if(!r.createdAt)return;
      var d=new Date(r.createdAt);
      if(d.getFullYear()!==yr||d.getMonth()!==mo)return;
      var sels=r.flavorSelections||[];
      sels.forEach(function(f){var c=f.category||"Other";catCount[c]=(catCount[c]||0)+1;});
    });
    var CAT_COLORS={"Fruity":"#E83D51","Floral":"#E75480","Sweet":"#F19A38","Nutty/Cocoa":"#8B6A3E","Spices":"#A0522D","Roasted":"#7B5B3A","Green/Vegetative":"#5A9E6F","Sour/Fermented":"#E8A836","Other":"#7BAFB0"};
    var CAT_KO={"Fruity":"과일","Floral":"꽃","Sweet":"단맛","Nutty/Cocoa":"견과","Spices":"향신료","Roasted":"로스팅","Green/Vegetative":"풀","Sour/Fermented":"산미","Other":"기타"};
    var total=0;for(var c in catCount)total+=catCount[c];
    if(!total){dna.innerHTML="";return;}

    var sorted=Object.keys(catCount).sort(function(a,b){return catCount[b]-catCount[a];});
    var barHtml='<div class="cal-dna-bar">'+sorted.map(function(c){
      var pct=Math.round(catCount[c]/total*100);
      return'<div class="cal-dna-seg" style="background:'+(CAT_COLORS[c]||"#999")+';width:'+pct+'%"></div>';
    }).join("")+'</div>';
    var legHtml='<div class="cal-dna-legend">'+sorted.slice(0,4).map(function(c){
      var pct=Math.round(catCount[c]/total*100);
      return'<span class="cal-dna-item"><span class="cal-dna-dot" style="background:'+(CAT_COLORS[c]||"#999")+'"></span>'+(CAT_KO[c]||c)+' '+pct+'%</span>';
    }).join("")+'</div>';
    dna.innerHTML=barHtml+legHtml;
  }

  document.getElementById("calPrev").addEventListener("click",function(){calMonth--;if(calMonth<0){calMonth=11;calYear--;}renderCalendar();});
  document.getElementById("calNext").addEventListener("click",function(){calMonth++;if(calMonth>11){calMonth=0;calYear++;}renderCalendar();});
  renderCalendar();
})();
  </script>
  <script src="common.js"></script>
  <script src="supabase.js"></script>
  <script src="feature-image-compress.js"></script>
  <script src="feature-global-search.js"></script>
</body>
</html>
