<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>테이스팅 기록 — 커피 노트</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
  <link rel="stylesheet" href="common.css" />
</head>
<body>
  <div class="wrap">
    <header class="pageHeader">
      <button type="button" class="backBtn" id="btnBack" aria-label="뒤로가기">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      </button>
      <h1 class="title">테이스팅 기록</h1>
    </header>

    <div id="missingCoffee" class="empty" style="display:none">원두 정보를 찾을 수 없습니다.</div>

    <div id="tastingMain" style="display:none">
      <div class="summaryCard" id="coffeeSummary"></div>
      <hr class="thin-rule" />

      <section id="step1" class="step-section revealed">
        <h2 class="section-heading">향미 선택</h2>
        <p class="step-desc">휠을 돌리고, 중분류를 탭하여 소분류를 선택하세요</p>
        <div class="wheel-viewport" id="wheelViewport">
          <svg id="wheelSvg" xmlns="http://www.w3.org/2000/svg"></svg>
        </div>
        <div class="selected-flavors" id="selectedFlavors">
          <p class="empty-flavors" id="emptyFlavorsMsg">휠에서 향미를 탭하여 선택하세요</p>
        </div>
      </section>

      <section id="step2" class="step-section">
        <hr class="thin-rule" />
        <h2 class="section-heading">향미 강도</h2>
        <p class="step-desc">각 향미를 얼마나 강하게 느꼈나요?</p>
        <div id="flavorSliders"></div>
      </section>

      <section id="step3" class="step-section">
        <hr class="thin-rule" />
        <h2 class="section-heading">기본 감각</h2>
        <p class="step-desc">핸들을 드래그하여 조절하세요</p>
        <div class="pentagon-radar" id="pentagonRadar">
          <svg id="pentaSvg" xmlns="http://www.w3.org/2000/svg"></svg>
        </div>
        <div id="baseSenseMemos" class="base-sense-list"></div>
        <div class="compare-toggle">
          <span>커뮤니티와 비교</span>
          <button type="button" class="toggle-switch" id="btnCompare" aria-pressed="false"><span class="toggle-thumb"></span></button>
        </div>
      </section>

      <section id="step4" class="step-section">
        <hr class="thin-rule" />
        <h2 class="section-heading">추출 방법</h2>
        <div class="chipWrap" id="brewChips"></div>
        <div id="shopBrewWrap" class="shop-brew-wrap" style="display:none">
          <p class="step-desc">매장에서 어떤 방식으로 추출된 커피인가요?</p>
          <div class="chipWrap" id="shopBrewChips"></div>
        </div>
        <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap">
          <button type="button" class="btn-secondary recipe-add-btn" id="btnAddRecipe" style="display:none;width:auto;padding:10px 18px;font-size:13px">+ 새 레시피 입력</button>
          <button type="button" class="btn-secondary recipe-add-btn" id="btnLoadRecipe" style="display:none;width:auto;padding:10px 18px;font-size:13px">기존 레시피 불러오기</button>
        </div>
        <div id="recipeArea" style="display:none">
          <div class="recipe-form">
            <div class="recipe-field"><label>물 온도</label><input type="text" id="recipeTemp" placeholder="예: 93°C"/></div>
            <div class="recipe-field"><label>물 양 (총량)</label><input type="text" id="recipeWater" placeholder="예: 250ml"/></div>
            <div class="recipe-field"><label>원두 양</label><input type="text" id="recipeDose" placeholder="예: 15g"/></div>
            <div class="recipe-field"><label>그라인딩</label><input type="text" id="recipeGrind" placeholder="예: 코만단테 24클릭"/></div>
            <h3 class="section-heading" style="margin-top:16px">추출 단계</h3>
            <div id="tastingPourSteps"></div>
            <button type="button" class="btn-secondary" id="btnAddPourStep" style="margin-top:8px;width:auto;padding:8px 16px;font-size:13px">+ 단계 추가</button>
            <div class="recipe-field" style="margin-top:12px"><label>추출 메모</label><textarea id="recipeNote" placeholder="전체적인 추출 팁"></textarea></div>
          </div>
        </div>
        <h2 class="section-heading">장소</h2>
        <div class="location-bar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
          <input type="text" id="locationInput" placeholder="카페 이름 또는 장소"/>
        </div>
        <h2 class="section-heading">사진</h2>
        <div class="photo-upload-area">
          <div class="photo-grid" id="photoGrid"></div>
          <label class="photo-add-btn"><input type="file" accept="image/*" multiple id="photoFileInput" style="display:none"/><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>사진 추가 (최대 3장)</label>
        </div>
        <h2 class="section-heading">메모</h2>
        <textarea id="memo" placeholder="오늘의 커피 경험을 자유롭게 기록하세요"></textarea>
        <h2 class="section-heading">별점</h2>
        <p class="step-desc">이 커피의 전반적인 만족도</p>
        <div class="star-rating-input" id="starRating"></div>
        <div class="star-rating-label" id="starLabel">탭하여 별점을 선택하세요</div>
        <button type="button" class="btn-primary" id="btnSaveFinal" style="margin-top:24px">기록 저장</button>
      </section>
    </div>
  </div>
  <div id="globalToast" class="toast"></div>

  <!-- 센서리 카드 프리뷰 -->
  <div id="cardOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:9999;display:none;flex-direction:column;align-items:center;justify-content:center;padding:20px">
    <img id="cardPreview" style="max-width:100%;max-height:70vh;box-shadow:0 8px 40px rgba(0,0,0,0.4)"/>
    <div style="display:flex;gap:12px;margin-top:20px">
      <button type="button" id="btnShareCard" style="padding:14px 32px;background:#fff;color:#121212;border:none;font-size:15px;font-weight:600;font-family:'Pretendard Variable',sans-serif;cursor:pointer">공유하기</button>
      <button type="button" id="btnCloseCard" style="padding:14px 32px;background:transparent;color:#fff;border:1px solid rgba(255,255,255,0.3);font-size:15px;font-weight:500;font-family:'Pretendard Variable',sans-serif;cursor:pointer">닫기</button>
    </div>
  </div>
    <nav id="bottomNav" class="bottom-nav">
    <a href="home.html" class="nav-item" data-nav="home"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span class="nav-label">홈</span></a>
    <a href="index.html" class="nav-item" data-nav="search"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg><span class="nav-label">검색</span></a>
    <a href="notes.html" class="nav-item" data-nav="notes"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg><span class="nav-label">노트</span></a>
    <a href="#" class="nav-item" data-nav="map" onclick="CoffeeNote.openCoffeeMap();return false"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg><span class="nav-label">커피맵</span></a>
    <a href="mypage.html" class="nav-item" data-nav="mypage"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span class="nav-label">마이</span></a>
  </nav>
  <script src="common.js"></script>
  <script src="tasting-wheel.js"></script>
  <script src="tasting-radar.js"></script>
  <script src="card-generator.js"></script>
  <script>
(function(){
  var CN=window.CoffeeNote;
  CN.renderBottomNav(null);
  var params=new URLSearchParams(location.search);
  var coffeeId=params.get("coffeeId");
  var idx=coffeeId!=null&&coffeeId!==""?Number(coffeeId):NaN;
  var coffee=CN.getCoffeeByIndex(idx);
  var BREW=["매장 음료","생략","V60","칼리타","케멕스","에어로프레스","프렌치프레스","에스프레소","콜드브루","모카포트","클레버"];
  var SHOP_BREW=["모르겠음","핸드드립","에스프레소","콜드브루","사이폰","더치","기타"];
  var selectedShopBrew="";
  var flavorIntensities={},flavorMemos={},baseMemos={},photos=[],starVal=0,pentaChart=null;
  document.getElementById("btnBack").addEventListener("click",function(){if(history.length>1)history.back();else location.href="notes.html";});
  function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

  var editIdx=params.get("editIdx")!=null?Number(params.get("editIdx")):NaN;
  var editRecord=Number.isInteger(editIdx)?CN.getTastingRecords()[editIdx]:null;
  var isEditMode=!!editRecord;

  function initWithCoffee(c, i) {
    coffee = c; idx = i;
    document.getElementById("missingCoffee").style.display="none";
    document.getElementById("tastingMain").style.display="block";
    document.getElementById("coffeeSummary").innerHTML=
      '<div style="display:flex;justify-content:space-between;align-items:flex-start">'+
      '<div><p class="card-title">'+esc(c.name)+'</p><p class="caption" style="margin-top:8px">'+esc(c.roaster||"")+'</p></div>'+
      '<button type="button" class="btn-secondary" style="width:auto;padding:8px 14px;font-size:12px;flex-shrink:0" id="btnChangeCoffee">변경</button></div>'+
      '<div class="tagWrap" style="margin-top:12px">'+(c.notes||[]).slice(0,5).map(function(n){return'<span class="tag">'+esc(n)+'</span>';}).join("")+'</div>';
    document.getElementById("btnChangeCoffee").addEventListener("click",function(){
      CN.openCoffeeSearch(function(result){initWithCoffee(result.coffee, result.index);});
    });
    initTastingUI();
    if(isEditMode) prefillFromRecord(editRecord);
  }

  // 수정 모드: 기존 데이터 프리필
  function prefillFromRecord(r) {
    // 향미 선택 복원
    if(r.flavorSelections&&r.flavorSelections.length){
      CoffeeWheel.setSelectedFlavors(r.flavorSelections);
      revealSection("step2");revealSection("step3");revealSection("step4");
      renderFlavorSliders(r.flavorSelections);
    }
    // 향미 강도
    if(r.flavorIntensities) flavorIntensities=Object.assign({},r.flavorIntensities);
    if(r.flavorMemos) flavorMemos=Object.assign({},r.flavorMemos);
    // 기본감각
    if(r.baseScores&&pentaChart) pentaChart.setValues(r.baseScores);
    if(r.baseMemos) baseMemos=Object.assign({},r.baseMemos);
    // 추출방법
    if(r.brewMethod){var chip=document.querySelector('#brewChips .chip[data-brew="'+r.brewMethod+'"]');if(chip)chip.click();}
    else if(r.shopBrewMethod){var sc=document.querySelector('#brewChips .chip[data-brew="매장 음료"]');if(sc)sc.click();setTimeout(function(){var sb=document.querySelector('#shopBrewChips .chip[data-sbrew="'+r.shopBrewMethod+'"]');if(sb)sb.click();},100);}
    // 레시피
    if(r.recipe){
      document.getElementById("recipeArea").style.display="block";
      document.getElementById("recipeTemp").value=r.recipe.temp||"";
      document.getElementById("recipeWater").value=r.recipe.water||"";
      document.getElementById("recipeDose").value=r.recipe.dose||"";
      document.getElementById("recipeGrind").value=r.recipe.grind||"";
      document.getElementById("recipeNote").value=r.recipe.note||"";
      if(r.recipe.steps&&r.recipe.steps.length){
        document.getElementById("tastingPourSteps").innerHTML="";tastingStepCount=0;
        r.recipe.steps.forEach(function(s){addTastingPourStep();var last=document.querySelector("#tastingPourSteps .pour-step-input:last-child");if(last){last.querySelector(".psi-time").value=s.time||"";last.querySelector(".psi-amount").value=s.amount||"";last.querySelector(".psi-tip").value=s.tip||"";}});
      }
    }
    // 장소, 메모, 별점, 사진
    if(r.location) document.getElementById("locationInput").value=r.location;
    if(r.memo) document.getElementById("memo").value=r.memo;
    if(r.starRating){starVal=r.starRating;renderStars();}
    if(r.photos&&r.photos.length){photos=r.photos.slice();renderPhotos();}
    // 슬라이더 값 복원
    if(r.flavorSelections) renderFlavorSliders(r.flavorSelections);
    // 저장 버튼 텍스트 변경
    document.getElementById("btnSaveFinal").textContent="수정 저장";
  }

  if(isEditMode){
    // 수정 모드: 기존 기록의 원두로 시작
    var editCoffee=CN.getCoffeeByIndex(editRecord.coffeeIndex);
    if(editCoffee) initWithCoffee(editCoffee, editRecord.coffeeIndex);
    else initWithCoffee({name:editRecord.coffeeName||"",source:"direct_input"}, -1);
  } else if(coffee){
    initWithCoffee(coffee, idx);
  } else {
    document.getElementById("missingCoffee").style.display="none";
    document.getElementById("tastingMain").style.display="none";
    CN.openCoffeeSearch(function(result){
      initWithCoffee(result.coffee, result.index);
    });
  }

  function initTastingUI(){

  CoffeeWheel.init({svgId:"wheelSvg",viewportId:"wheelViewport",onSelectionChange:function(flavors){
    if(flavors.length>0){revealSection("step2");revealSection("step3");revealSection("step4");}
    renderFlavorSliders(flavors);
  }});

  function renderFlavorSliders(flavors){
    var w=document.getElementById("flavorSliders");
    w.innerHTML=flavors.map(function(f){var v=flavorIntensities[f.en]||5;var hm=!!(flavorMemos[f.en]&&flavorMemos[f.en].trim());
      return'<div class="flavor-slider-group"><div class="flavor-slider-row"><span class="fs-color" style="background:'+esc(f.color)+'"></span><span class="fs-name">'+esc(f.ko)+'</span><div class="fs-track"><input type="range" class="fs-input" min="1" max="10" value="'+v+'" step="1" data-en="'+esc(f.en)+'"></div><span class="fs-val" id="fv-'+esc(f.en)+'">'+v+'</span><button type="button" class="fs-memo-btn'+(hm?" has-memo":"")+'" data-memo-en="'+esc(f.en)+'"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg></button></div><div class="fs-memo-area" id="fmemo-'+esc(f.en)+'" style="display:none"><textarea class="fs-memo-input" data-memo-for="'+esc(f.en)+'" placeholder="이 향미에 대한 메모">'+esc(flavorMemos[f.en]||"")+'</textarea></div></div>';
    }).join("");
    w.querySelectorAll(".fs-input").forEach(function(inp){inp.addEventListener("input",function(){var en=inp.getAttribute("data-en");flavorIntensities[en]=Number(inp.value);var ve=document.getElementById("fv-"+en);if(ve)ve.textContent=inp.value;});});
    w.querySelectorAll(".fs-memo-btn").forEach(function(b){b.addEventListener("click",function(){var en=b.getAttribute("data-memo-en");var a=document.getElementById("fmemo-"+en);if(a)a.style.display=a.style.display==="none"?"block":"none";});});
    w.querySelectorAll(".fs-memo-input").forEach(function(ta){ta.addEventListener("input",function(){var en=ta.getAttribute("data-memo-for");flavorMemos[en]=ta.value;var b=w.querySelector('[data-memo-en="'+en+'"]');if(b)b.classList.toggle("has-memo",!!ta.value.trim());});});
  }

  pentaChart=CoffeeRadar.createInteractive({svgId:"pentaSvg",onChange:function(v){renderBaseMemos(v);}});
  function renderBaseMemos(vals){
    var w=document.getElementById("baseSenseMemos");
    w.innerHTML=CoffeeRadar.AXES.map(function(ax){var v=(vals&&vals[ax])||5;var hm=!!(baseMemos[ax]&&baseMemos[ax].trim());
      return'<div class="base-sense-item"><div class="bs-header"><span class="bs-name">'+esc(ax)+'</span><span class="bs-val">'+v+'</span><button type="button" class="bs-memo-btn'+(hm?" has-memo":"")+'" data-bs="'+esc(ax)+'"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg></button></div><div class="bs-memo-area" id="bsmemo-'+esc(ax)+'" style="display:none"><textarea class="bs-memo-input" data-bs-for="'+esc(ax)+'" placeholder="'+esc(ax)+'에 대한 메모">'+esc(baseMemos[ax]||"")+'</textarea></div></div>';
    }).join("");
    w.querySelectorAll(".bs-memo-btn").forEach(function(b){b.addEventListener("click",function(){var ax=b.getAttribute("data-bs");var a=document.getElementById("bsmemo-"+ax);if(a)a.style.display=a.style.display==="none"?"block":"none";});});
    w.querySelectorAll(".bs-memo-input").forEach(function(ta){ta.addEventListener("input",function(){var ax=ta.getAttribute("data-bs-for");baseMemos[ax]=ta.value;var b=w.querySelector('[data-bs="'+ax+'"]');if(b)b.classList.toggle("has-memo",!!ta.value.trim());});});
  }
  renderBaseMemos(pentaChart.getValues());

  document.getElementById("btnCompare").addEventListener("click",function(){var on=this.getAttribute("aria-pressed")==="true";this.setAttribute("aria-pressed",on?"false":"true");pentaChart.setShowCommunity(!on);});

  var bw=document.getElementById("brewChips");
  bw.innerHTML=BREW.map(function(m){return'<button type="button" class="chip" data-brew="'+esc(m)+'">'+esc(m)+'</button>';}).join("");
  // Shop brew sub-chips
  var sbw=document.getElementById("shopBrewChips");
  sbw.innerHTML=SHOP_BREW.map(function(m){return'<button type="button" class="chip" data-sbrew="'+esc(m)+'">'+esc(m)+'</button>';}).join("");
  sbw.querySelectorAll(".chip").forEach(function(b){b.addEventListener("click",function(){sbw.querySelectorAll(".chip").forEach(function(x){x.classList.remove("selected");});b.classList.add("selected");selectedShopBrew=b.getAttribute("data-sbrew");});});

  bw.querySelectorAll(".chip").forEach(function(b){b.addEventListener("click",function(){
    bw.querySelectorAll(".chip").forEach(function(x){x.classList.remove("selected");});
    b.classList.add("selected");
    var val=b.getAttribute("data-brew");
    var isShop=val==="매장 음료";
    var isSkip=val==="생략";
    var isDirect=!isShop&&!isSkip;
    document.getElementById("shopBrewWrap").style.display=isShop?"block":"none";
    document.getElementById("btnAddRecipe").style.display=isDirect?"inline-block":"none";
    document.getElementById("btnLoadRecipe").style.display=isDirect?"inline-block":"none";
    if(!isDirect){document.getElementById("recipeArea").style.display="none";}
  });});
  document.getElementById("btnAddRecipe").addEventListener("click",function(){var a=document.getElementById("recipeArea");a.style.display=a.style.display==="none"?"block":"none";if(a.style.display==="block"&&!document.querySelector("#tastingPourSteps .pour-step-input"))addTastingPourStep();});

  // 추출 단계 동적 추가
  var tastingStepCount=0;
  function addTastingPourStep(){
    tastingStepCount++;
    var wrap=document.getElementById("tastingPourSteps");
    var div=document.createElement("div");div.className="pour-step-input";
    div.innerHTML='<div class="psi-header"><span class="psi-num">'+tastingStepCount+'회차</span><button type="button" class="psi-remove">&times;</button></div><div class="psi-row"><input type="text" class="psi-time" placeholder="시간 (예: 0:00~0:30)"/><input type="text" class="psi-amount" placeholder="물 양 (예: 50ml)"/></div><textarea class="psi-tip" placeholder="이 단계의 팁"></textarea>';
    div.querySelector(".psi-remove").addEventListener("click",function(){div.remove();renumberTastingSteps();});
    wrap.appendChild(div);
  }
  function renumberTastingSteps(){
    tastingStepCount=0;
    document.querySelectorAll("#tastingPourSteps .pour-step-input").forEach(function(el){tastingStepCount++;el.querySelector(".psi-num").textContent=tastingStepCount+"회차";});
  }
  document.getElementById("btnAddPourStep").addEventListener("click",function(){if(tastingStepCount<10)addTastingPourStep();else CN.showToast("최대 10단계");});
  // 기존 레시피 불러오기
  document.getElementById("btnLoadRecipe").addEventListener("click",function(){
    var recipes=CN.getRecipes();
    if(!recipes.length){CN.showToast("저장된 레시피가 없습니다");return;}
    var html=recipes.map(function(r){return'<div class="listCard card" style="cursor:pointer;margin-bottom:1px" data-rid="'+esc(r.id)+'"><p class="card-title" style="font-size:14px">'+esc(r.title)+'</p><p class="caption">'+esc([r.tool,r.temp,r.dose].filter(Boolean).join(" · "))+'</p></div>';}).join("");
    var overlay=document.createElement("div");overlay.className="sheetOverlay open";overlay.innerHTML='<div class="sheetPanel" style="max-height:80vh;overflow-y:auto"><div class="sheetHandle"></div><h2 class="sheetTitle">레시피 선택</h2>'+html+'<button type="button" class="btn-secondary" style="margin-top:12px" id="rlClose">닫기</button></div>';
    document.body.appendChild(overlay);
    overlay.querySelector("#rlClose").addEventListener("click",function(){overlay.remove();});
    overlay.addEventListener("click",function(e){if(e.target===overlay)overlay.remove();});
    overlay.querySelectorAll("[data-rid]").forEach(function(el){el.addEventListener("click",function(){
      var r=CN.getRecipeById(el.getAttribute("data-rid"));
      if(r){
        document.getElementById("recipeTemp").value=r.temp||"";
        document.getElementById("recipeWater").value=r.water||"";
        document.getElementById("recipeDose").value=r.dose||"";
        document.getElementById("recipeGrind").value=r.grind||"";
        document.getElementById("recipeNote").value=r.note||"";
        // 추출 단계 채우기
        document.getElementById("tastingPourSteps").innerHTML="";
        tastingStepCount=0;
        if(r.steps&&r.steps.length){
          r.steps.forEach(function(s){
            addTastingPourStep();
            var lastStep=document.querySelector("#tastingPourSteps .pour-step-input:last-child");
            if(lastStep){
              lastStep.querySelector(".psi-time").value=s.time||"";
              lastStep.querySelector(".psi-amount").value=s.amount||"";
              lastStep.querySelector(".psi-tip").value=s.tip||"";
            }
          });
        } else {
          addTastingPourStep();
        }
        document.getElementById("recipeArea").style.display="block";
        CN.showToast("레시피를 불러왔습니다");
      }
      overlay.remove();
    });});
  });

  document.getElementById("photoFileInput").addEventListener("change",function(){var files=this.files;if(!files)return;Array.from(files).forEach(function(f){if(photos.length>=3){CN.showToast("사진은 최대 3장");return;}var r=new FileReader();r.onload=function(e){var img=new Image();img.onload=function(){var c=document.createElement("canvas");var mx=600,w=img.width,h=img.height;if(w>mx){h=h*mx/w;w=mx;}c.width=w;c.height=h;c.getContext("2d").drawImage(img,0,0,w,h);photos.push(c.toDataURL("image/jpeg",0.7));renderPhotos();};img.src=e.target.result;};r.readAsDataURL(f);});this.value="";});
  function renderPhotos(){var g=document.getElementById("photoGrid");g.innerHTML=photos.map(function(s,i){return'<div class="photo-thumb"><img src="'+s+'" alt="사진"/><button type="button" class="photo-thumb-remove" data-pi="'+i+'">&times;</button></div>';}).join("");g.querySelectorAll(".photo-thumb-remove").forEach(function(b){b.addEventListener("click",function(){photos.splice(Number(b.getAttribute("data-pi")),1);renderPhotos();});});}

  var STAR_LABELS={"0.5":"별로","1":"별로","1.5":"아쉬움","2":"보통 이하","2.5":"보통 이하","3":"보통","3.5":"괜찮음","4":"좋음","4.5":"아주 좋음","5":"최고!"};
  function starSvg(type,sz){
    var s=sz||32,pts="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26";
    if(type==="full") return '<svg width="'+s+'" height="'+s+'" viewBox="0 0 24 24"><polygon points="'+pts+'" fill="#8C7355" stroke="#8C7355"/></svg>';
    if(type==="half") return '<svg width="'+s+'" height="'+s+'" viewBox="0 0 24 24"><defs><clipPath id="halfClip"><rect x="0" y="0" width="12" height="24"/></clipPath></defs><polygon points="'+pts+'" fill="none" stroke="#E0E0E0" stroke-width="1.5"/><polygon points="'+pts+'" fill="#8C7355" stroke="#8C7355" clip-path="url(#halfClip)"/></svg>';
    return '<svg width="'+s+'" height="'+s+'" viewBox="0 0 24 24"><polygon points="'+pts+'" fill="none" stroke="#E0E0E0" stroke-width="1.5"/></svg>';
  }
  function renderStars(){
    var w=document.getElementById("starRating");
    var h="";
    for(var i=1;i<=5;i++){
      h+='<span class="star-btn" data-star="'+i+'" style="position:relative;display:inline-block;width:32px;height:32px">';
      if(starVal>=i) h+=starSvg("full");
      else if(starVal>=i-0.5) h+=starSvg("half");
      else h+=starSvg("empty");
      h+='<span class="star-half-left" data-half="'+(i-0.5)+'" style="position:absolute;left:0;top:0;width:50%;height:100%;cursor:pointer"></span>';
      h+='<span class="star-half-right" data-half="'+i+'" style="position:absolute;right:0;top:0;width:50%;height:100%;cursor:pointer"></span>';
      h+='</span>';
    }
    w.innerHTML=h;
    var label=starVal>0?(starVal+" / 5 — "+(STAR_LABELS[String(starVal)]||"")):"탭하여 별점을 선택하세요";
    document.getElementById("starLabel").textContent=label;
    w.querySelectorAll("[data-half]").forEach(function(el){
      el.addEventListener("click",function(e){
        e.stopPropagation();
        var v=parseFloat(el.getAttribute("data-half"));
        starVal=(starVal===v)?0:v;
        renderStars();
      });
    });
  }
  renderStars();

  function revealSection(id){var el=document.getElementById(id);if(!el||el.classList.contains("revealed"))return;el.classList.add("revealed");setTimeout(function(){el.scrollIntoView({behavior:"smooth",block:"start"});},100);}

  document.getElementById("btnSaveFinal").addEventListener("click",function(){
    var flavors=CoffeeWheel.getSelectedFlavors();var baseScores=pentaChart.getValues();
    var be=bw.querySelector(".chip.selected");var bm=be?be.getAttribute("data-brew"):"";
    var isShop=bm==="매장 음료";
    if(bm==="생략")bm="";
    var shopBrew=isShop?selectedShopBrew:null;
    var recipe=null;if(!isShop&&document.getElementById("recipeArea").style.display!=="none"){
      var t=document.getElementById("recipeTemp").value.trim(),wa=document.getElementById("recipeWater").value.trim(),d=document.getElementById("recipeDose").value.trim(),g=document.getElementById("recipeGrind").value.trim(),rn=document.getElementById("recipeNote").value.trim();
      var steps=[];document.querySelectorAll("#tastingPourSteps .pour-step-input").forEach(function(el){var st=el.querySelector(".psi-time").value.trim(),sa=el.querySelector(".psi-amount").value.trim(),sp=el.querySelector(".psi-tip").value.trim();if(st||sa||sp)steps.push({time:st,amount:sa,tip:sp});});
      if(t||wa||d||g||rn||steps.length)recipe={temp:t,water:wa,dose:d,grind:g,note:rn,steps:steps};
    }
    var recordData={coffeeIndex:idx,coffeeName:coffee.name,createdAt:isEditMode?editRecord.createdAt:new Date().toISOString(),updatedAt:new Date().toISOString(),flavorSelections:flavors.map(function(f){return{en:f.en,ko:f.ko,category:f.category,sub:f.sub,color:f.color};}),flavorIntensities:Object.assign({},flavorIntensities),flavorMemos:Object.assign({},flavorMemos),baseScores:baseScores,baseMemos:Object.assign({},baseMemos),brewMethod:bm,shopBrewMethod:shopBrew,recipe:recipe,location:document.getElementById("locationInput").value.trim(),locationCoords:null,photos:photos.slice(),memo:document.getElementById("memo").value.trim(),starRating:starVal||null,source:"user_tasting",scores:baseScores,method:bm,tasteTags:flavors.map(function(f){return f.ko;})};
    if(isEditMode){
      var list=CN.getTastingRecords();list[editIdx]=recordData;CN.saveToStorage(CN.STORAGE_KEYS.TASTING_RECORDS,list);
      // 수정 시에도 카드 재생성
      try{var cu=CardGenerator.generate(recordData);var ci=JSON.parse(localStorage.getItem("cardImages")||"{}");ci[editIdx]=cu;localStorage.setItem("cardImages",JSON.stringify(ci));}catch(e){}
      CN.showToast("수정되었습니다!");
      setTimeout(function(){location.href="notes.html";},600);
    } else {
      CN.addTastingRecord(recordData);
      var cardUrl=CardGenerator.generate(recordData);
      // 카드 이미지 캐싱
      try{var recs=CN.getTastingRecords();var ci=JSON.parse(localStorage.getItem("cardImages")||"{}");ci[recs.length-1]=cardUrl;localStorage.setItem("cardImages",JSON.stringify(ci));}catch(e){}
      var overlay=document.getElementById("cardOverlay");
      document.getElementById("cardPreview").src=cardUrl;
      overlay.style.display="flex";
      document.getElementById("btnShareCard").onclick=function(){CardGenerator.share(cardUrl);};
      document.getElementById("btnCloseCard").onclick=function(){overlay.style.display="none";location.href="home.html";};
    }
  });
  } // end initTastingUI
})();
  </script>
