<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>테이스팅 기록 — 커피 노트</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
  <link rel="stylesheet" href="common.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <link rel="stylesheet" href="common.css"/>
  <link rel="stylesheet" href="app-shell.css"/>
  <link rel="stylesheet" href="feature-global-search.css"/>
</head>
<body>
  <div class="wrap">
    <header class="pageHeader">
      <button type="button" class="backBtn" id="btnBack" aria-label="뒤로가기">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      </button>
      <h1 class="title">테이스팅 기록</h1>
    </header>

    <div id="missingCoffee" class="empty" style="display:none">원두 정보를 찾을 수 없습니다.</div>

    <div id="tastingMain" style="display:none">
      <div class="summaryCard" id="coffeeSummary"></div>
      <hr class="thin-rule" />

      <section id="step1" class="step-section revealed">
        <h2 class="section-heading">향미 선택</h2>
        <p class="step-desc">좌우로 돌려 카테고리를 선택하고, 향미를 탭해 추가하세요</p>
        <div class="wheel-viewport" id="wheelViewport">
          <svg id="wheelSvg" xmlns="http://www.w3.org/2000/svg"></svg>
        </div>
        <div class="selected-flavors" id="selectedFlavors">
          <p class="empty-flavors" id="emptyFlavorsMsg">향미를 선택하면 여기에 표시됩니다</p>
        </div>
      </section>

      <section id="step2" class="step-section">
        <hr class="thin-rule" />
        <h2 class="section-heading">향미 강도</h2>
        <p class="step-desc">각 향미를 얼마나 강하게 느꼈나요?</p>
        <div id="flavorSliders"></div>
      </section>

      <section id="step3" class="step-section">
        <hr class="thin-rule" />
        <h2 class="section-heading">기본 감각</h2>
        <p class="step-desc">핸들을 드래그하여 조절하세요</p>
        <div class="pentagon-radar" id="pentagonRadar" style="overflow:visible">
          <svg id="pentaSvg" xmlns="http://www.w3.org/2000/svg" style="overflow:visible"></svg>
        </div>

        <!-- 슬라이더 패널: 고정 위치로 겹침 방지 -->
        <div id="radarPanel" style="display:none;margin:12px 0;padding:14px 16px;background:#F8F6F3;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
            <span id="radarPanelLabel" style="font-size:14px;font-weight:600;color:#121212"></span>
            <span id="radarPanelVal" style="font-size:22px;font-weight:700;color:#8C7355"></span>
          </div>
          <input type="range" id="radarSlider" min="1" max="10" step="1" style="width:100%;accent-color:#8C7355">
          <div style="display:flex;justify-content:space-between;font-size:11px;color:#888;margin-top:4px">
            <span>1</span><span>5</span><span>10</span>
          </div>
        </div>

        <!-- 비교 패널: 고정 위치로 겹침 방지 -->
        <div id="radarComparePanel" style="display:none;margin-top:4px;"></div>

        <div id="baseSenseMemos" class="base-sense-list"></div>
        <div class="compare-toggle">
          <div class="compare-toggle-text">
            <div class="compare-toggle-label">커뮤니티 &amp; 전문가와 비교</div>
            <div class="compare-toggle-sub">커뮤니티 평균 · 전문가 CQI 기준</div>
          </div>
          <button type="button" class="toggle-switch" id="btnCompare" aria-pressed="false"><span class="toggle-thumb"></span></button>
        </div>
      </section>

      <section id="step4" class="step-section">
        <hr class="thin-rule" />
        <h2 class="section-heading">추출 방법</h2>
        <div class="chipWrap" id="brewChips"></div>
        <div id="shopBrewWrap" class="shop-brew-wrap" style="display:none">
          <p class="step-desc">매장에서 어떤 방식으로 추출된 커피인가요?</p>
          <div class="chipWrap" id="shopBrewChips"></div>
        </div>
        <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap">
          <button type="button" class="btn-secondary recipe-add-btn" id="btnAddRecipe" style="display:none;width:auto;padding:10px 18px;font-size:13px">+ 새 레시피 입력</button>
          <button type="button" class="btn-secondary recipe-add-btn" id="btnLoadRecipe" style="display:none;width:auto;padding:10px 18px;font-size:13px">기존 레시피 불러오기</button>
        </div>
        <div id="recipeArea" style="display:none">
          <div class="recipe-form">
            <div class="recipe-field"><label>물 온도</label><input type="text" id="recipeTemp" placeholder="예: 93°C"/></div>
            <div class="recipe-field"><label>물 양 (총량)</label><input type="text" id="recipeWater" placeholder="예: 250ml"/></div>
            <div class="recipe-field"><label>원두 양</label><input type="text" id="recipeDose" placeholder="예: 15g"/></div>
            <div class="recipe-field"><label>그라인딩</label><input type="text" id="recipeGrind" placeholder="예: 코만단테 24클릭"/></div>
            <h3 class="section-heading" style="margin-top:16px">추출 단계</h3>
            <div id="tastingPourSteps"></div>
            <button type="button" class="btn-secondary" id="btnAddPourStep" style="margin-top:8px;width:auto;padding:8px 16px;font-size:13px">+ 단계 추가</button>
            <div class="recipe-field" style="margin-top:12px"><label>추출 메모</label><textarea id="recipeNote" placeholder="전체적인 추출 팁"></textarea></div>
          </div>
        </div>
        <h2 class="section-heading">장소</h2>
        <div class="location-bar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
          <input type="text" id="locationInput" placeholder="카페 이름 또는 장소"/>
        </div>
        <h2 class="section-heading">사진</h2>
        <div class="photo-upload-area">
          <div class="photo-grid" id="photoGrid"></div>
          <label class="photo-add-btn"><input type="file" accept="image/*" multiple id="photoFileInput" style="display:none"/><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>사진 추가 (최대 3장)</label>
        </div>
        <h2 class="section-heading">메모</h2>
        <textarea id="memo" placeholder="오늘의 커피 경험을 자유롭게 기록하세요"></textarea>
        <h2 class="section-heading">별점</h2>
        <p class="step-desc">이 커피의 전반적인 만족도</p>
        <div class="star-rating-input" id="starRating"></div>
        <div class="star-rating-label" id="starLabel">탭하여 별점을 선택하세요</div>
        <button type="button" class="btn-primary" id="btnSaveFinal" style="margin-top:24px">기록 저장</button>
      </section>
    </div>
  </div>
  <div id="globalToast" class="toast"></div>

  <!-- 센서리 카드 프리뷰 -->
  <div id="cardOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:9999;display:none;flex-direction:column;align-items:center;justify-content:center;padding:20px">
    <img id="cardPreview" style="max-width:100%;max-height:70vh;box-shadow:0 8px 40px rgba(0,0,0,0.4)"/>
    <div style="display:flex;gap:12px;margin-top:20px">
      <button type="button" id="btnShareCard" style="padding:14px 32px;background:#fff;color:#121212;border:none;font-size:15px;font-weight:600;font-family:'Pretendard Variable',sans-serif;cursor:pointer">공유하기</button>
      <button type="button" id="btnCloseCard" style="padding:14px 32px;background:transparent;color:#fff;border:1px solid rgba(255,255,255,0.3);font-size:15px;font-weight:500;font-family:'Pretendard Variable',sans-serif;cursor:pointer">닫기</button>
    </div>
  </div>

    <a href="notes.html" class="nav-item" data-nav="notes"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg><span class="nav-label">노트</span></a>

  <!-- 1. 스크립트 로드 (가이드 순서 엄수) -->
  <script src="common.js"></script>
  <script src="supabase.js"></script>
  <script src="feature-image-compress.js"></script> <!-- 압축 모듈 우선 -->
  <script src="feature-global-search.js"></script>   <!-- 전역 검색 모듈 -->
  <script src="tasting-wheel.js"></script>
  <script src="tasting-radar.js"></script>
  <script src="card-generator.js"></script>
  <script src="shared-utils.js"></script>

  <script>
(function(){
  var CN = window.CoffeeNote;
  
  // [모듈 1] 네비게이션 설정 (강조 없음)[cite: 4]
  CN.renderBottomNav(''); 

  // [모듈 2] 전역 검색 콜백 등록: 선택된 원두 정보를 화면에 적용[cite: 4]
  CoffeeNote._onCoffeeSelected = function(result) {
    initWithCoffee(result.coffee, result.index || -1);
  };

  // 전역 변수 설정
  var params = new URLSearchParams(location.search);
  var coffeeId = params.get("coffeeId");
  var idx = (coffeeId !== null && coffeeId !== "") ? Number(coffeeId) : NaN;
  var coffee = CN.getCoffeeByIndex(idx);
  
  var BREW = ["매장 음료","생략","V60","칼리타","케멕스","에어로프레스","프렌치프레스","에스프레소","콜드브루","모카포트","클레버"];
  var SHOP_BREW = ["모르겠음","핸드드립","에스프레소","콜드브루","사이폰","더치","기타"];
  var selectedShopBrew = "";
  var flavorIntensities = {}, flavorMemos = {}, baseMemos = {}, photos = [], starVal = 0, pentaChart = null;

  var editIdx = params.get("editIdx") != null ? Number(params.get("editIdx")) : NaN;
  var editRecord = Number.isInteger(editIdx) ? CN.getTastingRecords()[editIdx] : null;
  var isEditMode = !!editRecord;

  // 메인 초기화 함수
  function initWithCoffee(c, i) {
    coffee = c; idx = i;
    document.getElementById("missingCoffee").style.display = "none";
    document.getElementById("tastingMain").style.display = "block";

    var aiPred = null;
    try { var ap = sessionStorage.getItem("ai_prediction"); if(ap) aiPred = JSON.parse(ap); } catch(e){}

    // 요약 카드 생성 (변경 버튼에 전역 검색 연결)[cite: 4]
    var summaryHtml =
      '<div style="display:flex;justify-content:space-between;align-items:flex-start">' +
        '<div><p class="card-title">' + esc(c.name) + '</p><p class="caption" style="margin-top:8px">' + esc(c.roaster||"") + '</p></div>' +
        '<button type="button" class="btn-secondary" style="width:auto;padding:8px 14px;font-size:12px;flex-shrink:0" ' +
        'onclick="CoffeeNote.openGlobalSearch()">변경</button>' +
      '</div>';

    document.getElementById("coffeeSummary").innerHTML = summaryHtml;
    initTastingUI(); 
    if(isEditMode) prefillFromRecord(editRecord);
  }

  // UI 초기화 및 기능 함수들
  function initTastingUI() {
    CoffeeWheel.init({
      svgId: "wheelSvg", viewportId: "wheelViewport", 
      onSelectionChange: function(flavors) {
        if(flavors.length > 0) { revealSection("step2"); revealSection("step3"); revealSection("step4"); }
        renderFlavorSliders(flavors);
      }
    });

    pentaChart = CoffeeRadar.createInteractive({
      svgId: "pentaSvg", 
      aiScores: (function(){ try{ var ap=sessionStorage.getItem("ai_prediction"); if(ap) return JSON.parse(ap).scores; }catch(e){} return null; })(), 
      onChange: function(v){ renderBaseMemos(v); }
    });
    
    renderBaseMemos(pentaChart.getValues());
    renderStars();
    renderBrewChips();
  }

  // 향미 슬라이더 렌더링
  function renderFlavorSliders(flavors){
    var w = document.getElementById("flavorSliders");
    w.innerHTML = flavors.map(function(f){
      var v = flavorIntensities[f.en] || 5;
      return '<div class="flavor-slider-group"><div class="flavor-slider-row">' +
        '<span class="fs-color" style="background:'+esc(f.color)+'"></span><span class="fs-name">'+esc(f.ko)+'</span>' +
        '<div class="fs-track"><input type="range" class="fs-input" min="1" max="10" value="'+v+'" data-en="'+esc(f.en)+'"></div>' +
        '<span class="fs-val" id="fv-'+esc(f.en)+'">'+v+'</span></div></div>';
    }).join("");
    
    w.querySelectorAll(".fs-input").forEach(inp => {
      inp.addEventListener("input", function(){
        var en = this.getAttribute("data-en");
        flavorIntensities[en] = Number(this.value);
        document.getElementById("fv-"+en).textContent = this.value;
      });
    });
  }

  // 별점 시스템
  function renderStars(){
    var w = document.getElementById("starRating");
    var h = "";
    for(var i=1; i<=5; i++){
      h += '<span onclick="setStar('+i+')" style="cursor:pointer;font-size:24px;color:'+(starVal>=i?'#8C7355':'#E0E0E0')+'">★</span>';
    }
    w.innerHTML = h;
    document.getElementById("starLabel").textContent = starVal > 0 ? starVal + "점 선택됨" : "탭하여 별점을 선택하세요";
  }
  window.setStar = function(v){ starVal = v; renderStars(); };

  // 추출 방법 칩 렌더링
  function renderBrewChips(){
    var bw = document.getElementById("brewChips");
    bw.innerHTML = BREW.map(m => '<button type="button" class="chip" onclick="selectBrew(this, \''+m+'\')">'+m+'</button>').join("");
  }
  window.selectBrew = function(el, val){
    document.querySelectorAll('#brewChips .chip').forEach(c => c.classList.remove('selected'));
    el.classList.add('selected');
  };

  // 섹션 드러내기 애니메이션
  function revealSection(id){
    var el = document.getElementById(id);
    if(el) el.classList.add("revealed");
  }

  // 초기 실행 흐름
  if(isEditMode) {
    var editCoffee = CN.getCoffeeByIndex(editRecord.coffeeIndex);
    initWithCoffee(editCoffee || {name:editRecord.coffeeName}, editRecord.coffeeIndex);
  } else if(coffee) {
    initWithCoffee(coffee, idx);
  } else {
    // 원두 정보가 없으면 전역 검색창을 자동으로 띄움[cite: 4]
    setTimeout(() => CoffeeNote.openGlobalSearch(), 300);
  }

  document.getElementById("btnBack").addEventListener("click", function(){ history.back(); });

})();
  </script>
