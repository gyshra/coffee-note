<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>커피 노트</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
    <link rel="stylesheet" href="common.css" />
    <script src="config.js"></script>
  </head>
  <body>
    <div class="wrap">
      <div class="logo-area">
        <div class="thick-rule"></div>
        <h1 class="logo">Coffee<br />Note.</h1>
      </div>

      <div class="search-bar-wrap">
        <div class="search-bar">
          <input
            id="q"
            class="search-input"
            type="search"
            placeholder="원두 이름을 입력하세요"
            autocomplete="off"
          />
          <button type="button" class="camera-btn" id="btnOpenCamera" title="사진으로 검색" aria-label="사진으로 검색">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z" />
              <circle cx="12" cy="13" r="4" />
            </svg>
          </button>
          <button type="button" class="search-btn" id="searchBtn">검색</button>
        </div>
      </div>

      <div id="results" class="results"></div>

      <div class="register-hint" id="registerHint">
        찾는 원두가 없나요?
        <br />
        <button type="button" class="btn-secondary inline" id="btnRegister">
          <span style="display: inline-flex; align-items: center; gap: 8px">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" aria-hidden="true">
              <line x1="12" y1="5" x2="12" y2="19" />
              <line x1="5" y1="12" x2="19" y2="12" />
            </svg>
            직접 원두 등록하기
          </span>
        </button>
      </div>
    </div>

    <div id="globalToast" class="toast"></div>

      <nav id="bottomNav" class="bottom-nav">
    <a href="home.html" class="nav-item" data-nav="home"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span class="nav-label">홈</span></a>
    <a href="index.html" class="nav-item" data-nav="search"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg><span class="nav-label">검색</span></a>
    <a href="notes.html" class="nav-item" data-nav="notes"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg><span class="nav-label">노트</span></a>
    <a href="#" class="nav-item" data-nav="map" onclick="CoffeeNote.openCoffeeMap();return false"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg><span class="nav-label">커피맵</span></a>
    <a href="mypage.html" class="nav-item" data-nav="mypage"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span class="nav-label">마이</span></a>
  </nav>

    <script src="common.js"></script>
    <script>
      // TODO: Supabase 연동 시 검색/OCR 결과를 서버에 전송·동기화
      (function () {
        var CN = window.CoffeeNote;
        var $q = document.getElementById("q");
        var $results = document.getElementById("results");
        var expandedIndex = null;

        CN.renderBottomNav("search");
        CN.consumeScanIntent();

        // home.html에서 OCR 완료 후 넘어온 경우 처리
        (function() {
          var params = new URLSearchParams(location.search);
          if (params.get("from") === "ocr") {
            try {
              var pending = sessionStorage.getItem("ocr_pending");
              if (pending) {
                sessionStorage.removeItem("ocr_pending");
                var detail = JSON.parse(pending);
                var ev = new CustomEvent("coffeeNote:ocrText", { detail: detail });
                setTimeout(function(){ document.dispatchEvent(ev); }, 100);
              }
            } catch(ex) {}
          }
        })();

        document.getElementById("btnOpenCamera").addEventListener("click", function () {
          CN.openCamera();
        });
        document.getElementById("btnRegister").addEventListener("click", function () {
          location.href = "register-coffee.html";
        });

        function starsBlock(score) {
          return '<div class="rating">' + CN.starsHtml(score) + "</div>";
        }

        function processLine(c) {
          return escapeHtml(CN.formatProcessDisplay(c));
        }

        function renderResults(pairs) {
          if (!pairs.length) {
            $results.innerHTML =
              '<div class="empty">검색 결과가 없습니다. 예: 예가체프, 게이샤, 케냐<br /><br />직접 등록도 가능합니다.</div>';
            return;
          }
          $results.innerHTML = pairs
            .map(function (row) {
              var c = row.coffee;
              var idx = row.index;
              var exp = expandedIndex === idx;
              var heart = CN.heartIconHtml(CN.isFavorite(idx));
              return (
                '<article class="coffeeCard result-card' +
                (exp ? " expanded" : "") +
                '" data-idx="' +
                idx +
                '">' +
                '<button type="button" class="favBtn" data-fav-idx="' +
                idx +
                '" aria-label="즐겨찾기">' +
                heart +
                "</button>" +
                '<div class="summary" data-toggle-idx="' +
                idx +
                '">' +
                '<h3 class="name">' +
                escapeHtml(c.name) +
                "</h3>" +
                '<div class="meta"><span>' +
                escapeHtml(c.roaster || "") +
                "</span><span>· " +
                escapeHtml(c.altitude || "") +
                '</span><span>· ' +
                processLine(c) +
                "</span></div></div>" +
                '<div class="details">' +
                // ── SCREEN 2: 원두 정보 (목업 스타일) ──
                '<h2 class="detailName">' + escapeHtml(c.name) + '</h2>' +
                '<div class="detailRoaster">' + escapeHtml(c.roaster || '') + '</div>' +
                starsBlock(c.rating || 0) +
                // 신뢰도 배지
                (c.confidence ? '<div style="margin:8px 0">' +
                  '<span class="sourceTag ' + (c.confidence==='high'?'sourceHigh':c.confidence==='medium'?'sourceMed':'sourceLow') + '">' +
                  (c.confidence==='high'?'✓ 높은 신뢰도':c.confidence==='medium'?'△ AI 추론 기반':'○ 정보 부족') +
                  '</span></div>' : '') +
                // 예상 향미 태그
                '<p class="section-heading" style="margin-top:14px">예상 향미</p>' +
                '<div class="tagWrap">' +
                (c.notes || []).map(function(n,i){ return '<span class="tag ' + CN.toneClass(i) + '">' + escapeHtml(n) + '</span>'; }).join('') +
                '</div>' +
                // OCR 필드 그리드 (목업 Screen 2)
                '<p class="section-heading" style="margin-top:14px">산지 정보</p>' +
                '<div class="grid">' +
                cell('지역', c.region) + cell('농장/워싱스테이션', c.farm) +
                cell('고도', c.altitude) + cell('가공방식', CN.formatProcessDisplay(c) + (c.processDetail?' ('+c.processDetail+')':'')) +
                cell('품종', c.variety) + cell('가격대', c.price) +
                '</div>' +
                (c.description ? '<p style="font-size:13px;line-height:1.7;color:var(--text-sub);margin:10px 0">' + escapeHtml(c.description) + '</p>' : '') +
                // ── SCREEN 3: AI 추천 레시피 (목업 스타일) ──
                (c.brewTips ? (
                  '<hr class="thin-rule">' +
                  '<p class="section-heading">최적 레시피 <span style="font-size:10px;color:var(--text-sub);font-weight:400">AI 분석 · ' + escapeHtml(c.name||'') + '</span></p>' +
                  buildRecipePanel(c) +
                  buildCommunityBrewBars(c)
                ) : '') +
                // AI 예측 감각 수치 그리드
                (c.acidity || c.sweetness || c.body || c.aroma ? (
                  '<p class="section-heading" style="margin-top:14px">AI 예측 감각 수치</p>' +
                  '<div style="display:grid;grid-template-columns:1fr 1fr;gap:0;border-top:1px solid var(--border);border-left:1px solid var(--border);margin-bottom:4px">' +
                  (c.acidity   ? '<div style="border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:10px 14px"><div style="font-size:10px;color:var(--text-sub);margin-bottom:3px">산미</div><div style="font-size:20px;font-weight:800">' + c.acidity + '<span style="font-size:11px;color:var(--text-sub)">/10</span></div></div>' : '') +
                  (c.sweetness ? '<div style="border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:10px 14px"><div style="font-size:10px;color:var(--text-sub);margin-bottom:3px">단맛</div><div style="font-size:20px;font-weight:800">' + c.sweetness + '<span style="font-size:11px;color:var(--text-sub)">/10</span></div></div>' : '') +
                  (c.body      ? '<div style="border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:10px 14px"><div style="font-size:10px;color:var(--text-sub);margin-bottom:3px">바디감</div><div style="font-size:20px;font-weight:800">' + c.body + '<span style="font-size:11px;color:var(--text-sub)">/10</span></div></div>' : '') +
                  (c.aroma     ? '<div style="border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:10px 14px"><div style="font-size:10px;color:var(--text-sub);margin-bottom:3px">아로마</div><div style="font-size:20px;font-weight:800">' + c.aroma + '<span style="font-size:11px;color:var(--text-sub)">/10</span></div></div>' : '') +
                  '</div><p style="font-size:11px;color:var(--text-sub);margin-bottom:12px">↑ AI가 이 원두의 특성으로 예측한 값 · 테이스팅 후 비교해보세요</p>'
                ) : '') +
                // 커뮤니티 섹션
                '<p class="section-heading">다른 사용자 후기</p>' +
                (c._community && c._community.count > 0 ? (
                  '<div class="communityBox">' +
                  '<div class="communityRow"><span class="communityLabel">기록한 사람</span><span>' + c._community.count + '명</span></div>' +
                  (c._community.avgRating ? '<div class="communityRow"><span class="communityLabel">평균 별점</span><span>' + c._community.avgRating + ' / 5.0</span></div>' : '') +
                  (c._community.topFlavors && c._community.topFlavors.length ? '<div class="communityRow"><span class="communityLabel">많이 느낀 향미</span><div class="tagWrap" style="margin-top:6px">' + c._community.topFlavors.map(function(f,i){ return '<span class="tag ' + CN.toneClass(i) + '">' + escapeHtml(f) + '</span>'; }).join("") + '</div></div>' : '') +
                  (c._community.topBrewMethods && c._community.topBrewMethods.length ? '<div class="communityRow"><span class="communityLabel">인기 추출법</span><span>' + c._community.topBrewMethods.map(function(b){ return escapeHtml(b.method) + ' (' + b.count + ')'; }).join(', ') + '</span></div>' : '') +
                  '</div>'
                ) : '<div style="padding:12px 16px;margin-bottom:12px;font-size:13px;color:#888;background:#f8f6f3;border:1px dashed #ddd;text-align:center">아직 후기가 없어요. 이 커피를 마시고 첫 번째로 기록해보세요!</div>') +
                '<p class="section-heading">지도</p>' +
                '<div class="mapBox">' +
                escapeHtml(c.mapText || "지도 연동 예정") +
                "</div>" +
                // ── rawNotes (원본 컵노트) ──
                (c.rawNotes && c.rawNotes.length ? (
                  '<p class="section-heading">원본 컵노트</p>' +
                  '<div class="tagWrap" style="margin-bottom:4px">' +
                  (c.rawNotes||[]).map(function(n){ return '<span class="tag" style="background:var(--bg);border:1px solid var(--border);color:var(--text-sub);font-size:12px">' + escapeHtml(n) + '</span>'; }).join("") +
                  '</div><p style="font-size:11px;color:var(--text-sub);margin-bottom:12px">↑ 이미지/라벨 원본 · SCA 표준 노트는 상단 태그 참조</p>'
                ) : '') +
                // ── 커뮤니티 후기 카드 ──
                (c._recentNotes && c._recentNotes.length ? (
                  '<p class="section-heading">최근 후기</p>' +
                  '<div class="recentNotesList">' +
                  c._recentNotes.slice(0,3).map(function(n){
                    var tags = Array.isArray(n.flavor_tags)?n.flavor_tags:[];
                    var rating = n.rating ? CN.starHtml(n.rating) : '';
                    return '<div class="recentNoteCard">' +
                      '<div class="recentNoteHeader">' + rating +
                      (n.brew_method ? '<span class="recentBrew">' + escapeHtml(n.brew_method) + '</span>' : '') + '</div>' +
                      (tags.length ? '<div class="tagWrap recentTags">' + tags.slice(0,4).map(function(t,i){return '<span class="tag '+CN.toneClass(i)+'">'+escapeHtml(t)+'</span>';}).join("") + '</div>' : '') +
                      (n.memo ? '<p class="recentMemo">' + escapeHtml(n.memo.slice(0,80)) + (n.memo.length>80?'…':'') + '</p>' : '') +
                      '</div>';
                  }).join("") +
                  '</div>'
                ) : '') +
                // ── 링크 · 구매 ──
                '<p class="section-heading">링크 · 구매</p>' +
                '<div class="links">' +
                (c.roasterUrl ? '<a href="' + c.roasterUrl + '" target="_blank" rel="noopener" onclick="event.stopPropagation()" style="display:flex;align-items:center;gap:6px"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>로스터리 웹사이트</a>' : '') +
                (c.farmUrl    ? '<a href="' + c.farmUrl    + '" target="_blank" rel="noopener" onclick="event.stopPropagation()" style="display:flex;align-items:center;gap:6px"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>농장/생산자 웹사이트</a>' : '') +
                (c.purchaseUrl ? '<a href="' + c.purchaseUrl + '" target="_blank" rel="noopener" onclick="event.stopPropagation()" style="display:flex;align-items:center;gap:6px"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>구매 페이지</a>' : '') +
                '<a href="https://www.google.com/search?q=' + encodeURIComponent((c.roaster||c.name||"")+" 커피 구매") + '" target="_blank" rel="noopener" onclick="event.stopPropagation()" style="display:flex;align-items:center;gap:6px;color:#4A86E8"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>구글에서 검색</a>' +
                '</div>' +
                (c.purchaseUrl || c.roasterUrl ? (
                  '<a href="' + (c.purchaseUrl || c.roasterUrl) + '" target="_blank" rel="noopener" onclick="event.stopPropagation()" style="display:block;text-align:center;margin:12px 0;padding:14px;background:#121212;color:#fff;font-size:14px;font-weight:600;letter-spacing:0.04em;text-decoration:none;font-family:inherit">이 원두 구매하기 →</a>'
                ) : (
                  '<a href="https://www.google.com/search?q=' + encodeURIComponent((c.roaster||"")+" "+(c.name||"")+" 원두 구매") + '" target="_blank" rel="noopener" onclick="event.stopPropagation()" style="display:block;text-align:center;margin:12px 0;padding:14px;background:#3D3D3D;color:#fff;font-size:14px;font-weight:600;letter-spacing:0.04em;text-decoration:none;font-family:inherit">구글에서 구매처 찾기 →</a>'
                )) +
                '<div class="actionRow">' +
                '<button type="button" class="btn-secondary" data-add-idx="' +
                idx +
                '">목록에 추가</button>' +
                '<button type="button" class="btn-primary" data-taste-idx="' +
                idx +
                '">이 커피 마시기</button>' +
                "</div></div></article>"
              );
            })
            .join("");

          bindCardEvents(pairs);
        }

        function cell(label, val) {
          return (
            '<div class="gridItem"><div class="gridLabel caption">' +
            escapeHtml(label) +
            '</div><div class="gridValue">' +
            escapeHtml(val || "-") +
            "</div></div>"
          );
        }

        function escapeHtml(s) {
          return String(s || "")
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;");
        }

        /* ── 목업 Screen 3: AI 추천 레시피 패널 ── */
        function buildRecipePanel(c) {
          // brewTips에서 구조화된 정보 파싱 시도, 없으면 텍스트 그대로
          var tips = c.brewTips || "";
          // 기본값 추정 (acidity/body 기반)
          var acid = c.acidity || 7;
          var body = c.body    || 5;
          var temp = acid >= 7 ? "92–94°C" : "88–91°C";
          var ratio = body >= 7 ? "1:15" : "1:16";
          var grind = "중간 (커맨단테 26–30클릭)";
          var time  = "2:30–3:00";
          // process 기반 추정
          var proc = (c.processCategory || c.process || "").toLowerCase();
          if (proc.includes("내추럴") || proc.includes("natural")) { temp="90–92°C"; ratio="1:15.5"; }
          if (proc.includes("무산소") || proc.includes("anaerobic")) { temp="88–90°C"; ratio="1:15"; time="2:00–2:30"; }

          var rows = [
            ["물 온도", temp,  "워시드 → 고온 / 내추럴 → 중온 권장"],
            ["원두·물", ratio, "g 기준 · V60 기본값"],
            ["분쇄도",  grind, "중간 입자 · 추출 시간으로 조정"],
            ["총 시간", time,  "뜸들이기 30초 포함"],
          ];

          var html = rows.map(function(r) {
            return '<div class="recipe-row" style="display:grid;grid-template-columns:72px 1fr;gap:8px;align-items:start;padding:8px 0;border-bottom:0.5px solid #F0EDE8">' +
              '<div><div style="font-size:9px;color:#aaa;text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px">' + r[0] + '</div>' +
              '<div style="font-size:13px;font-weight:700;color:#111">' + r[1] + '</div></div>' +
              '<div style="font-size:11px;color:#888;line-height:1.5;padding-top:2px">' + r[2] + '</div></div>';
          }).join('');

          if (tips) {
            html += '<div style="padding:10px 0 4px;border-top:0.5px solid #E8E5E0;margin-top:4px">' +
              '<div style="font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#8C7355;margin-bottom:4px">AI 브루잉 팁</div>' +
              '<p style="font-size:13px;line-height:1.65;color:#333">' + escapeHtml(tips) + '</p></div>';
          }
          return html;
        }

        /* ── 커뮤니티 추출법 비율 바 ── */
        function buildCommunityBrewBars(c) {
          var methods = (c._community && c._community.topBrewMethods) || [];
          if (!methods.length) {
            // 샘플 데이터 (실제 서비스 시 Supabase 집계값으로 교체)
            methods = [{method:"V60",count:62},{method:"에어로프레스",count:23},{method:"칼리타",count:15}];
          }
          var total = methods.reduce(function(a,b){return a+b.count;},0);
          var html = '<hr class="thin-rule">' +
            '<div style="font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#888;margin-bottom:8px">커뮤니티 추출 방법</div>';
          methods.slice(0,4).forEach(function(m,i) {
            var pct = total ? Math.round(m.count/total*100) : 0;
            var col = i===0 ? "#111" : i===1 ? "#888" : "#ccc";
            html += '<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">' +
              '<div style="font-size:9px;color:#888;width:48px;flex-shrink:0">' + escapeHtml(m.method) + '</div>' +
              '<div style="flex:1;height:5px;background:#F0EDE8"><div style="width:'+pct+'%;height:100%;background:'+col+'"></div></div>' +
              '<div style="font-size:9px;font-weight:700;color:'+col+';width:24px;text-align:right">' + pct + '%</div>' +
            '</div>';
          });
          return html;
        }

        function bindCardEvents(pairs) {
          $results.querySelectorAll("[data-toggle-idx]").forEach(function (el) {
            el.addEventListener("click", function () {
              var idx = Number(el.getAttribute("data-toggle-idx"));
              expandedIndex = expandedIndex === idx ? null : idx;
              renderResults(pairs);
            });
          });
          $results.querySelectorAll("[data-fav-idx]").forEach(function (el) {
            el.addEventListener("click", function (e) {
              e.stopPropagation();
              var idx = Number(el.getAttribute("data-fav-idx"));
              var added = CN.toggleFavorite(idx);
              CN.showToast(added ? "즐겨찾기에 추가했습니다." : "즐겨찾기에서 제거했습니다.");
              renderResults(pairs);
            });
          });
          $results.querySelectorAll("[data-add-idx]").forEach(function (el) {
            el.addEventListener("click", function () {
              CN.showToast("내 커피 목록에 추가했습니다.");
            });
          });
          $results.querySelectorAll("[data-taste-idx]").forEach(function (el) {
            el.addEventListener("click", function () {
              var idx = parseInt(el.getAttribute("data-taste-idx"));
              var coffee = CN.getCoffeeByIndex(idx);
              // AI 예측 점수를 sessionStorage에 저장 → tasting.html 레이더에서 사용
              if (coffee && (coffee.acidity || coffee.sweetness || coffee.body || coffee.aroma)) {
                try {
                  sessionStorage.setItem("ai_prediction", JSON.stringify({
                    scores: {
                      아로마:   coffee.aroma      || 7,
                      산미:     coffee.acidity    || 7,
                      단맛:     coffee.sweetness  || 6,
                      바디감:   coffee.body       || 5,
                      여운:     coffee.aroma      || 7
                    },
                    flavors:    coffee.notes     || [],
                    brewTips:   coffee.brewTips  || "",
                    confidence: coffee.confidence || "medium",
                    coffeeName: coffee.name       || ""
                  }));
                } catch(e) {}
              }
              location.href = "tasting.html?coffeeId=" + encodeURIComponent(idx);
            });
          });
        }

        // ─── AI 검색 + 자동 등록 ─────────────────────────
        var aiSearchTimer = null;

        function runSearch() {
          var query = $q.value.trim();
          if (!query) return;
          CN.addSearchHistory(query);
          expandedIndex = null;
          var pairs = CN.searchCoffeePairs(query);
          if (pairs.length > 0) {
            renderResults(pairs);
          } else {
            // 로컬 DB에 없으면 AI 검색
            runAiSearch(query);
          }
        }

        function runAiSearch(query, context) {
          $results.innerHTML = '<div class="empty" id="aiSearchStatus"><span style="display:inline-block;animation:spin 1s linear infinite;margin-right:6px">⟳</span> AI 검색 중…</div>';
          fetch("/api/search", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ query: query, context: context || null })
          })
          .then(function(res) { return res.json(); })
          .then(function(data) {
            if (data.error || !data.coffee) {
              $results.innerHTML = '<div class="empty">검색 결과가 없습니다.<br/>직접 등록도 가능합니다.</div>';
              return;
            }
            var coffee = data.coffee;
            // DB에 자동 저장
            CN.addCoffee(coffee);
            var allCoffees = CN.getCoffees();
            var newIdx = allCoffees.length - 1;
            CN.showToast("✨ AI가 원두 정보를 찾았어요!");
            expandedIndex = newIdx;
            renderResults([{ coffee: coffee, index: newIdx }]);
          })
          .catch(function(err) {
            $results.innerHTML = '<div class="empty">검색 중 오류가 발생했습니다. 다시 시도해주세요.</div>';
            console.error("[AI Search]", err);
          });
        }

        document.getElementById("searchBtn").addEventListener("click", runSearch);
        $q.addEventListener("keydown", function (e) {
          if (e.key === "Enter") runSearch();
        });

        // ─── OCR 결과 처리 ───────────────────────────────
        document.addEventListener("coffeeNote:ocrText", function (e) {
          var detail = e.detail || {};
          var text = detail.text || "";
          var coffee = detail.coffee || null;

          // 구조화된 커피 데이터가 있으면 바로 등록
          if (coffee && coffee.name) {
            // 로컬 DB에 중복 확인
            var existing = CN.searchCoffeePairs(coffee.name);
            if (existing.length > 0) {
              CN.showToast("📷 이미 등록된 원두예요!");
              expandedIndex = existing[0].index;
              renderResults(existing);
            } else {
              CN.addCoffee(coffee);
              var allCoffees = CN.getCoffees();
              var newIdx = allCoffees.length - 1;
              expandedIndex = newIdx;
              $q.value = coffee.name;
              CN.showToast("✨ 카드에서 원두 정보를 등록했어요!");
              renderResults([{ coffee: coffee, index: newIdx }]);
            }
            return;
          }

          // 텍스트만 있는 경우 (fallback) — AI 검색으로
          if (!text) { CN.showToast("인식된 텍스트가 없습니다."); return; }
          var lines = text.split("\n").map(function(l){ return l.trim(); }).filter(Boolean);
          var coffeeName = "";
          for (var i = 0; i < lines.length; i++) {
            if (/원두명|원두\s*이름|name/i.test(lines[i])) {
              coffeeName = lines[i].replace(/.*[:：]/, "").trim();
              break;
            }
          }
          if (!coffeeName && lines.length > 0) coffeeName = lines[0].replace(/.*[:：]/, "").trim();
          if (!coffeeName) { CN.showToast("원두 이름을 인식하지 못했어요."); return; }

          $q.value = coffeeName;
          CN.showToast("📷 인식 완료! AI로 검색 중...");
          var pairs = CN.searchCoffeePairs(coffeeName);
          if (pairs.length > 0) {
            expandedIndex = null;
            renderResults(pairs);
          } else {
            // OCR에서 넘어온 맥락 정보를 AI 검색에 전달
            var ocrContext = (detail.coffee) ? {
              country: detail.coffee.country || "",
              region:  detail.coffee.region  || "",
              farm:    detail.coffee.farm    || ""
            } : null;
            runAiSearch(coffeeName, ocrContext);
          }
        });

        function initFromQuery() {
          var params = new URLSearchParams(location.search);
          var qParam = params.get("q");
          var coffeeId = params.get("coffeeId");
          var expand = params.get("expand");
          if (qParam) {
            $q.value = qParam;
            runSearch();
            return;
          }
          if (coffeeId !== null && coffeeId !== "") {
            var idx = Number(coffeeId);
            var c = CN.getCoffeeByIndex(idx);
            if (c) {
              $q.value = c.name;
              expandedIndex = expand === "1" ? idx : null;
              renderResults([{ coffee: c, index: idx }]);
              return;
            }
          }
          $results.innerHTML = '<div class="empty">원두 이름을 검색해보세요.<br />예: 예가체프, 게이샤, 케냐</div>';
        }

        initFromQuery();
      })();
    </script>
  </body>
</html>
