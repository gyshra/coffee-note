<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Coffee Note. — 탐색</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="common.css">
  <link rel="stylesheet" href="app-shell.css">
  <style>
    .recent-list { padding: 0 14px; }
    .recent-item { display:flex; align-items:center; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--border); cursor:pointer; }
    .recent-item:last-child { border-bottom:none; }
    .recent-q { display:flex; align-items:center; gap:9px; font-size:14px; font-weight:500; }
    .recent-q svg { width:13px; height:13px; color:var(--text-sub); flex-shrink:0; }
    .btn-del { background:none; border:none; cursor:pointer; color:var(--text-sub); font-size:18px; line-height:1; padding:0 2px; }
    .results-meta { font-size:11px; font-weight:600; color:var(--text-sub); padding:10px 14px 6px; }

    .coffee-card { border-bottom:1px solid var(--border); }
    .card-row { display:flex; align-items:flex-start; gap:11px; padding:14px 14px 12px; cursor:pointer; transition:background 0.1s; }
    .card-row:active { background:var(--surface); }
    .card-ico { width:42px; height:42px; background:var(--surface); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
    .card-body { flex:1; min-width:0; }
    .card-name { font-size:15px; font-weight:700; line-height:1.3; margin-bottom:3px; }
    .card-sub { font-size:12px; color:var(--text-sub); font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .card-tags { display:flex; flex-wrap:wrap; gap:5px; margin-top:8px; }
    .tag-sm { font-size:11px; font-weight:600; padding:3px 9px; border:1px solid var(--border); color:var(--text-sub); }
    .card-right { display:flex; flex-direction:column; align-items:flex-end; gap:5px; flex-shrink:0; }
    .card-score { font-size:13px; font-weight:700; color:var(--accent-warm); }
    .card-fav { background:none; border:none; cursor:pointer; font-size:18px; line-height:1; padding:0; }
    .chevron { color:var(--text-sub); transition:transform 0.2s; }
    .chevron svg { width:18px; height:18px; display:block; }
    .coffee-card.open .chevron { transform:rotate(180deg); }

    .detail-panel { display:none; border-top:1px solid var(--border); }
    .detail-panel.open { display:block; }
    .detail-hero { padding:18px 14px 14px; border-bottom:1px solid var(--border); }
    .verified-badge { display:inline-flex; align-items:center; gap:5px; font-size:10px; font-weight:700; letter-spacing:0.8px; text-transform:uppercase; color:#2E7D32; border:1px solid #2E7D32; padding:3px 8px; margin-bottom:10px; }
    .verified-badge svg { width:11px; height:11px; }
    .detail-name { font-size:22px; font-weight:800; line-height:1.25; letter-spacing:-0.5px; margin-bottom:4px; }
    .detail-by { font-size:12px; color:var(--text-sub); font-weight:500; }
    .info-row { display:flex; align-items:baseline; padding:10px 14px; border-bottom:1px solid var(--border); gap:14px; }
    .info-row:last-child { border-bottom:none; }
    .info-k { font-size:13px; color:var(--text-sub); min-width:56px; flex-shrink:0; }
    .info-v { font-size:13px; font-weight:700; flex:1; }
    .info-v.big { font-size:15px; font-weight:800; }
    .flavor-sec { padding:14px 14px 10px; border-top:1px solid var(--border); }
    .flavor-sec-lbl { font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--text-sub); margin-bottom:10px; }
    .flavor-row { display:flex; flex-wrap:wrap; gap:7px; }
    .tag-filled { font-size:13px; font-weight:700; padding:6px 14px; background:var(--text); color:var(--bg); border:1.5px solid var(--text); }
    .tag-outline-lg { font-size:13px; font-weight:600; padding:6px 14px; background:var(--bg); color:var(--text-sub); border:1px solid var(--border); }
    .recorder-row { display:flex; align-items:baseline; justify-content:space-between; padding:12px 14px; border-top:1px solid var(--border); }
    .recorder-lbl { font-size:13px; color:var(--text-sub); }
    .recorder-cnt { font-size:18px; font-weight:800; }
    .detail-actions { display:flex; gap:8px; padding:12px 14px 14px; border-top:1px solid var(--border); }
    .detail-actions .btn-outline { flex:1; height:50px; }
    .detail-actions .btn-fill { flex:1.4; height:50px; }
    .more-toggle { padding:10px 14px; font-size:12px; font-weight:600; color:var(--text-sub); text-decoration:underline; text-underline-offset:2px; cursor:pointer; border-top:1px solid var(--border); text-align:center; }
    .more-panel { display:none; }
    .more-panel.open { display:block; }
    .more-sec { padding:12px 14px; border-top:1px solid var(--border); }
    .more-sec-lbl { font-size:10px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--text-sub); margin-bottom:8px; }
    .more-text { font-size:13px; color:var(--text); line-height:1.7; }
    .predict-row { display:flex; align-items:center; gap:8px; padding:4px 0; }
    .predict-key { font-size:11px; font-weight:700; color:var(--text-sub); min-width:40px; }
    .predict-track { flex:1; height:4px; background:var(--border); }
    .predict-fill { height:100%; background:var(--text); }
    .predict-val { font-size:11px; font-weight:700; min-width:16px; text-align:right; }
    .link-row { display:flex; gap:6px; flex-wrap:wrap; padding:12px 14px; border-top:1px solid var(--border); }
    .btn-link-sm { display:inline-flex; align-items:center; gap:4px; font-size:12px; font-weight:600; color:var(--text-sub); padding:6px 12px; border:1px solid var(--border); background:var(--bg); text-decoration:none; }

    .ocr-cam { width:100%; height:52px; background:var(--text); color:var(--bg); border:none; font-family:inherit; font-size:15px; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:9px; margin-bottom:8px; }
    .ocr-cam svg { width:19px; height:19px; }
    .ocr-gallery { width:100%; height:48px; background:var(--bg); color:var(--text); border:1.5px solid var(--text); font-family:inherit; font-size:14px; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; }
    .ocr-gallery svg { width:17px; height:17px; }
    .ocr-img { width:100%; max-height:175px; object-fit:cover; border:1px solid var(--border); margin-bottom:12px; }
    .ocr-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:14px; }
    .ocr-cell { padding:8px 10px; border:1px solid; }
    .ocr-cell.ok { border-color:#2E7D32; }
    .ocr-cell.na { border-color:var(--border); }
    .ocr-cell-k { font-size:9px; font-weight:700; letter-spacing:0.8px; text-transform:uppercase; color:var(--text-sub); margin-bottom:2px; }
    .ocr-cell-v { font-size:13px; font-weight:600; }
    .ocr-btns { display:flex; gap:8px; }
    .ocr-retry  { flex:1; height:44px; background:var(--bg); color:var(--text); border:1.5px solid var(--text); font-family:inherit; font-size:13px; font-weight:700; cursor:pointer; }
    .ocr-confirm { flex:2; height:44px; background:var(--text); color:var(--bg); border:none; font-family:inherit; font-size:13px; font-weight:700; cursor:pointer; }
    #ocrLoading { display:none; padding:28px; text-align:center; }
    .ocr-result { display:none; }
    .ocr-result.show { display:block; }
  </style>
</head>
<body>

<header class="app-header">
  <div class="app-header__in">
    <a class="app-logo" href="home.html">Coffee<em>.</em></a>
    <div class="app-search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="square"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/></svg>
      <input type="search" id="searchInput" placeholder="원두 이름, 산지, 향미..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" oninput="onInput()" onkeydown="if(event.key==='Enter'){event.target.blur();doSearch();}">
      <button class="app-clear" id="clearBtn" onclick="clearSearch()">✕</button>
    </div>
    <button class="app-hbtn" onclick="openOcr()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
    </button>
  </div>
  <div class="app-filter">
    <button class="chip active" onclick="setFilter('all',this)">전체</button>
    <button class="chip" onclick="setFilter('Ethiopia',this)">에티오피아</button>
    <button class="chip" onclick="setFilter('Colombia',this)">콜롬비아</button>
    <button class="chip" onclick="setFilter('Guatemala',this)">과테말라</button>
    <button class="chip" onclick="setFilter('Kenya',this)">케냐</button>
    <button class="chip" onclick="setFilter('washed',this)">워시드</button>
    <button class="chip" onclick="setFilter('natural',this)">내추럴</button>
    <button class="chip" onclick="setFilter('honey',this)">허니</button>
  </div>
</header>

<main class="app-content">
  <div id="recentSection">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 14px 8px">
      <span class="sec-label">최근 검색</span>
      <button style="font-size:11px;color:var(--text-sub);background:none;border:none;cursor:pointer;text-decoration:underline;text-underline-offset:2px;font-family:inherit" onclick="clearAllRecent()">전체 삭제</button>
    </div>
    <div class="recent-list" id="recentList"></div>
  </div>
  <div class="loading-wrap" id="loadingWrap"><div class="loading-track"><div class="loading-fill"></div></div><div class="loading-txt" id="loadingTxt">AI가 검색 중...</div></div>
  <div class="empty-wrap" id="emptyWrap"><div class="empty-ico">☕</div><div class="empty-t">검색 결과가 없어요</div><div class="empty-d">다른 키워드로 검색하거나<br>직접 등록해보세요</div><button class="empty-btn" onclick="location.href='register-coffee.html'">직접 등록</button></div>
  <div id="resultsSection" style="display:none"><div class="results-meta" id="resultsMeta"></div><div id="resultsList"></div></div>
</main>

<button class="app-fab" onclick="location.href='register-coffee.html'">＋</button>

<div class="sheet-overlay" id="ocrOverlay" onclick="overlayTap(event)">
  <div class="sheet">
    <div class="sheet-drag"></div>
    <div class="sheet-hd"><span class="sheet-hd-title">커피 봉지 스캔</span><button class="sheet-close" onclick="closeOcr()">✕</button></div>
    <div class="sheet-body">
      <div id="ocrPick">
        <button class="ocr-cam" onclick="triggerCam()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>지금 촬영하기</button>
        <button class="ocr-gallery" onclick="triggerGallery()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square"><rect x="3" y="3" width="18" height="18"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg>갤러리에서 선택</button>
        <input type="file" id="camInput" accept="image/*" capture="environment" style="display:none" onchange="handleFile(this)">
        <input type="file" id="galInput"  accept="image/*" style="display:none" onchange="handleFile(this)">
      </div>
      <div id="ocrLoading"><div class="loading-track" style="margin:0 auto 12px"><div class="loading-fill"></div></div><div class="loading-txt">AI가 라벨을 분석 중...</div></div>
      <div class="ocr-result" id="ocrResult">
        <img class="ocr-img" id="ocrPreview" alt="">
        <div style="font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-sub);margin-bottom:8px">인식 결과</div>
        <div class="ocr-grid" id="ocrGrid"></div>
        <div class="ocr-btns"><button class="ocr-retry" onclick="resetOcr()">다시 찍기</button><button class="ocr-confirm" onclick="confirmOcr()">이 정보로 검색</button></div>
      </div>
    </div>
  </div>
</div>

<nav class="app-nav">
  <div class="app-nav__in">
    <a href="home.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg><span class="nav-label">홈</span></a>
    <a href="index.html" class="nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="square"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/></svg><span class="nav-label">탐색</span></a>
    <a href="notes.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg><span class="nav-label">노트</span></a>
    <a href="mypage.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span class="nav-label">마이</span></a>
  </div>
</nav>

<div class="app-toast" id="toast"></div>

<script src="supabase.js"></script>
<script src="common.js"></script>
<script src="shared-utils.js"></script>
<script src="feature-ocr.js"></script>
<script src="feature-search.js"></script>
<script src="data-recent.js"></script>
<script src="ui-coffee-card.js"></script>
<script>
let activeFilter='all',results=[],expandedIdx=-1,searchTimer=null;
document.addEventListener('DOMContentLoaded',()=>{renderRecent();const p=new URLSearchParams(location.search);const q=p.get('q')||p.get('query');const cid=p.get('coffeeId');if(q){document.getElementById('searchInput').value=q;syncClear();doSearch();}else if(cid!==null){const list=localDB();const idx=parseInt(cid);if(list[idx])showResults([list[idx]],idx,p.get('expand')==='1');else showRecent();}else showRecent();});
function localDB(){return FeatureSearch.getLocalCoffees();}
function onInput(){syncClear();clearTimeout(searchTimer);const v=document.getElementById('searchInput').value.trim();if(!v){showRecent();return;}if(v.length>=2)searchTimer=setTimeout(doSearch,550);}
function syncClear(){document.getElementById('clearBtn').style.display=document.getElementById('searchInput').value?'block':'none';}
function clearSearch(){document.getElementById('searchInput').value='';syncClear();showRecent();document.getElementById('searchInput').focus();}
function setFilter(v,el){document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));el.classList.add('active');activeFilter=v;if(results.length)renderList(applyFilter(results));}
function applyFilter(arr){return FeatureSearch.filterByCategory(arr,activeFilter);}
function hideAll(){document.getElementById('recentSection').style.display='none';document.getElementById('resultsSection').style.display='none';document.getElementById('emptyWrap').classList.remove('show');document.getElementById('loadingWrap').classList.remove('show');}
function showRecent(){hideAll();results=[];expandedIdx=-1;document.getElementById('recentSection').style.display='block';}
function setLoad(on,txt){const w=document.getElementById('loadingWrap');if(on){w.classList.add('show');if(txt)document.getElementById('loadingTxt').textContent=txt;}else w.classList.remove('show');}
function showEmpty(){hideAll();document.getElementById('emptyWrap').classList.add('show');}
function showResults(arr,autoIdx=-1,autoOpen=false){hideAll();results=arr;document.getElementById('resultsSection').style.display='block';document.getElementById('resultsMeta').textContent=arr.length===1?'1개의 원두':`${arr.length}개의 원두`;renderList(applyFilter(arr),autoIdx,autoOpen);}
async function doSearch(){const q=document.getElementById('searchInput').value.trim();if(!q){showRecent();return;}saveRecent(q);hideAll();setLoad(true,'AI가 검색 중...');const local=FeatureSearch.filterByKeyword(FeatureSearch.getLocalCoffees(),q);if(local.length){setLoad(false);showResults(local);return;}try{setLoad(true,'AI가 원두 정보를 찾는 중...');const data=await FeatureSearch.searchAPI(q);if(data.coffee){FeatureSearch.saveToLocalIfNew(data.coffee);setLoad(false);showResults([data.coffee],0,true);}else{setLoad(false);showEmpty();}}catch{setLoad(false);showEmpty();}}
function renderList(arr,autoIdx=-1,autoOpen=false){const el=document.getElementById('resultsList');el.innerHTML='';if(!arr.length){showEmpty();return;}arr.forEach((c,i)=>el.appendChild(buildCard(c,i)));if(autoIdx>=0&&autoOpen)expandCard(autoIdx);}
function buildCard(coffee,idx){var wrap=document.createElement('div');wrap.className='coffee-card';wrap.id='card-'+idx;wrap.innerHTML=UICoffeeCard.buildCardHTML(coffee,idx,isFav(idx));return wrap;}
function toggleCard(idx){if(expandedIdx===idx){collapseCard(idx);return;}if(expandedIdx>=0)collapseCard(expandedIdx);expandCard(idx);}
function collapseCard(idx){document.getElementById(`card-${idx}`)?.classList.remove('open');const p=document.getElementById(`detail-${idx}`);if(p)p.classList.remove('open');expandedIdx=-1;}
function expandCard(idx){const card=document.getElementById(`card-${idx}`);const panel=document.getElementById(`detail-${idx}`);if(!card||!panel)return;card.classList.add('open');expandedIdx=idx;if(panel.dataset.built){panel.classList.add('open');panel.scrollIntoView({behavior:'smooth',block:'nearest'});return;}const coffee=results[idx]||localDB()[idx];if(!coffee)return;panel.innerHTML=buildDetail(coffee,idx);panel.dataset.built='1';panel.classList.add('open');setTimeout(()=>panel.scrollIntoView({behavior:'smooth',block:'nearest'}),80);if(!coffee.story&&!coffee.description)loadStory(coffee,panel,idx);}
function buildDetail(c,idx){return UICoffeeCard.buildDetailHTML(c,idx);}
function toggleMore(idx){const el=document.getElementById(`more-${idx}`);if(!el)return;const open=el.classList.toggle('open');const t=el.previousElementSibling;if(t)t.textContent=open?'상세 정보 접기 ↑':'상세 정보 더보기 ↓';}
function loadStory(c,panel,idx){UICoffeeCard.fetchStory(c.name,c.country,function(story){var el=panel.querySelector('#story-'+idx);if(el)el.textContent=story;});}
function goTasting(idx){var c=results[idx]||localDB()[idx];if(!c)return;var nav=UICoffeeCard.prepareGoTasting(c,localDB());nav.sessionItems.forEach(function(si){sessionStorage.setItem(si.key,si.value);});location.href=nav.url;}
function goRecipe(idx){var c=results[idx]||localDB()[idx];if(!c)return;var nav=UICoffeeCard.prepareGoRecipe(c,localDB());nav.sessionItems.forEach(function(si){sessionStorage.setItem(si.key,si.value);});location.href=nav.url;}
function isFav(idx){return CoffeeNote.isFavorite(idx);}
function toggleFavBtn(idx,btn){var nowFav=CoffeeNote.toggleFavorite(idx);btn.textContent=nowFav?'♥':'♡';toast(nowFav?'즐겨찾기 추가':'즐겨찾기 제거');}
function getRecent(){return DataRecent.getAll();}
function saveRecent(q){DataRecent.add(q);renderRecent();}
function deleteRecent(q){DataRecent.remove(q);renderRecent();}
function clearAllRecent(){DataRecent.clearAll();renderRecent();}
function renderRecent(){const list=getRecent();const sec=document.getElementById('recentSection');if(!list.length){sec.style.display='none';return;}sec.style.display='block';document.getElementById('recentList').innerHTML=list.map(q=>`<div class="recent-item"><div class="recent-q" onclick="clickRecent('${q.replace(/'/g,"\\'")}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square"><polyline points="1,4 1,10 7,10"/><path d="M3.51 15a9 9 0 1 0 .49-3.51"/></svg>${q}</div><button class="btn-del" onclick="deleteRecent('${q.replace(/'/g,"\\'")}')">×</button></div>`).join('');}
function clickRecent(q){document.getElementById('searchInput').value=q;syncClear();doSearch();}
function openOcr(){document.getElementById('ocrOverlay').classList.add('open');document.body.style.overflow='hidden';}
function closeOcr(){document.getElementById('ocrOverlay').classList.remove('open');document.body.style.overflow='';}
function overlayTap(e){if(e.target===document.getElementById('ocrOverlay'))closeOcr();}
function triggerCam(){document.getElementById('camInput').click();}
function triggerGallery(){document.getElementById('galInput').click();}
async function handleFile(input){const file=input.files[0];if(!file)return;const reader=new FileReader();reader.onload=async e=>{const b64=e.target.result;document.getElementById('ocrPreview').src=b64;document.getElementById('ocrPick').style.display='none';document.getElementById('ocrLoading').style.display='block';FeatureOCR.processImage(b64,function(payload,rawText){renderOcrGrid(payload,rawText);document.getElementById('ocrLoading').style.display='none';},function(){resetOcr();toast('인식 실패. 다시 시도해주세요.');document.getElementById('ocrLoading').style.display='none';});};reader.readAsDataURL(file);}
function renderOcrGrid(c,raw){const gd=FeatureOCR.buildGridData(c,raw);document.getElementById('ocrGrid').innerHTML=gd.cells.map(function(cell){return '<div class="ocr-cell ok"><div class="ocr-cell-k">'+cell.label+'</div><div class="ocr-cell-v">'+cell.value+'</div></div>';}).join('')+(gd.rawText?'<div class="ocr-cell na" style="grid-column:1/-1"><div class="ocr-cell-k">원본</div><div class="ocr-cell-v" style="font-size:11px;color:var(--text-sub)">'+gd.rawText+'</div></div>':'');document.getElementById('ocrResult').classList.add('show');}
function resetOcr(){FeatureOCR.reset();document.getElementById('ocrResult').classList.remove('show');document.getElementById('ocrPick').style.display='block';['camInput','galInput'].forEach(id=>document.getElementById(id).value='');}
function confirmOcr(){const result=FeatureOCR.confirm();if(!result)return;sessionStorage.setItem('ocr_result',JSON.stringify(result.payload));closeOcr();document.getElementById('searchInput').value=result.query;syncClear();doSearch();}
</script>
</body>
</html>
