<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Coffee Note. — 원두 탐색</title>
  <link rel="stylesheet" href="common.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&display=swap" rel="stylesheet">
  <style>
    /* ─── 기반 변수 ─────────────────────────────── */
    :root {
      --bg:          #FFFFFF;
      --text:        #121212;
      --text-sub:    #888888;
      --accent:      #121212;
      --accent-warm: #8C7355;
      --border:      #E0E0E0;
      --surface:     #F8F7F5;
      --nav-h:       60px;
      --header-h:    56px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Pretendard Variable', 'Pretendard', -apple-system, sans-serif; overflow-x: hidden; }

    /* ─── 헤더 ──────────────────────────────────── */
    .header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: var(--header-h);
      background: var(--bg);
      border-bottom: 1.5px solid var(--text);
      display: flex; align-items: center; gap: 12px;
      padding: 0 16px;
    }
    .header-logo {
      font-family: 'Playfair Display', serif;
      font-weight: 900; font-size: 20px;
      letter-spacing: -0.5px; color: var(--text);
      white-space: nowrap; flex-shrink: 0;
    }
    .header-logo span { color: var(--accent-warm); }

    /* 검색 바 */
    .search-wrap {
      flex: 1; display: flex; align-items: center;
      border: 1.5px solid var(--text);
      height: 36px; padding: 0 10px; gap: 8px;
      background: var(--bg);
    }
    .search-wrap input {
      flex: 1; border: none; outline: none;
      font-family: inherit; font-size: 14px; font-weight: 500;
      color: var(--text); background: transparent;
    }
    .search-wrap input::placeholder { color: var(--text-sub); }
    .btn-icon {
      background: none; border: none; cursor: pointer;
      padding: 4px; display: flex; align-items: center; justify-content: center;
      color: var(--text);
    }
    .btn-icon svg { width: 18px; height: 18px; }

    /* 헤더 우측 버튼 */
    .header-actions { display: flex; gap: 4px; flex-shrink: 0; }

    /* ─── 본문 스크롤 영역 ───────────────────────── */
    .wrap {
      padding-top: calc(var(--header-h) + 8px);
      padding-bottom: calc(var(--nav-h) + 16px);
      min-height: 100vh;
    }

    /* ─── 필터 칩 ───────────────────────────────── */
    .filter-row {
      display: flex; gap: 8px; overflow-x: auto; padding: 10px 16px 8px;
      scrollbar-width: none;
    }
    .filter-row::-webkit-scrollbar { display: none; }
    .chip {
      flex-shrink: 0;
      border: 1px solid var(--border); padding: 5px 12px;
      font-size: 12px; font-weight: 600; color: var(--text-sub);
      cursor: pointer; background: var(--bg); white-space: nowrap;
      transition: all 0.15s;
    }
    .chip.active {
      border-color: var(--text); color: var(--text); background: var(--surface);
    }
    .chip:active { opacity: 0.7; }

    /* ─── 섹션 제목 ─────────────────────────────── */
    .section-label {
      font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--text-sub);
      padding: 12px 16px 8px;
    }
    .section-divider { height: 1px; background: var(--border); margin: 0 16px; }

    /* ─── 검색 히스토리 ─────────────────────────── */
    #recentSection { padding-bottom: 4px; }
    .recent-list { padding: 0 16px; }
    .recent-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 0; border-bottom: 1px solid var(--border);
      cursor: pointer;
    }
    .recent-item:last-child { border-bottom: none; }
    .recent-q {
      font-size: 14px; font-weight: 500; color: var(--text);
      display: flex; align-items: center; gap: 8px;
    }
    .recent-q svg { color: var(--text-sub); flex-shrink: 0; }
    .btn-del-recent {
      background: none; border: none; cursor: pointer;
      color: var(--text-sub); padding: 2px; font-size: 16px; line-height: 1;
    }
    .recent-clear {
      font-size: 12px; color: var(--text-sub); padding: 6px 16px 12px;
      cursor: pointer; text-decoration: underline; text-underline-offset: 2px;
    }

    /* ─── 검색 결과 목록 ─────────────────────────── */
    #resultsSection { display: none; }
    .results-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px 8px;
    }
    .results-count { font-size: 12px; color: var(--text-sub); font-weight: 500; }

    /* 원두 카드 */
    .coffee-card {
      border-bottom: 1px solid var(--border);
      cursor: pointer; transition: background 0.1s;
    }
    .coffee-card:active { background: var(--surface); }
    .coffee-card-header {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 14px 16px;
    }
    .card-icon {
      width: 44px; height: 44px; flex-shrink: 0;
      background: var(--surface); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .card-meta { flex: 1; min-width: 0; }
    .card-name {
      font-size: 15px; font-weight: 700; color: var(--text);
      line-height: 1.3; margin-bottom: 2px;
    }
    .card-sub {
      font-size: 12px; color: var(--text-sub); font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .card-tags { display: flex; gap: 5px; margin-top: 7px; flex-wrap: wrap; }
    .flavor-tag {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 11px; font-weight: 600; padding: 3px 8px;
      border: 1px solid; border-radius: 0;
    }
    .flavor-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .card-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex-shrink: 0; }
    .card-score {
      font-size: 13px; font-weight: 700;
      color: var(--accent-warm);
    }
    .card-score small { font-size: 10px; font-weight: 500; color: var(--text-sub); }
    .card-fav {
      background: none; border: none; cursor: pointer;
      font-size: 18px; padding: 0; line-height: 1;
    }

    /* ─── 원두 상세 패널 ─────────────────────────── */
    .detail-panel {
      display: none; background: var(--bg);
      border-bottom: 2px solid var(--text);
      overflow: hidden;
    }
    .detail-panel.open { display: block; }

    /* 상세 내부 섹션 */
    .detail-section { padding: 16px 16px 12px; border-bottom: 1px solid var(--border); }
    .detail-section:last-child { border-bottom: none; }

    /* 신뢰도 배지 */
    .confidence-bar {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 16px; background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .confidence-dot { width: 8px; height: 8px; border-radius: 50%; }
    .confidence-label { font-size: 11px; font-weight: 700; color: var(--text-sub); letter-spacing: 0.5px; }
    .confidence-text { font-size: 11px; color: var(--text-sub); }
    .source-tag {
      margin-left: auto; font-size: 10px; font-weight: 700;
      letter-spacing: 0.5px; text-transform: uppercase;
      color: var(--text-sub); padding: 2px 6px; border: 1px solid var(--border);
    }

    /* 정보 그리드 */
    .info-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 0;
    }
    .info-cell {
      padding: 10px 0; border-bottom: 1px solid var(--border);
    }
    .info-cell:nth-child(odd) { padding-right: 16px; border-right: 1px solid var(--border); }
    .info-cell:nth-child(even) { padding-left: 16px; }
    .info-cell:nth-last-child(-n+2) { border-bottom: none; }
    .info-key { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text-sub); margin-bottom: 3px; }
    .info-val { font-size: 13px; font-weight: 600; color: var(--text); }

    /* CQI 점수 */
    .cqi-row {
      display: flex; align-items: center; gap: 12px; padding: 14px 16px;
      border-bottom: 1px solid var(--border); background: var(--surface);
    }
    .cqi-score {
      font-family: 'Playfair Display', serif; font-size: 36px; font-weight: 900;
      color: var(--text); line-height: 1;
    }
    .cqi-info { flex: 1; }
    .cqi-label { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text-sub); }
    .cqi-desc { font-size: 12px; color: var(--text-sub); margin-top: 2px; }
    .cqi-bar-wrap { margin-top: 6px; height: 3px; background: var(--border); }
    .cqi-bar-fill { height: 100%; background: var(--accent-warm); }

    /* AI 예측 향미 점수 */
    .predict-grid {
      display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px;
      padding: 12px 0 4px;
    }
    .predict-item { text-align: center; }
    .predict-bar-wrap {
      height: 48px; display: flex; flex-direction: column-reverse;
      margin: 0 auto 4px; width: 20px; background: var(--border);
      position: relative;
    }
    .predict-bar-fill { width: 100%; background: var(--text); transition: height 0.4s; }
    .predict-val { font-size: 13px; font-weight: 700; color: var(--text); }
    .predict-key { font-size: 10px; color: var(--text-sub); font-weight: 600; }

    /* 향미 태그 섹션 */
    .flavor-tags-wrap { display: flex; flex-wrap: wrap; gap: 6px; padding: 12px 0 4px; }
    .flavor-tag-lg {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 12px; font-weight: 700; padding: 6px 12px;
      border: 1.5px solid; cursor: default;
    }
    .raw-notes-wrap { margin-top: 10px; }
    .raw-notes-label { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text-sub); margin-bottom: 5px; }
    .raw-notes-text { font-size: 11px; color: var(--text-sub); font-style: italic; line-height: 1.5; }

    /* 스토리 텍스트 */
    .story-text {
      font-size: 13px; color: var(--text); line-height: 1.7;
      font-weight: 400;
    }
    .story-loading {
      font-size: 13px; color: var(--text-sub); font-style: italic;
    }

    /* 브루잉 팁 */
    .brew-tips { font-size: 13px; color: var(--text-sub); line-height: 1.6; }
    .brew-tip-row { display: flex; gap: 8px; padding: 5px 0; border-bottom: 1px solid var(--border); }
    .brew-tip-row:last-child { border-bottom: none; }
    .brew-tip-key { font-size: 11px; font-weight: 700; color: var(--text); min-width: 60px; flex-shrink: 0; }
    .brew-tip-val { font-size: 12px; color: var(--text-sub); }

    /* 커뮤니티 신호 */
    .community-row {
      display: flex; align-items: center; gap: 10px;
    }
    .community-stat { text-align: center; flex: 1; }
    .community-num { font-size: 20px; font-weight: 700; color: var(--text); }
    .community-key { font-size: 10px; font-weight: 700; color: var(--text-sub); letter-spacing: 0.5px; text-transform: uppercase; margin-top: 2px; }
    .community-divider { width: 1px; height: 36px; background: var(--border); }

    /* 미니 후기 */
    .review-card {
      padding: 10px 0; border-bottom: 1px solid var(--border);
    }
    .review-card:last-child { border-bottom: none; }
    .review-header { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
    .review-avatar {
      width: 24px; height: 24px; background: var(--text);
      color: var(--bg); font-size: 10px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
    }
    .review-nick { font-size: 12px; font-weight: 600; }
    .review-stars { font-size: 11px; color: var(--accent-warm); margin-left: auto; }
    .review-text { font-size: 12px; color: var(--text-sub); line-height: 1.5; }
    .review-tags { display: flex; gap: 5px; margin-top: 5px; flex-wrap: wrap; }
    .review-tag { font-size: 10px; color: var(--text-sub); font-weight: 600; }

    /* 액션 버튼 */
    .detail-actions {
      display: flex; gap: 8px; padding: 14px 16px 12px;
    }
    .btn-primary {
      flex: 2; height: 48px; background: var(--text); color: var(--bg);
      border: none; font-family: inherit; font-size: 14px; font-weight: 700;
      cursor: pointer; letter-spacing: 0.3px; transition: opacity 0.15s;
    }
    .btn-primary:active { opacity: 0.8; }
    .btn-secondary {
      flex: 1; height: 48px; background: var(--bg); color: var(--text);
      border: 1.5px solid var(--text); font-family: inherit; font-size: 13px; font-weight: 700;
      cursor: pointer; letter-spacing: 0.3px; transition: all 0.15s;
    }
    .btn-secondary:active { background: var(--surface); }
    .btn-link {
      flex: 1; height: 48px; background: var(--bg); color: var(--accent-warm);
      border: 1.5px solid var(--border); font-family: inherit; font-size: 12px; font-weight: 600;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 4px;
    }
    .btn-link:active { background: var(--surface); }

    /* ─── 빈 상태 ────────────────────────────────── */
    .empty-state {
      display: none; flex-direction: column; align-items: center;
      justify-content: center; padding: 60px 32px; text-align: center;
    }
    .empty-state.show { display: flex; }
    .empty-icon { font-size: 40px; margin-bottom: 16px; opacity: 0.3; }
    .empty-title { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
    .empty-desc { font-size: 13px; color: var(--text-sub); line-height: 1.6; }
    .empty-actions { margin-top: 20px; display: flex; gap: 8px; }
    .btn-outline {
      padding: 10px 20px; border: 1.5px solid var(--text);
      background: var(--bg); color: var(--text);
      font-family: inherit; font-size: 13px; font-weight: 700; cursor: pointer;
    }

    /* ─── 로딩 ───────────────────────────────────── */
    .loading-wrap {
      display: none; flex-direction: column; align-items: center;
      padding: 48px 16px; gap: 12px;
    }
    .loading-wrap.show { display: flex; }
    .loading-bar {
      width: 100%; max-width: 200px; height: 2px; background: var(--border); overflow: hidden;
    }
    .loading-bar-fill {
      height: 100%; width: 40%; background: var(--text);
      animation: loading-slide 1.2s ease-in-out infinite;
    }
    @keyframes loading-slide {
      0% { transform: translateX(-200%); }
      100% { transform: translateX(350%); }
    }
    .loading-text { font-size: 12px; color: var(--text-sub); font-weight: 500; }

    /* ─── OCR 카메라 시트 ───────────────────────── */
    .sheet-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      z-index: 300; display: none; align-items: flex-end;
    }
    .sheet-overlay.open { display: flex; }
    .sheet {
      width: 100%; background: var(--bg);
      border-top: 2px solid var(--text);
      max-height: 85vh; overflow-y: auto;
      animation: slide-up 0.25s ease;
    }
    @keyframes slide-up {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
    .sheet-handle {
      width: 36px; height: 3px; background: var(--border);
      margin: 12px auto 0; border-radius: 2px;
    }
    .sheet-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px; border-bottom: 1px solid var(--border);
    }
    .sheet-title { font-size: 16px; font-weight: 700; }
    .sheet-close {
      background: none; border: none; cursor: pointer;
      font-size: 20px; color: var(--text-sub); padding: 0; line-height: 1;
    }
    .sheet-body { padding: 20px 16px; }

    /* OCR 업로드 영역 */
    .ocr-upload {
      border: 2px dashed var(--border);
      padding: 40px 24px; text-align: center; cursor: pointer;
      transition: border-color 0.15s;
    }
    .ocr-upload:hover { border-color: var(--text); }
    .ocr-upload input { display: none; }
    .ocr-upload-icon { font-size: 36px; margin-bottom: 12px; }
    .ocr-upload-title { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
    .ocr-upload-desc { font-size: 12px; color: var(--text-sub); }

    /* OCR 미리보기 */
    .ocr-preview-wrap { display: none; }
    .ocr-preview-wrap.show { display: block; }
    .ocr-img-preview {
      width: 100%; max-height: 200px; object-fit: cover;
      border: 1px solid var(--border); margin-bottom: 12px;
    }
    .ocr-result-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px;
    }
    .ocr-field {
      padding: 8px 10px; border: 1px solid var(--border);
    }
    .ocr-field-key { font-size: 10px; font-weight: 700; color: var(--text-sub); letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 2px; }
    .ocr-field-val { font-size: 13px; font-weight: 600; color: var(--text); }
    .ocr-field.detected { border-color: #639922; }
    .ocr-field.inferred { border-color: var(--border); }
    .ocr-btn-row { display: flex; gap: 8px; }

    /* ─── 하단 네비 ──────────────────────────────── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
      height: var(--nav-h);
      display: flex; background: var(--bg);
      border-top: 1.5px solid var(--text);
    }
    .nav-item {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 3px; cursor: pointer; text-decoration: none;
      color: var(--text-sub); transition: color 0.15s;
    }
    .nav-item.active { color: var(--text); }
    .nav-item svg { width: 20px; height: 20px; }
    .nav-label { font-size: 9px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; }

    /* ─── 토스트 ─────────────────────────────────── */
    .toast {
      position: fixed; bottom: calc(var(--nav-h) + 16px); left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--text); color: var(--bg);
      padding: 10px 20px; font-size: 13px; font-weight: 600;
      opacity: 0; transition: all 0.3s; z-index: 400; white-space: nowrap;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ─── 직접 등록 FAB ─────────────────────────── */
    .fab {
      position: fixed; bottom: calc(var(--nav-h) + 16px); right: 16px;
      width: 48px; height: 48px;
      background: var(--text); color: var(--bg);
      border: none; cursor: pointer; font-size: 22px;
      display: flex; align-items: center; justify-content: center;
      z-index: 150; box-shadow: 0 2px 12px rgba(0,0,0,0.2);
      transition: transform 0.15s;
    }
    .fab:active { transform: scale(0.95); }
    .fab-tooltip {
      position: fixed; bottom: calc(var(--nav-h) + 72px); right: 16px;
      background: var(--text); color: var(--bg);
      font-size: 11px; font-weight: 700; padding: 5px 10px;
      white-space: nowrap; pointer-events: none;
      opacity: 0; transform: translateY(4px); transition: all 0.2s; z-index: 150;
    }
    .fab:hover + .fab-tooltip { opacity: 1; transform: translateY(0); }

    /* ─── 확장 화살표 ────────────────────────────── */
    .expand-arrow {
      width: 20px; height: 20px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-sub); transition: transform 0.2s;
    }
    .coffee-card.expanded .expand-arrow { transform: rotate(180deg); }

    /* 반응형 */
    @media (min-width: 480px) {
      .wrap { max-width: 480px; margin: 0 auto; }
      .header { max-width: 480px; left: 50%; transform: translateX(-50%); right: auto; width: 480px; }
      .bottom-nav { max-width: 480px; left: 50%; transform: translateX(-50%); right: auto; width: 480px; }
      .fab { right: calc(50% - 480px/2 + 16px); }
      .fab-tooltip { right: calc(50% - 480px/2 + 16px); }
      .toast { max-width: 480px; }
    }
  </style>
</head>
<body>

<!-- ── 헤더 ── -->
<header class="header">
  <div class="header-logo">Coffee<span>.</span></div>
  <div class="search-wrap">
    <button class="btn-icon" onclick="handleSearch()" aria-label="검색">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="square">
        <circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/>
      </svg>
    </button>
    <input type="text" id="searchInput" placeholder="원두 이름, 산지, 향미로 검색..."
      autocomplete="off" autocorrect="off"
      oninput="onSearchInput()" onkeydown="if(event.key==='Enter') handleSearch()">
    <button class="btn-icon" id="clearBtn" onclick="clearSearch()" style="display:none" aria-label="지우기">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="square">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>
  <div class="header-actions">
    <button class="btn-icon" onclick="openOcrSheet()" aria-label="카메라 OCR">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square">
        <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>

<!-- ── 스크립트 ── -->
<script src="supabase.js"></script>
<script src="common.js"></script>
<script>
/* ═══════════════════════════════════════════════
   Coffee Note — index.html (탐색 화면)
   Phase B-1 | v30
   ═══════════════════════════════════════════════ */

// ── SCA 향미 카테고리 컬러 맵 ──────────────────
const SCA_COLORS = {
  'Fruity':'#E24B4A','과일향':'#E24B4A',
  'Floral':'#D4537E','꽃향':'#D4537E',
  'Sweet':'#EF9F27','단맛':'#EF9F27',
  'Nutty/Cocoa':'#854F0B','견과/코코아':'#854F0B',
  'Spices':'#993C1D','향신료':'#993C1D',
  'Roasted':'#5F5E5A','로스티드':'#5F5E5A',
  'Green/Vegetative':'#639922','풀/식물향':'#639922',
  'Sour/Fermented':'#D85A30','신맛/발효':'#D85A30',
  'Other':'#888888','기타':'#888888'
};

// 향미 → 카테고리 매핑 (주요 향미)
const NOTE_TO_CAT = {
  'Blueberry':'Fruity','블루베리':'Fruity','Raspberry':'Fruity','라즈베리':'Fruity',
  'Strawberry':'Fruity','딸기':'Fruity','Cherry':'Fruity','체리':'Fruity',
  'Peach':'Fruity','복숭아':'Fruity','Citrus':'Fruity','시트러스':'Fruity',
  'Lemon':'Fruity','레몬':'Fruity','Orange':'Fruity','오렌지':'Fruity',
  'Grape':'Fruity','포도':'Fruity','Apple':'Fruity','사과':'Fruity',
  'Jasmine':'Floral','자스민':'Floral','Rose':'Floral','장미':'Floral',
  'Lavender':'Floral','라벤더':'Floral','Floral':'Floral','꽃향':'Floral',
  'Honey':'Sweet','꿀':'Sweet','Caramel':'Sweet','카라멜':'Sweet',
  'Vanilla':'Sweet','바닐라':'Sweet','Maple':'Sweet','메이플':'Sweet',
  'Brown Sugar':'Sweet','흑설탕':'Sweet','Chocolate':'Nutty/Cocoa',
  'Hazelnut':'Nutty/Cocoa','헤이즐넛':'Nutty/Cocoa',
  'Almond':'Nutty/Cocoa','아몬드':'Nutty/Cocoa',
  'Cocoa':'Nutty/Cocoa','코코아':'Nutty/Cocoa',
  'Cinnamon':'Spices','시나몬':'Spices','Cardamom':'Spices','카다멈':'Spices',
  'Smoky':'Roasted','스모키':'Roasted','Roasted':'Roasted',
  'Green':'Green/Vegetative','Herb':'Green/Vegetative','허브':'Green/Vegetative',
  'Winey':'Sour/Fermented','와인':'Sour/Fermented',
  'Fermented':'Sour/Fermented','발효':'Sour/Fermented'
};

function getNoteColor(note) {
  const cat = NOTE_TO_CAT[note] || 'Other';
  return SCA_COLORS[cat] || '#888888';
}

// ── 상태 ──────────────────────────────────────
let activeFilter = 'all';
let currentResults = [];
let expandedIndex = -1;
let ocrData = null;
let searchTimer = null;

// ── 초기화 ────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  renderRecent();
  handleUrlParams();
});

function handleUrlParams() {
  const params = new URLSearchParams(location.search);
  const q = params.get('q') || params.get('query');
  const coffeeId = params.get('coffeeId');
  const expand = params.get('expand');

  if (q) {
    document.getElementById('searchInput').value = q;
    updateClearBtn();
    handleSearch();
  } else if (coffeeId !== null) {
    const coffees = getCoffeesLocal();
    const idx = parseInt(coffeeId);
    if (coffees[idx]) {
      showResults([coffees[idx]], idx, expand === '1');
    } else {
      showRecentSection();
    }
  } else {
    showRecentSection();
  }
}

// ── 로컬 커피 불러오기 ─────────────────────────
function getCoffeesLocal() {
  try {
    // common.js의 getCoffees() 사용 (없으면 직접 읽기)
    if (typeof getCoffees === 'function') return getCoffees();
    return JSON.parse(localStorage.getItem('coffee_note_coffees') || '[]');
  } catch { return []; }
}

function saveCoffeeLocal(coffee) {
  try {
    if (typeof saveCoffee === 'function') return saveCoffee(coffee);
    const list = getCoffeesLocal();
    list.unshift(coffee);
    localStorage.setItem('coffee_note_coffees', JSON.stringify(list));
    return list.length - 1;
  } catch { return -1; }
}

// ── 필터 ──────────────────────────────────────
function setFilter(val, el) {
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  activeFilter = val;
  if (currentResults.length > 0) applyFilter();
}

function applyFilter() {
  let filtered = currentResults;
  if (activeFilter !== 'all') {
    const f = activeFilter.toLowerCase();
    filtered = currentResults.filter(c => {
      const haystack = `${c.country} ${c.process} ${c.region} ${c.variety}`.toLowerCase();
      return haystack.includes(f);
    });
  }
  renderList(filtered);
}

// ── 검색 인풋 핸들러 ──────────────────────────
function onSearchInput() {
  const val = document.getElementById('searchInput').value;
  updateClearBtn();
  clearTimeout(searchTimer);
  if (val.length === 0) { showRecentSection(); return; }
  if (val.length >= 2) {
    searchTimer = setTimeout(handleSearch, 600);
  }
}

function updateClearBtn() {
  const val = document.getElementById('searchInput').value;
  document.getElementById('clearBtn').style.display = val ? 'flex' : 'none';
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  updateClearBtn();
  showRecentSection();
  document.getElementById('searchInput').focus();
}

// ── 검색 실행 ─────────────────────────────────
async function handleSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) { showRecentSection(); return; }

  saveRecent(q);
  showLoading('AI가 원두 정보를 검색하는 중...');
  hideAll();

  // 1차: 로컬 DB 검색
  const localResults = searchLocal(q);
  if (localResults.length > 0) {
    setLoading(false);
    showResults(localResults);
    return;
  }

  // 2차: API 검색
  try {
    setLoading(true, 'AI가 원두 정보를 찾는 중...');
    const res = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
    if (!res.ok) throw new Error(`API ${res.status}`);
    const data = await res.json();

    if (data.coffee) {
      // 결과를 로컬에 캐시
      const coffees = getCoffeesLocal();
      const existing = coffees.findIndex(c =>
        c.name && c.name.toLowerCase() === (data.coffee.name || '').toLowerCase()
      );
      if (existing === -1) {
        saveCoffeeLocal(data.coffee);
      }
      setLoading(false);
      showResults([data.coffee], 0, true, data);
    } else {
      setLoading(false);
      showEmpty();
    }
  } catch(e) {
    console.warn('API 검색 실패:', e);
    setLoading(false);
    showEmpty();
  }
}

function searchLocal(q) {
  const coffees = getCoffeesLocal();
  const kw = q.toLowerCase();
  return coffees.filter(c => {
    const text = `${c.name} ${c.country} ${c.region} ${c.variety} ${c.process} ${(c.cup_notes||[]).join(' ')}`.toLowerCase();
    return text.includes(kw);
  });
}

// ── 화면 상태 제어 ────────────────────────────
function hideAll() {
  document.getElementById('recentSection').style.display = 'none';
  document.getElementById('resultsSection').style.display = 'none';
  document.getElementById('emptyState').classList.remove('show');
  document.getElementById('loadingWrap').classList.remove('show');
}

function showRecentSection() {
  hideAll();
  currentResults = [];
  expandedIndex = -1;
  document.getElementById('recentSection').style.display = 'block';
}

function showLoading(text) {
  hideAll();
  document.getElementById('loadingText').textContent = text || 'Loading...';
  document.getElementById('loadingWrap').classList.add('show');
}

function setLoading(on, text) {
  const wrap = document.getElementById('loadingWrap');
  if (on) {
    wrap.classList.add('show');
    if (text) document.getElementById('loadingText').textContent = text;
  } else {
    wrap.classList.remove('show');
  }
}

function showEmpty() {
  hideAll();
  document.getElementById('emptyState').classList.add('show');
}

function showResults(results, autoExpandIdx = -1, autoExpand = false, apiData = null) {
  hideAll();
  currentResults = results;
  document.getElementById('resultsSection').style.display = 'block';
  document.getElementById('resultsCount').textContent =
    results.length === 1 ? '1개의 원두' : `${results.length}개의 원두`;

  renderList(results, autoExpandIdx, autoExpand, apiData);
}

// ── 결과 목록 렌더링 ──────────────────────────
function renderList(results, autoExpandIdx = -1, autoExpand = false, apiData = null) {
  const list = document.getElementById('resultsList');
  list.innerHTML = '';

  if (results.length === 0) { showEmpty(); return; }

  results.forEach((coffee, idx) => {
    const card = buildCard(coffee, idx, apiData);
    list.appendChild(card);
    if (idx === autoExpandIdx && autoExpand) {
      expandCard(idx, apiData);
    }
  });
}

function buildCard(coffee, idx, apiData) {
  const wrap = document.createElement('div');
  wrap.className = 'coffee-card';
  wrap.id = `card-${idx}`;

  const notes = coffee.cup_notes || coffee.cupNotes || [];
  const tagHtml = notes.slice(0, 3).map(n => {
    const color = getNoteColor(n);
    return `<span class="flavor-tag" style="color:${color};border-color:${color}20;background:${color}10">
      <span class="flavor-dot" style="background:${color}"></span>${n}
    </span>`;
  }).join('');

  const score = coffee.sca_score || (apiData && apiData.cqi && apiData.cqi.total_score);
  const isFav = isFavorite(idx);

  wrap.innerHTML = `
    <div class="coffee-card-header" onclick="toggleCard(${idx})">
      <div class="card-icon">☕</div>
      <div class="card-meta">
        <div class="card-name">${coffee.name || '이름 없음'}</div>
        <div class="card-sub">${[coffee.roaster, coffee.country, coffee.process].filter(Boolean).join(' · ')}</div>
        ${tagHtml ? `<div class="card-tags">${tagHtml}</div>` : ''}
      </div>
      <div class="card-right">
        ${score ? `<div class="card-score">${parseFloat(score).toFixed(1)}<small> pts</small></div>` : ''}
        <button class="card-fav" onclick="event.stopPropagation(); toggleFav(${idx}, this)" aria-label="즐겨찾기">
          ${isFav ? '♥' : '♡'}
        </button>
        <span class="expand-arrow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square">
            <polyline points="6,9 12,15 18,9"/>
          </svg>
        </span>
      </div>
    </div>
    <div class="detail-panel" id="detail-${idx}"></div>
  `;

  return wrap;
}

// ── 카드 토글 ─────────────────────────────────
function toggleCard(idx) {
  if (expandedIndex === idx) {
    collapseCard(idx);
  } else {
    if (expandedIndex >= 0) collapseCard(expandedIndex);
    expandCard(idx);
  }
}

function collapseCard(idx) {
  const card = document.getElementById(`card-${idx}`);
  const panel = document.getElementById(`detail-${idx}`);
  if (!card || !panel) return;
  card.classList.remove('expanded');
  panel.classList.remove('open');
  expandedIndex = -1;
}

async function expandCard(idx, apiData = null) {
  const card = document.getElementById(`card-${idx}`);
  const panel = document.getElementById(`detail-${idx}`);
  if (!card || !panel) return;

  card.classList.add('expanded');
  expandedIndex = idx;

  const coffee = currentResults[idx];
  if (!coffee) return;

  // 이미 렌더링된 경우 바로 열기
  if (panel.dataset.rendered) {
    panel.classList.add('open');
    panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    return;
  }

  panel.classList.add('open');
  panel.innerHTML = buildDetailHTML(coffee, idx, apiData);
  panel.dataset.rendered = '1';

  // 스크롤
  setTimeout(() => panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 80);

  // 스토리 비동기 로드 (없으면)
  if (!coffee.story && !coffee.description) {
    loadStory(coffee, panel);
  }

  // CQI 점수 비동기 조회 (없으면)
  if (!coffee.sca_score && !apiData?.cqi) {
    loadCqi(coffee, panel);
  }
}

// ── 상세 HTML 빌더 ────────────────────────────
function buildDetailHTML(coffee, idx, apiData) {
  const notes = coffee.cup_notes || coffee.cupNotes || [];
  const raw = coffee.raw_notes || coffee.rawNotes || [];
  const conf = coffee.confidence || 'medium';
  const confColors = { high:'#639922', medium:'#EF9F27', low:'#888888' };
  const confText = { high:'높음 — 신뢰할 수 있는 정보', medium:'보통 — 일부 추정 포함', low:'낮음 — AI 추정 정보' };
  const cqiScore = coffee.sca_score || (apiData?.cqi?.total_score);
  const community = apiData?.community || coffee.community || {};

  const aroma = coffee.aroma || 0;
  const acidity = coffee.acidity || 0;
  const sweetness = coffee.sweetness || 0;
  const body = coffee.body || 0;
  const aftertaste = coffee.aftertaste || 0;

  const hasPredicts = aroma || acidity || sweetness || body || aftertaste;

  return `
    <!-- 신뢰도 배지 -->
    <div class="confidence-bar">
      <span class="confidence-dot" style="background:${confColors[conf]}"></span>
      <span class="confidence-label">데이터 신뢰도</span>
      <span class="confidence-text">${confText[conf]}</span>
      <span class="source-tag">${coffee.source === 'user_created' ? '직접등록' : 'AI'}</span>
    </div>

    <!-- CQI 점수 -->
    ${cqiScore ? `
    <div class="cqi-row">
      <div class="cqi-score">${parseFloat(cqiScore).toFixed(1)}</div>
      <div class="cqi-info">
        <div class="cqi-label">SCA / CQI Score</div>
        <div class="cqi-desc">${getCqiGrade(cqiScore)}</div>
        <div class="cqi-bar-wrap"><div class="cqi-bar-fill" style="width:${Math.min((cqiScore-60)/40*100,100)}%"></div></div>
      </div>
    </div>
    ` : `<div id="cqiRow-${idx}" class="cqi-row" style="display:none"></div>`}

    <!-- 원산지 정보 그리드 -->
    <div class="detail-section">
      <div class="section-label" style="padding:0 0 10px;">원산지 정보</div>
      <div class="info-grid">
        ${coffee.country ? `<div class="info-cell"><div class="info-key">국가</div><div class="info-val">${coffee.country}</div></div>` : ''}
        ${coffee.region ? `<div class="info-cell"><div class="info-key">지역</div><div class="info-val">${coffee.region}</div></div>` : ''}
        ${coffee.farm ? `<div class="info-cell"><div class="info-key">농장/워싱스테이션</div><div class="info-val">${coffee.farm}</div></div>` : ''}
        ${coffee.altitude ? `<div class="info-cell"><div class="info-key">고도</div><div class="info-val">${coffee.altitude}</div></div>` : ''}
        ${coffee.process ? `<div class="info-cell"><div class="info-key">가공방식</div><div class="info-val">${coffee.process}</div></div>` : ''}
        ${coffee.variety ? `<div class="info-cell"><div class="info-key">품종</div><div class="info-val">${coffee.variety}</div></div>` : ''}
      </div>
    </div>

    <!-- 향미 노트 -->
    <div class="detail-section">
      <div class="section-label" style="padding:0 0 0;">AI 예측 향미</div>
      <div class="flavor-tags-wrap">
        ${notes.map(n => {
          const color = getNoteColor(n);
          return `<span class="flavor-tag-lg" style="color:${color};border-color:${color};background:${color}15">
            <span class="flavor-dot" style="background:${color}"></span>${n}
          </span>`;
        }).join('')}
        ${notes.length === 0 ? '<span style="font-size:12px;color:var(--text-sub)">향미 정보 없음</span>' : ''}
      </div>
      ${raw.length > 0 ? `
        <div class="raw-notes-wrap">
          <div class="raw-notes-label">원본 라벨 텍스트</div>
          <div class="raw-notes-text">${raw.join(', ')}</div>
        </div>
      ` : ''}
    </div>

    <!-- AI 향미 강도 예측 -->
    ${hasPredicts ? `
    <div class="detail-section">
      <div class="section-label" style="padding:0 0 4px;">AI 향미 예측 프로파일</div>
      <div class="predict-grid">
        ${[['아로마',aroma],['산미',acidity],['단맛',sweetness],['바디',body],['여운',aftertaste]].map(([k,v]) => `
          <div class="predict-item">
            <div class="predict-bar-wrap">
              <div class="predict-bar-fill" style="height:${v*10}%"></div>
            </div>
            <div class="predict-val">${v}</div>
            <div class="predict-key">${k}</div>
          </div>
        `).join('')}
      </div>
    </div>
    ` : ''}

    <!-- 브루잉 팁 -->
    ${coffee.brew_tips ? `
    <div class="detail-section">
      <div class="section-label" style="padding:0 0 10px;">추출 가이드</div>
      <div class="brew-tips">
        ${buildBrewTips(coffee.brew_tips)}
      </div>
    </div>
    ` : ''}

    <!-- 원두 스토리 -->
    <div class="detail-section">
      <div class="section-label" style="padding:0 0 10px;">원두 이야기</div>
      <div class="story-text" id="storyText-${idx}">
        ${coffee.story || coffee.description ||
          `<span class="story-loading">이 원두의 이야기를 불러오는 중...</span>`}
      </div>
    </div>

    <!-- 커뮤니티 신호 -->
    <div class="detail-section">
      <div class="section-label" style="padding:0 0 12px;">커뮤니티</div>
      <div class="community-row">
        <div class="community-stat">
          <div class="community-num">${community.count || 0}</div>
          <div class="community-key">기록</div>
        </div>
        <div class="community-divider"></div>
        <div class="community-stat">
          <div class="community-num">${community.avg_rating ? parseFloat(community.avg_rating).toFixed(1) : '—'}</div>
          <div class="community-key">평점</div>
        </div>
        <div class="community-divider"></div>
        <div class="community-stat">
          <div class="community-num">${community.count === 0 ? '첫번째' : '+'}</div>
          <div class="community-key">기록자</div>
        </div>
      </div>
      ${(community.recent || []).length > 0 ? `
        <div style="margin-top:14px">
          ${community.recent.slice(0,2).map(r => `
            <div class="review-card">
              <div class="review-header">
                <div class="review-avatar">${(r.nickname||'?')[0].toUpperCase()}</div>
                <span class="review-nick">${r.nickname || '익명'}</span>
                <span class="review-stars">${'★'.repeat(Math.round(r.rating||0))}</span>
              </div>
              <div class="review-text">${r.memo || ''}</div>
              <div class="review-tags">${(r.flavor_tags||[]).slice(0,3).map(t=>`<span class="review-tag">· ${t}</span>`).join('')}</div>
            </div>
          `).join('')}
        </div>
      ` : ''}
    </div>

    <!-- 외부 링크 -->
    ${(coffee.roaster_url || coffee.farm_url || coffee.purchase_url) ? `
    <div class="detail-section">
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        ${coffee.roaster_url ? `<a href="${coffee.roaster_url}" target="_blank" class="btn-link" style="flex:1;text-decoration:none">🔗 로스터리</a>` : ''}
        ${coffee.farm_url ? `<a href="${coffee.farm_url}" target="_blank" class="btn-link" style="flex:1;text-decoration:none">🌱 농장</a>` : ''}
        ${coffee.purchase_url ? `<a href="${coffee.purchase_url}" target="_blank" class="btn-link" style="flex:1;text-decoration:none">🛒 구매</a>` : ''}
      </div>
    </div>
    ` : ''}

    <!-- 액션 버튼 -->
    <div class="detail-actions">
      <button class="btn-secondary" onclick="goRecipe(${idx})">레시피</button>
      <button class="btn-primary" onclick="goTasting(${idx})">기록하기</button>
    </div>
  `;
}

function buildBrewTips(tips) {
  if (typeof tips === 'string') {
    // 줄바꿈으로 구분된 팁들
    return tips.split('\n').filter(Boolean).map(line => {
      const parts = line.split(':');
      if (parts.length >= 2) {
        return `<div class="brew-tip-row">
          <span class="brew-tip-key">${parts[0].trim()}</span>
          <span class="brew-tip-val">${parts.slice(1).join(':').trim()}</span>
        </div>`;
      }
      return `<div class="brew-tip-row"><span class="brew-tip-val">${line}</span></div>`;
    }).join('');
  }
  return `<div class="brew-tip-val">${String(tips)}</div>`;
}

function getCqiGrade(score) {
  if (score >= 90) return 'Outstanding — 최상급 스페셜티';
  if (score >= 85) return 'Excellent — 우수 스페셜티';
  if (score >= 80) return 'Very Good — 스페셜티 등급';
  if (score >= 75) return 'Good — 고품질 커피';
  return 'Standard — 일반 커피';
}

// ── 비동기 스토리 로드 ─────────────────────────
async function loadStory(coffee, panel) {
  const storyEl = panel.querySelector('[id^="storyText-"]');
  if (!storyEl) return;
  try {
    const res = await fetch(`/api/story?name=${encodeURIComponent(coffee.name || '')}&country=${encodeURIComponent(coffee.country || '')}`);
    if (res.ok) {
      const data = await res.json();
      if (data.story) storyEl.textContent = data.story;
    }
  } catch {}
}

// ── 비동기 CQI 로드 ───────────────────────────
async function loadCqi(coffee, panel) {
  try {
    const q = new URLSearchParams({
      country: coffee.country || '',
      process: coffee.process || '',
      variety: coffee.variety || ''
    });
    const res = await fetch(`/api/cqi?${q}`);
    if (res.ok) {
      const data = await res.json();
      if (data.score) {
        const cqiRow = panel.querySelector('[id^="cqiRow-"]');
        if (cqiRow) {
          cqiRow.style.display = 'flex';
          cqiRow.innerHTML = `
            <div class="cqi-score">${parseFloat(data.score).toFixed(1)}</div>
            <div class="cqi-info">
              <div class="cqi-label">CQI 기준 점수 (평균)</div>
              <div class="cqi-desc">${getCqiGrade(data.score)}</div>
              <div class="cqi-bar-wrap"><div class="cqi-bar-fill" style="width:${Math.min((data.score-60)/40*100,100)}%"></div></div>
            </div>
          `;
        }
      }
    }
  } catch {}
}

// ── 네비게이션 ────────────────────────────────
function goTasting(idx) {
  const coffee = currentResults[idx];
  if (!coffee) return;

  // AI 예측 데이터를 sessionStorage에 저장 (tasting.html에서 사용)
  sessionStorage.setItem('tasting_coffee', JSON.stringify(coffee));
  sessionStorage.setItem('tasting_coffeeIdx', String(idx));

  // 커피가 로컬 DB에 없으면 저장
  const coffees = getCoffeesLocal();
  const existIdx = coffees.findIndex(c => c.name === coffee.name);
  const realIdx = existIdx >= 0 ? existIdx : (() => {
    saveCoffeeLocal(coffee);
    return getCoffeesLocal().findIndex(c => c.name === coffee.name);
  })();

  location.href = `tasting.html?coffeeId=${realIdx}`;
}

function goRecipe(idx) {
  const coffee = currentResults[idx];
  if (!coffee) return;
  sessionStorage.setItem('recipe_coffee', JSON.stringify(coffee));
  const coffees = getCoffeesLocal();
  const realIdx = coffees.findIndex(c => c.name === coffee.name);
  location.href = `recipe.html?coffeeId=${realIdx >= 0 ? realIdx : 0}`;
}

function openRegister() {
  location.href = 'register-coffee.html';
}

// ── 즐겨찾기 ──────────────────────────────────
function isFavorite(idx) {
  try {
    const favs = JSON.parse(localStorage.getItem('coffee_note_favorites') || '[]');
    return favs.includes(idx);
  } catch { return false; }
}

function toggleFav(idx, btn) {
  try {
    let favs = JSON.parse(localStorage.getItem('coffee_note_favorites') || '[]');
    if (favs.includes(idx)) {
      favs = favs.filter(i => i !== idx);
      btn.textContent = '♡';
      showToast('즐겨찾기에서 제거했습니다');
    } else {
      favs.push(idx);
      btn.textContent = '♥';
      showToast('즐겨찾기에 추가했습니다');
    }
    localStorage.setItem('coffee_note_favorites', JSON.stringify(favs));
  } catch {}
}

// ── 검색 히스토리 ─────────────────────────────
function getRecent() {
  try { return JSON.parse(localStorage.getItem('coffee_note_recent') || '[]'); }
  catch { return []; }
}

function saveRecent(q) {
  let list = getRecent().filter(r => r !== q);
  list.unshift(q);
  list = list.slice(0, 10);
  localStorage.setItem('coffee_note_recent', JSON.stringify(list));
  renderRecent();
}

function deleteRecent(q) {
  let list = getRecent().filter(r => r !== q);
  localStorage.setItem('coffee_note_recent', JSON.stringify(list));
  renderRecent();
}

function clearAllRecent() {
  localStorage.setItem('coffee_note_recent', '[]');
  renderRecent();
}

function renderRecent() {
  const list = getRecent();
  const el = document.getElementById('recentList');
  const section = document.getElementById('recentSection');

  if (list.length === 0) {
    section.style.display = 'none';
    return;
  }
  section.style.display = 'block';
  el.innerHTML = list.map(q => `
    <div class="recent-item">
      <div class="recent-q" onclick="clickRecent('${q.replace(/'/g,"\\'")}')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square">
          <polyline points="1,4 1,10 7,10"/>
          <path d="M3.51 15a9 9 0 1 0 .49-3.51"/>
        </svg>
        ${q}
      </div>
      <button class="btn-del-recent" onclick="deleteRecent('${q.replace(/'/g,"\\'")}')">×</button>
    </div>
  `).join('');
}

function clickRecent(q) {
  document.getElementById('searchInput').value = q;
  updateClearBtn();
  handleSearch();
}

// ── OCR 카메라 ────────────────────────────────
function openOcrSheet() {
  document.getElementById('ocrSheet').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeOcrSheet(e) {
  if (e && e.target !== document.getElementById('ocrSheet')) return;
  document.getElementById('ocrSheet').classList.remove('open');
  document.body.style.overflow = '';
}

async function handleOcrFile(input) {
  const file = input.files[0];
  if (!file) return;

  // 미리보기
  const reader = new FileReader();
  reader.onload = async (e) => {
    const base64 = e.target.result;
    document.getElementById('ocrImgPreview').src = base64;
    document.getElementById('ocrUploadArea').style.display = 'none';
    document.getElementById('ocrLoading').style.display = 'block';

    try {
      const res = await fetch('/api/ocr', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ image: base64.split(',')[1] })
      });
      const data = await res.json();
      ocrData = data.coffee || data;
      document.getElementById('ocrLoading').style.display = 'none';
      renderOcrResult(ocrData, data.rawText || '');
    } catch(err) {
      document.getElementById('ocrLoading').style.display = 'none';
      showToast('인식에 실패했습니다. 다시 시도해주세요.');
      handleOcrRetry();
    }
  };
  reader.readAsDataURL(file);
}

function renderOcrResult(coffee, rawText) {
  const grid = document.getElementById('ocrResultGrid');
  const fields = [
    ['name', '원두명'], ['country', '국가'], ['region', '지역'],
    ['farm', '농장'], ['process', '가공방식'], ['variety', '품종'],
    ['altitude', '고도'], ['roaster', '로스터리']
  ];
  grid.innerHTML = fields.filter(([k]) => coffee[k]).map(([k, label]) => `
    <div class="ocr-field detected">
      <div class="ocr-field-key">${label}</div>
      <div class="ocr-field-val">${coffee[k]}</div>
    </div>
  `).join('');
  if (rawText) {
    grid.innerHTML += `
      <div class="ocr-field" style="grid-column:1/-1">
        <div class="ocr-field-key">원본 텍스트</div>
        <div class="ocr-field-val" style="font-size:11px;color:var(--text-sub)">${rawText}</div>
      </div>
    `;
  }
  document.getElementById('ocrResult').classList.add('show');
}

function handleOcrRetry() {
  ocrData = null;
  document.getElementById('ocrResult').classList.remove('show');
  document.getElementById('ocrUploadArea').style.display = 'block';
  document.getElementById('ocrFileInput').value = '';
  document.getElementById('ocrGalleryInput').value = '';
}

function handleOcrConfirm() {
  if (!ocrData) return;
  const q = ocrData.name || ocrData.country || '';
  document.getElementById('ocrSheet').classList.remove('open');
  document.body.style.overflow = '';
  document.getElementById('searchInput').value = q;
  updateClearBtn();
  // OCR 결과를 sessionStorage에 저장 후 검색
  sessionStorage.setItem('ocr_result', JSON.stringify(ocrData));
  handleSearch();
}

// ── 토스트 ────────────────────────────────────
function showToast(msg, duration = 2000) {
  // common.js의 showToast가 있으면 그것 사용
  if (typeof window.showToastCommon === 'function') {
    window.showToastCommon(msg); return;
  }
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), duration);
}

// common.js의 showToast 오버라이드 방지를 위한 초기화 완료 플래그
window._indexReady = true;
</script>
