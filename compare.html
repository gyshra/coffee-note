<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Coffee Note. — 비교 결과</title>
  <link rel="stylesheet" href="common.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #FFFFFF; --text: #121212; --text-sub: #888888;
      --accent: #121212; --accent-warm: #8C7355;
      --border: #E0E0E0; --surface: #F8F7F5;
      --nav-h: 60px; --header-h: 56px;
      --color-mine: #121212;
      --color-community: #8C7355;
      --color-cqi: #3B6EA5;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Pretendard Variable', 'Pretendard', -apple-system, sans-serif; }

    /* ─── 헤더 ── */
    .header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: var(--header-h); background: var(--bg);
      border-bottom: 1.5px solid var(--text);
      display: flex; align-items: center; padding: 0 16px; gap: 8px;
    }
    .btn-back {
      background: none; border: none; cursor: pointer;
      width: 36px; height: 36px; display: flex; align-items: center;
      justify-content: center; color: var(--text);
    }
    .btn-back svg { width: 20px; height: 20px; }
    .header-title {
      flex: 1; font-family: 'Playfair Display', serif;
      font-weight: 900; font-size: 18px;
    }
    .header-title small {
      display: block; font-family: 'Pretendard Variable', sans-serif;
      font-size: 11px; font-weight: 600; color: var(--text-sub);
      letter-spacing: 0.5px; text-transform: uppercase; margin-top: 1px;
    }
    .btn-icon {
      background: none; border: none; cursor: pointer; padding: 4px;
      display: flex; align-items: center; justify-content: center; color: var(--text);
    }

    /* ─── 본문 ── */
    .wrap {
      padding-top: calc(var(--header-h) + 8px);
      padding-bottom: calc(var(--nav-h) + 80px);
    }

    /* ─── 원두 배너 ── */
    .coffee-banner {
      background: var(--text); color: var(--bg);
      padding: 14px 16px; display: flex; align-items: center; gap: 12px;
    }
    .banner-icon { font-size: 28px; }
    .banner-meta { flex: 1; }
    .banner-name { font-size: 14px; font-weight: 700; }
    .banner-sub { font-size: 11px; opacity: 0.6; margin-top: 2px; }
    .banner-rating {
      font-family: 'Playfair Display', serif;
      font-size: 28px; font-weight: 900; color: var(--accent-warm);
    }

    /* ─── 범례 ── */
    .legend-bar {
      display: flex; gap: 0; border-bottom: 1px solid var(--border);
    }
    .legend-item {
      flex: 1; display: flex; align-items: center; gap: 6px;
      padding: 10px 12px; border-right: 1px solid var(--border); cursor: pointer;
      transition: background 0.1s;
    }
    .legend-item:last-child { border-right: none; }
    .legend-item.inactive { opacity: 0.4; }
    .legend-dot { width: 10px; height: 10px; flex-shrink: 0; }
    .legend-dot.solid { /* 실선 */ }
    .legend-dot.dashed { border: 2px dashed; background: transparent !important; }
    .legend-label { font-size: 11px; font-weight: 700; }

    /* ─── 레이더 섹션 ── */
    .radar-section { padding: 16px; }
    .section-label {
      font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--text-sub); margin-bottom: 12px;
    }
    #radarCanvas {
      display: block; margin: 0 auto; max-width: 100%;
    }

    /* ─── 바 차트 비교 ── */
    .bar-section { padding: 0 16px 16px; }
    .bar-row {
      display: flex; align-items: center; gap: 10px;
      padding: 7px 0; border-bottom: 1px solid var(--border);
    }
    .bar-row:last-child { border-bottom: none; }
    .bar-label { font-size: 12px; font-weight: 700; min-width: 44px; color: var(--text); }
    .bar-group { flex: 1; display: flex; flex-direction: column; gap: 3px; }
    .bar-item { display: flex; align-items: center; gap: 6px; }
    .bar-fill-wrap { flex: 1; height: 8px; background: var(--border); position: relative; }
    .bar-fill { height: 100%; transition: width 0.5s ease; }
    .bar-val { font-size: 11px; font-weight: 700; min-width: 20px; text-align: right; }

    /* ─── AI 인사이트 ── */
    .insight-section {
      margin: 0 16px 16px; padding: 16px;
      background: var(--surface); border: 1px solid var(--border);
    }
    .insight-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .insight-icon { font-size: 18px; }
    .insight-title { font-size: 13px; font-weight: 700; }
    .insight-badge {
      margin-left: auto; font-size: 9px; font-weight: 700;
      letter-spacing: 0.8px; text-transform: uppercase;
      padding: 2px 6px; border: 1px solid var(--accent-warm); color: var(--accent-warm);
    }
    .insight-text { font-size: 13px; color: var(--text); line-height: 1.7; }
    .insight-tip {
      margin-top: 12px; padding: 10px 12px;
      background: var(--text); color: var(--bg);
      font-size: 12px; font-weight: 600; line-height: 1.5;
    }
    .insight-tip-label {
      font-size: 9px; font-weight: 700; letter-spacing: 1px;
      text-transform: uppercase; opacity: 0.65; margin-bottom: 4px;
    }
    .insight-loading { font-size: 12px; color: var(--text-sub); font-style: italic; }

    /* ─── 커뮤니티 후기 ── */
    .community-section { padding: 0 16px 16px; }
    .review-card { padding: 12px 0; border-bottom: 1px solid var(--border); }
    .review-card:last-child { border-bottom: none; }
    .review-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .review-avatar {
      width: 26px; height: 26px; background: var(--text); color: var(--bg);
      font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center;
    }
    .review-nick { font-size: 13px; font-weight: 700; }
    .review-stars { font-size: 11px; color: var(--accent-warm); margin-left: auto; }
    .review-method { font-size: 10px; font-weight: 700; color: var(--text-sub); padding: 2px 6px; border: 1px solid var(--border); }
    .review-text { font-size: 12px; color: var(--text); line-height: 1.6; margin-bottom: 6px; }
    .review-tags { display: flex; gap: 5px; flex-wrap: wrap; }
    .review-tag-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: 2px; }
    .review-tag { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--text-sub); font-weight: 600; }

    /* ─── 차이 분석 ── */
    .diff-section { padding: 0 16px 16px; }
    .diff-item { display: flex; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
    .diff-item:last-child { border-bottom: none; }
    .diff-axis { font-size: 12px; font-weight: 700; min-width: 44px; flex-shrink: 0; padding-top: 2px; }
    .diff-content { flex: 1; }
    .diff-scores { display: flex; gap: 12px; margin-bottom: 4px; }
    .diff-score-item { font-size: 11px; }
    .diff-score-val { font-weight: 700; }
    .diff-bar-group { display: flex; flex-direction: column; gap: 3px; }
    .diff-bar-row { display: flex; align-items: center; gap: 4px; }
    .diff-key { font-size: 9px; color: var(--text-sub); font-weight: 700; min-width: 24px; }
    .diff-bar-wrap { flex: 1; height: 5px; background: var(--border); }
    .diff-bar-fill { height: 100%; }

    /* ─── 바텀 CTA ── */
    .bottom-cta {
      position: fixed; bottom: var(--nav-h); left: 0; right: 0; z-index: 90;
      background: var(--bg); border-top: 1.5px solid var(--border);
      padding: 12px 16px; display: flex; gap: 8px;
    }
    .btn-primary {
      flex: 2; height: 48px; background: var(--text); color: var(--bg);
      border: none; font-family: inherit; font-size: 14px; font-weight: 700;
      cursor: pointer; transition: opacity 0.15s;
    }
    .btn-primary:active { opacity: 0.8; }
    .btn-secondary {
      flex: 1; height: 48px; background: var(--bg); color: var(--text);
      border: 1.5px solid var(--text); font-family: inherit; font-size: 13px; font-weight: 700;
      cursor: pointer;
    }

    /* ─── 하단 네비 ── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
      height: var(--nav-h); display: flex; background: var(--bg);
      border-top: 1.5px solid var(--text);
    }
    .nav-item {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 3px;
      cursor: pointer; text-decoration: none; color: var(--text-sub);
    }
    .nav-item.active { color: var(--text); }
    .nav-item svg { width: 20px; height: 20px; }
    .nav-label { font-size: 9px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; }

    /* ─── 토스트 ── */
    .toast {
      position: fixed; bottom: calc(var(--nav-h) + 80px); left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--text); color: var(--bg); padding: 10px 20px;
      font-size: 13px; font-weight: 600; opacity: 0; transition: all 0.3s;
      z-index: 400; white-space: nowrap; pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .divider { height: 1px; background: var(--border); margin: 0 16px; }

    @media (min-width: 480px) {
      .wrap { max-width: 480px; margin: 0 auto; }
      .header { max-width: 480px; left: 50%; transform: translateX(-50%); right: auto; width: 480px; }
      .bottom-nav { max-width: 480px; left: 50%; transform: translateX(-50%); right: auto; width: 480px; }
      .bottom-cta { max-width: 480px; left: 50%; transform: translateX(-50%); right: auto; width: 480px; }
    }
  </style>
</head>

<script>
/* ═══════════════════════════════════════════════
   Coffee Note — compare.html (비교 결과 화면)
   Phase B-4 | v30
   ═══════════════════════════════════════════════ */

// ── 상태 ──────────────────────────────────────
let tastingData = null;
let coffeeData = null;
let communityData = null;
let cqiData = null;
let layers = { mine: true, community: true, cqi: true };

const AXES = ['아로마','산미','단맛','바디감','여운'];
const AXIS_KEYS = ['aroma','acidity','sweetness','body','aftertaste'];

// 색상
const COLOR_MINE      = '#121212';
const COLOR_COMMUNITY = '#8C7355';
const COLOR_CQI       = '#3B6EA5';

// ── 초기화 ────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  loadData();
});

function loadData() {
  // URL params
  const params = new URLSearchParams(location.search);
  const tastingId = params.get('tastingId');
  const coffeeId = params.get('coffeeId');

  // sessionStorage에서 테이스팅 기록 로드
  const stored = sessionStorage.getItem('last_tasting');
  if (stored) {
    tastingData = JSON.parse(stored);
  } else {
    // localStorage에서 최신 기록 가져오기
    const records = JSON.parse(localStorage.getItem('coffee_note_tastings') || '[]');
    if (tastingId) {
      tastingData = records.find(r => r.id === tastingId) || records[records.length - 1];
    } else {
      tastingData = records[records.length - 1];
    }
  }

  // 원두 데이터
  const coffeeStored = sessionStorage.getItem('tasting_coffee');
  if (coffeeStored) {
    coffeeData = JSON.parse(coffeeStored);
  } else if (coffeeId !== null) {
    const coffees = JSON.parse(localStorage.getItem('coffee_note_coffees') || '[]');
    coffeeData = coffees[parseInt(coffeeId)] || null;
  } else if (tastingData?.coffeeIndex !== undefined) {
    const coffees = JSON.parse(localStorage.getItem('coffee_note_coffees') || '[]');
    coffeeData = coffees[tastingData.coffeeIndex] || null;
  }

  renderBanner();
  renderRadar();
  renderBarChart();
  loadInsight();
  loadCommunityData();
}

// ── 배너 렌더 ─────────────────────────────────
function renderBanner() {
  if (coffeeData) {
    document.getElementById('bannerName').textContent = coffeeData.name || '—';
    document.getElementById('bannerSub').textContent =
      [coffeeData.country, coffeeData.process, coffeeData.brew_method || tastingData?.brew_method].filter(Boolean).join(' · ');
  }
  if (tastingData?.rating) {
    document.getElementById('bannerRating').textContent = parseFloat(tastingData.rating).toFixed(1);
  }
}

// ── 레이더 차트 렌더 ──────────────────────────
function renderRadar() {
  const canvas = document.getElementById('radarCanvas');
  const size = Math.min(window.innerWidth - 32, 320);
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext('2d');
  const cx = size / 2, cy = size / 2;
  const maxR = size * 0.38;
  const n = AXES.length;

  ctx.clearRect(0, 0, size, size);

  // 가이드 다각형 (5단계)
  for (let lvl = 1; lvl <= 5; lvl++) {
    const r = maxR * lvl / 5;
    ctx.beginPath();
    for (let i = 0; i < n; i++) {
      const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
      const x = cx + r * Math.cos(angle);
      const y = cy + r * Math.sin(angle);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.strokeStyle = lvl === 5 ? '#C0C0C0' : '#E8E8E8';
    ctx.lineWidth = lvl === 5 ? 1.2 : 0.8;
    ctx.stroke();
  }

  // 축 선
  for (let i = 0; i < n; i++) {
    const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + maxR * Math.cos(angle), cy + maxR * Math.sin(angle));
    ctx.strokeStyle = '#D0D0D0'; ctx.lineWidth = 0.8;
    ctx.stroke();
  }

  // 레이어 그리기
  if (layers.cqi && cqiData) {
    drawLayer(ctx, cx, cy, maxR, n, getCqiValues(), COLOR_CQI, true, 0.15);
  }
  if (layers.community && communityData) {
    drawLayer(ctx, cx, cy, maxR, n, getCommunityValues(), COLOR_COMMUNITY, true, 0.15);
  }
  if (layers.mine && tastingData) {
    drawLayer(ctx, cx, cy, maxR, n, getMineValues(), COLOR_MINE, false, 0.12);
  }

  // 축 라벨
  for (let i = 0; i < n; i++) {
    const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
    const labelR = maxR + 18;
    const x = cx + labelR * Math.cos(angle);
    const y = cy + labelR * Math.sin(angle);
    ctx.fillStyle = '#333';
    ctx.font = `700 11px 'Pretendard Variable', sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(AXES[i], x, y);
  }

  // 내 기록 포인트 원
  if (layers.mine && tastingData) {
    const vals = getMineValues();
    for (let i = 0; i < n; i++) {
      const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
      const r = maxR * (vals[i] / 10);
      const x = cx + r * Math.cos(angle);
      const y = cy + r * Math.sin(angle);
      ctx.beginPath();
      ctx.arc(x, y, 5, 0, Math.PI * 2);
      ctx.fillStyle = COLOR_MINE;
      ctx.fill();
    }
  }
}

function drawLayer(ctx, cx, cy, maxR, n, vals, color, dashed, fillAlpha) {
  ctx.beginPath();
  for (let i = 0; i < n; i++) {
    const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
    const r = maxR * (vals[i] / 10);
    const x = cx + r * Math.cos(angle);
    const y = cy + r * Math.sin(angle);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.closePath();

  // 채움
  ctx.fillStyle = hexToRgba(color, fillAlpha);
  ctx.fill();

  // 선
  if (dashed) ctx.setLineDash([4, 4]);
  else ctx.setLineDash([]);
  ctx.strokeStyle = color;
  ctx.lineWidth = dashed ? 1.5 : 2;
  ctx.stroke();
  ctx.setLineDash([]);
}

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function getMineValues() {
  if (!tastingData) return [5,5,5,5,5];
  return AXIS_KEYS.map(k => parseFloat(tastingData[k] || tastingData.baseScores?.[k] || 5));
}

function getCommunityValues() {
  if (!communityData) return [6,6,6,6,6];
  return AXIS_KEYS.map(k => parseFloat(communityData.avg?.[k] || 6));
}

function getCqiValues() {
  if (!cqiData) return [7,7,7,7,7];
  return [
    parseFloat(cqiData.aroma || 7),
    parseFloat(cqiData.acidity || 7),
    parseFloat(cqiData.flavor || 7),
    parseFloat(cqiData.body || 6),
    parseFloat(cqiData.aftertaste || 7)
  ];
}

// ── 레이어 토글 ───────────────────────────────
function toggleLayer(name, el) {
  layers[name] = !layers[name];
  el.classList.toggle('inactive', !layers[name]);
  renderRadar();
  renderBarChart();
}

// ── 바 차트 렌더 ──────────────────────────────
function renderBarChart() {
  const mine = getMineValues();
  const comm = layers.community && communityData ? getCommunityValues() : null;
  const cqi = layers.cqi && cqiData ? getCqiValues() : null;

  const chart = document.getElementById('barChart');
  chart.innerHTML = AXES.map((axis, i) => {
    const mVal = mine[i];
    const cVal = comm ? comm[i] : null;
    const qVal = cqi ? cqi[i] : null;

    return `
      <div class="bar-row">
        <div class="bar-label">${axis}</div>
        <div class="bar-group">
          ${layers.mine ? `
          <div class="bar-item">
            <div class="bar-fill-wrap">
              <div class="bar-fill" style="width:${mVal*10}%;background:${COLOR_MINE}"></div>
            </div>
            <div class="bar-val" style="color:${COLOR_MINE}">${mVal}</div>
          </div>` : ''}
          ${cVal !== null ? `
          <div class="bar-item">
            <div class="bar-fill-wrap">
              <div class="bar-fill" style="width:${cVal*10}%;background:${COLOR_COMMUNITY}"></div>
            </div>
            <div class="bar-val" style="color:${COLOR_COMMUNITY}">${cVal.toFixed(1)}</div>
          </div>` : ''}
          ${qVal !== null ? `
          <div class="bar-item">
            <div class="bar-fill-wrap">
              <div class="bar-fill" style="width:${qVal*10}%;background:${COLOR_CQI}"></div>
            </div>
            <div class="bar-val" style="color:${COLOR_CQI}">${qVal.toFixed(1)}</div>
          </div>` : ''}
        </div>
      </div>
    `;
  }).join('');
}

// ── AI 인사이트 로드 ──────────────────────────
async function loadInsight() {
  const mine = getMineValues();
  const comm = getCommunityValues();

  // 차이 계산
  const diffs = AXES.map((a, i) => ({
    axis: a, mine: mine[i], comm: comm[i],
    diff: mine[i] - comm[i]
  }));
  const biggest = diffs.reduce((a, b) => Math.abs(a.diff) > Math.abs(b.diff) ? a : b);
  const recipe = tastingData?.brew_method || '—';

  // API 호출 시도
  try {
    const res = await fetch('/api/insight', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        coffee: coffeeData?.name || '',
        mine: Object.fromEntries(AXIS_KEYS.map((k, i) => [k, mine[i]])),
        community: Object.fromEntries(AXIS_KEYS.map((k, i) => [k, comm[i]])),
        brew_method: recipe,
        process: coffeeData?.process || ''
      })
    });
    if (res.ok) {
      const data = await res.json();
      document.getElementById('insightText').textContent = data.insight || buildLocalInsight(biggest, recipe);
      if (data.tip) {
        document.getElementById('insightTipText').textContent = data.tip;
        document.getElementById('insightTip').style.display = 'block';
      }
      return;
    }
  } catch {}

  // API 실패 시 로컬 인사이트
  document.getElementById('insightText').textContent = buildLocalInsight(biggest, recipe);
  document.getElementById('insightTipText').textContent = buildLocalTip(biggest);
  document.getElementById('insightTip').style.display = 'block';
}

function buildLocalInsight(biggest, method) {
  const dir = biggest.diff > 0 ? '높게' : '낮게';
  const reasons = {
    '아로마': `추출 온도나 원두 신선도가 아로마 강도에 영향을 줄 수 있습니다. ${method} 추출 시 물 온도를 2-3°C 조정해보세요.`,
    '산미': `분쇄도와 추출 시간이 산미에 직접적인 영향을 줍니다. 분쇄도를 조금 더 ${biggest.diff > 0 ? '굵게' : '가늘게'} 해보세요.`,
    '단맛': `단맛은 추출 온도와 비율에 민감합니다. 물 온도를 ${biggest.diff < 0 ? '올려서' : '낮춰서'} 추출하면 단맛이 변할 수 있어요.`,
    '바디감': `바디감은 추출 방법과 비율에 따라 크게 달라집니다. 원두 비율을 조정해보세요.`,
    '여운': `여운은 원두의 가공방식과 로스팅 정도에 영향을 받습니다. 같은 원두를 여러 번 시도하면 더 정확한 프로파일이 만들어져요.`
  };
  const base = reasons[biggest.axis] || `${biggest.axis}에서 커뮤니티 평균보다 ${dir} 감지했습니다.`;
  return `${biggest.axis}을(를) 커뮤니티 평균보다 ${Math.abs(biggest.diff).toFixed(1)}점 ${dir} 느끼셨네요. ${base}`;
}

function buildLocalTip(biggest) {
  const tips = {
    '아로마': '추출 직후 바로 마셔보세요 — 아로마는 온도가 식을수록 변합니다.',
    '산미': biggest.diff > 0 ? '물 온도를 2°C 낮추거나 분쇄도를 약간 굵게 해보세요.' : '물 온도를 2°C 올리거나 추출 시간을 10초 줄여보세요.',
    '단맛': biggest.diff < 0 ? '뜸들이기 시간을 5초 늘려보세요.' : '원두 투입량을 1g 줄여보세요.',
    '바디감': biggest.diff < 0 ? '원두:물 비율을 1:15로 높여보세요.' : '비율을 1:17로 낮춰보세요.',
    '여운': '같은 원두를 3번 이상 마시면 여운의 패턴을 더 잘 인식할 수 있어요.'
  };
  return tips[biggest.axis] || '같은 원두를 다른 추출 방법으로 시도해보세요.';
}

// ── 커뮤니티 데이터 로드 ──────────────────────
async function loadCommunityData() {
  if (!coffeeData) {
    renderCommunityReviews([]);
    return;
  }

  try {
    const res = await fetch(`/api/compare?coffee=${encodeURIComponent(coffeeData.name || '')}`);
    if (res.ok) {
      const data = await res.json();
      communityData = data;
      cqiData = data.cqi;
      renderRadar();
      renderBarChart();
      renderCommunityReviews(data.recent || []);
      return;
    }
  } catch {}

  // 더미 커뮤니티 데이터
  communityData = {
    avg: { aroma: 6.8, acidity: 7.2, sweetness: 6.5, body: 5.8, aftertaste: 7.0 },
    count: 0
  };
  renderRadar(); renderBarChart();
  renderCommunityReviews([]);
}

function renderCommunityReviews(reviews) {
  const container = document.getElementById('communityReviews');
  if (reviews.length === 0) {
    container.innerHTML = `
      <div style="padding:24px 0;text-align:center">
        <div style="font-size:11px;color:var(--text-sub)">아직 커뮤니티 기록이 없습니다</div>
        <div style="font-size:11px;color:var(--text-sub);margin-top:4px">첫 번째 기록자가 되어보세요 ☕</div>
      </div>
    `;
    return;
  }

  const SCA_COLORS = {
    'Fruity':'#E24B4A','Floral':'#D4537E','Sweet':'#EF9F27',
    'Nutty/Cocoa':'#854F0B','Roasted':'#5F5E5A'
  };

  container.innerHTML = reviews.slice(0, 5).map(r => {
    const tags = (r.flavor_tags || []).slice(0, 4);
    const tagsHtml = tags.map(t => `
      <span class="review-tag">
        <span class="review-tag-dot" style="background:${SCA_COLORS[t] || '#888'}"></span>
        ${t}
      </span>
    `).join('');
    const stars = '★'.repeat(Math.round(r.rating || 0)) + '☆'.repeat(5 - Math.round(r.rating || 0));
    return `
      <div class="review-card">
        <div class="review-header">
          <div class="review-avatar">${(r.nickname||'?')[0].toUpperCase()}</div>
          <span class="review-nick">${r.nickname || '익명'}</span>
          ${r.brew_method ? `<span class="review-method">${r.brew_method}</span>` : ''}
          <span class="review-stars">${stars}</span>
        </div>
        ${r.memo ? `<div class="review-text">${r.memo}</div>` : ''}
        ${tagsHtml ? `<div class="review-tags">${tagsHtml}</div>` : ''}
      </div>
    `;
  }).join('');
}

// ── 카드 공유 ─────────────────────────────────
async function shareCard() {
  // card-generator.js 사용 (있으면)
  if (typeof CardGenerator !== 'undefined' && tastingData && coffeeData) {
    try {
      const canvas = await CardGenerator.generate({
        coffee: coffeeData,
        tasting: tastingData
      });
      await CardGenerator.share(canvas);
      return;
    } catch (e) {
      console.warn('CardGenerator 실패:', e);
    }
  }

  // Web Share API 폴백
  const text = `☕ ${coffeeData?.name || '커피'}\n${AXES.map((a,i) => `${a}: ${getMineValues()[i]}`).join(' · ')}\n\n#CoffeeNote #스페셜티커피`;
  if (navigator.share) {
    try {
      await navigator.share({ title: 'Coffee Note 센서리 카드', text });
      return;
    } catch {}
  }

  // 클립보드 복사
  try {
    await navigator.clipboard.writeText(text);
    showToast('텍스트를 클립보드에 복사했습니다');
  } catch {
    showToast('공유를 준비 중입니다');
  }
}

// ── 네비게이션 ────────────────────────────────
function goTasting() {
  const params = new URLSearchParams(location.search);
  const coffeeId = params.get('coffeeId') || tastingData?.coffeeIndex || '0';
  location.href = `tasting.html?coffeeId=${coffeeId}`;
}

// 화면 리사이즈 시 레이더 재렌더
window.addEventListener('resize', () => renderRadar());
</script>
