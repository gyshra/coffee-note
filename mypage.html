<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>마이페이지 — 커피 노트</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
    <link rel="stylesheet" href="common.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
      .nickSheet .sheetPanel {
        max-height: 85vh;
        overflow-y: auto;
      }
      .detailModal .sheetPanel {
        max-height: 88vh;
        overflow-y: auto;
      }
      .detailRow {
        margin-bottom: 12px;
        font-size: 14px;
        font-weight: 400;
        line-height: 1.7;
        color: var(--text);
      }
      .detailRow strong {
        display: block;
        font-size: 12px;
        font-weight: 400;
        color: var(--text-sub);
        margin-bottom: 4px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1 class="title" style="margin-bottom: 16px">마이페이지</h1>

      <!-- 로그인 전 -->
      <div class="panel card" id="profileGuest" style="padding:20px">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
          <div class="avatar" aria-hidden="true">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" />
              <circle cx="12" cy="7" r="4" />
            </svg>
          </div>
          <div>
            <strong class="card-title" style="display:block">로그인이 필요해요</strong>
            <div class="section-label" style="margin-top:2px;font-size:12px">기록을 클라우드에 저장하세요</div>
          </div>
        </div>
        <button type="button" id="btnGoogleLogin" class="btn-primary" style="width:100%;display:flex;align-items:center;justify-content:center;gap:8px;padding:12px">
          <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#fff" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#fff" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#fff" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#fff" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Google로 로그인
        </button>
      </div>

      <!-- 로그인 후 -->
      <div class="panel card" id="profileLoggedIn" style="display:none;padding:16px">
        <div style="display:flex;align-items:center;gap:12px">
          <div class="avatar" id="profileAvatar" aria-hidden="true" style="overflow:hidden;flex-shrink:0">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" />
              <circle cx="12" cy="7" r="4" />
            </svg>
          </div>
          <div style="flex:1;min-width:0">
            <strong id="nickDisplay" class="card-title" style="display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">로딩 중...</strong>
            <div class="section-label" style="margin-top:2px;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" id="profileEmail"></div>
          </div>
          <button type="button" id="btnLogout" class="btn-secondary" style="flex-shrink:0;padding:6px 12px;font-size:12px">
            로그아웃
          </button>
        </div>
      </div>

      <div class="statsScroll" id="statsRow"></div>

      <div class="tabBar" id="tabBar">
        <button type="button" class="tabBtn active" data-tab="favorites">즐겨찾기</button>
        <button type="button" class="tabBtn" data-tab="history">검색 기록</button>
      </div>

      <div id="tabContent" style="margin-top: 12px"></div>
    </div>

    <div id="globalToast" class="toast"></div>

    <div id="nickOverlay" class="sheetOverlay" aria-hidden="true">
      <div class="sheetPanel nickSheet">
        <div class="sheetHandle"></div>
        <h2 class="sheetTitle">닉네임 설정</h2>
        <p class="sheetText">커피 노트에서 사용할 닉네임을 입력해 주세요.</p>
        <input type="text" id="nickInput" placeholder="닉네임" style="margin-bottom: 16px" />
        <button type="button" class="btn-primary" id="nickSave">시작하기</button>
      </div>
    </div>

    <div id="detailOverlay" class="sheetOverlay detailModal" aria-hidden="true">
      <div class="sheetPanel">
        <div class="sheetHandle"></div>
        <h2 class="sheetTitle" id="detailTitle">기록 상세</h2>
        <div id="detailBody"></div>
        <button type="button" class="btn-secondary" style="margin-top: 16px" id="detailClose">닫기</button>
      </div>
    </div>

      <nav id="bottomNav" class="bottom-nav">
    <a href="home.html" class="nav-item" data-nav="home"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span class="nav-label">홈</span></a>
    <a href="index.html" class="nav-item" data-nav="search"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg><span class="nav-label">검색</span></a>
    <a href="notes.html" class="nav-item" data-nav="notes"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg><span class="nav-label">노트</span></a>
    <a href="#" class="nav-item" data-nav="map" onclick="CoffeeNote.openCoffeeMap();return false"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg><span class="nav-label">커피맵</span></a>
    <a href="mypage.html" class="nav-item" data-nav="mypage"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span class="nav-label">마이</span></a>
  </nav>

    <script src="common.js"></script>
    <script src="supabase.js"></script>
    <script>
      // ─── Supabase 인증 + 마이페이지 초기화 ───────────────
      (function () {
        var CN = window.CoffeeNote;
        CN.renderBottomNav("mypage");

        var currentTab = "favorites";
        var SLIDER_ORDER = ["아로마", "산미", "단맛", "바디감", "여운"];

        function openSheet(el) {
          el.classList.add("open");
          el.setAttribute("aria-hidden", "false");
        }
        function closeSheet(el) {
          el.classList.remove("open");
          el.setAttribute("aria-hidden", "true");
        }

        // ─── 프로필 UI 업데이트 ────────────────────────────
        async function updateProfileUI() {
          var user = await SupaAuth.getUser();
          if (user) {
            document.getElementById("profileGuest").style.display = "none";
            document.getElementById("profileLoggedIn").style.display = "";

            var name = (user.user_metadata && user.user_metadata.full_name)
              ? user.user_metadata.full_name
              : (user.email || "사용자");
            document.getElementById("nickDisplay").textContent = name;
            document.getElementById("profileEmail").textContent = user.email || "";

            // 프로필 사진
            var avatarPic = user.user_metadata && user.user_metadata.avatar_url;
            if (avatarPic) {
              document.getElementById("profileAvatar").innerHTML =
                '<img src="' + avatarPic + '" style="width:100%;height:100%;object-fit:cover;border-radius:50%" />';
            }

            // 로컬 → Supabase 마이그레이션 (첫 로그인 시)
            SupaDB.migrateFromLocalStorage();

          } else {
            // 비로그인 상태: 닉네임 설정 시트 표시 (기존 동작)
            document.getElementById("profileGuest").style.display = "";
            document.getElementById("profileLoggedIn").style.display = "none";
            if (!CN.getNickname()) {
              openSheet(document.getElementById("nickOverlay"));
            }
          }
        }

        // 페이지 로드 시 프로필 확인
        updateProfileUI();

        // 인증 상태 변경 감지
        if (window.SupaAuth) {
          SupaAuth.onAuthChange(function (user) {
            updateProfileUI();
          });
        }

        // Google 로그인 버튼
        document.getElementById("btnGoogleLogin").addEventListener("click", function () {
          SupaAuth.loginWithGoogle();
        });

        // 로그아웃 버튼
        document.getElementById("btnLogout").addEventListener("click", function () {
          if (confirm("로그아웃 하시겠어요?")) {
            SupaAuth.logout();
          }
        });

        document.getElementById("nickSave").addEventListener("click", function () {
          var v = document.getElementById("nickInput").value.trim();
          if (!v) {
            CN.showToast("닉네임을 입력해 주세요.");
            return;
          }
          CN.setNickname(v);
          document.getElementById("nickDisplay").textContent = v;
          closeSheet(document.getElementById("nickOverlay"));
        });

        function renderStats() {
          var records = CN.getTastingRecords();
          var total = records.length;
          var originCount = {};
          var sumAvg = 0;
          var countAvg = 0;
          records.forEach(function (r) {
            var idx = r.coffeeIndex;
            if (idx === undefined && r.coffeeId !== undefined) {
              idx = Number(r.coffeeId);
            }
            var coffee = CN.getCoffeeByIndex(idx);
            var origin = coffee && (coffee.region || coffee.country) ? coffee.region || coffee.country : "기타";
            originCount[origin] = (originCount[origin] || 0) + 1;
            var sc = r.baseScores || r.scores;
            if (sc) {
              var vals = SLIDER_ORDER.map(function (k) {
                return Number(sc[k]) || 0;
              });
              var m = vals.reduce(function (a, b) {
                return a + b;
              }, 0);
              if (vals.length) {
                sumAvg += m / vals.length;
                countAvg++;
              }
            }
          });
          var topOrigin = "—";
          var maxC = 0;
          for (var o in originCount) {
            if (originCount[o] > maxC) {
              maxC = originCount[o];
              topOrigin = o;
            }
          }
          var avgLabel = countAvg ? (sumAvg / countAvg).toFixed(1) + " / 10" : "—";
          document.getElementById("statsRow").innerHTML =
            '<div class="statCard card"><div class="label caption">총 기록 수</div><div class="value">' +
            total +
            '</div></div><div class="statCard card"><div class="label caption">가장 많이 마신 산지</div><div class="value" style="font-size:15px">' +
            esc(topOrigin) +
            '</div></div><div class="statCard card"><div class="label caption">평균 평점</div><div class="value">' +
            esc(avgLabel) +
            "</div></div>";
        }

        function formatYMD(dateStr) {
          var d = new Date(dateStr);
          if (isNaN(d.getTime())) return "";
          var y = d.getFullYear();
          var m = String(d.getMonth() + 1).padStart(2, "0");
          var day = String(d.getDate()).padStart(2, "0");
          return y + "." + m + "." + day;
        }

        function getRecordFlavorsText(r) {
          var tags = (r.flavorSelections || []).map(function (f) {
            return f.ko;
          });
          if (!tags.length && Array.isArray(r.tasteTags)) tags = r.tasteTags;
          tags = tags.filter(Boolean);
          return tags.slice(0, 3).join(" · ");
        }

        function renderTab() {
          renderStats();
          var el = document.getElementById("tabContent");
          if (currentTab === "sensory") {
            var recs = CN.getTastingRecords();
            if (!recs.length) {
              el.innerHTML = '<div class="empty">아직 센서리노트가 없습니다.</div>';
              return;
            }
            el.innerHTML = recs
              .map(function (r, i) {
                var coffee = CN.getCoffeeByIndex(r.coffeeIndex);
                var country = coffee && coffee.country ? coffee.country : "기타";
                var dominant = CN.getDominantColor(r);
                var tags = getRecordFlavorsText(r);
                var location = r.location ? r.location : "—";
                var dateStr = formatYMD(r.createdAt);
                return (
                  '<div class="sensory-card" data-record-idx="' +
                  i +
                  '" role="button" tabindex="0">' +
                  '  <div class="sc-color-bar" style="background:' +
                  dominant +
                  '"></div>' +
                  '  <div class="sc-content">' +
                  '    <div class="sc-title-row">' +
                  "      <span class=\"sc-title\">" +
                  esc(r.coffeeName || "원두") +
                  "</span>" +
                  '      <img class="sc-flag" src="' +
                  CN.getFlagUrl(country) +
                  '" alt="' +
                  esc(country) +
                  '" width="16" />' +
                  "    </div>" +
                  '    <div class="sc-flavors">' +
                  esc(tags || "") +
                  "</div>" +
                  '    <div class="sc-location">' +
                  esc(location) +
                  "</div>" +
                  '    <div class="sc-date">' +
                  esc(dateStr) +
                  "</div>" +
                  "  </div>" +
                  '  <div class="sc-country-map">' +
                  CN.getCountrySilhouette(country) +
                  "</div>" +
                  "</div>"
                );
              })
              .join("");
            el.querySelectorAll("[data-record-idx]").forEach(function (node) {
              function go() {
                var idx = Number(node.getAttribute("data-record-idx"));
                location.href = "note-detail.html?idx=" + encodeURIComponent(idx);
              }
              node.addEventListener("click", function () {
                go();
              });
              node.addEventListener("keydown", function (e) {
                if (e.key === "Enter" || e.key === " ") go();
              });
            });
          } else if (currentTab === "beans") {
            var coffees = CN.getCoffees();
            var mine = coffees
              .map(function (c, i) {
                return { c: c, i: i };
              })
              .filter(function (x) {
                return x.c.source === "user_created";
              });
            if (!mine.length) {
              el.innerHTML = '<div class="empty">직접 등록한 원두가 없습니다.</div>';
              return;
            }
            el.innerHTML = mine
              .map(function (x) {
                return (
                  '<div class="listCard" data-edit-idx="' +
                  x.i +
                  '"><strong class="card-title" style="display:block">' +
                  esc(x.c.name) +
                  "</strong><span class='caption' style='display:block;margin-top:6px'>" +
                  esc(x.c.roaster || "") +
                  " · " +
                  esc(CN.formatProcessDisplay(x.c)) +
                  "</span></div>"
                );
              })
              .join("");
            el.querySelectorAll("[data-edit-idx]").forEach(function (node) {
              node.addEventListener("click", function () {
                var idx = node.getAttribute("data-edit-idx");
                location.href = "register-coffee.html?edit=" + encodeURIComponent(idx);
              });
            });
          } else if (currentTab === "recipes") {
            var recs2 = CN.getTastingRecords();
            var withRecipe = recs2
              .map(function (r, i) {
                return { r: r, i: i };
              })
              .filter(function (x) {
                return Boolean(x.r.recipe);
              });
            if (!withRecipe.length) {
              el.innerHTML = '<div class="empty">레시피가 있는 기록이 없습니다.</div>';
              return;
            }
            el.innerHTML = withRecipe
              .map(function (x) {
                var rr = x.r;
                var recipe = rr.recipe || {};
                var metaBits = [recipe.temp, recipe.water, recipe.dose, recipe.time].filter(function (v) {
                  return v != null && String(v).trim().length > 0;
                });
                var dateStr = formatYMD(rr.createdAt);
                return (
                  '<div class="recipe-card" data-record-idx="' +
                  x.i +
                  '" role="button" tabindex="0">' +
                  '  <div class="rc-title">' +
                  esc(rr.coffeeName || "원두") +
                  "</div>" +
                  '  <div class="rc-meta">' +
                  esc(metaBits.join(" · ") || "—") +
                  "</div>" +
                  '  <div class="rc-date">' +
                  esc(dateStr) +
                  "</div>" +
                  "</div>"
                );
              })
              .join("");
            el.querySelectorAll("[data-record-idx]").forEach(function (node) {
              function go() {
                var idx = Number(node.getAttribute("data-record-idx"));
                location.href = "note-detail.html?idx=" + encodeURIComponent(idx);
              }
              node.addEventListener("click", go);
              node.addEventListener("keydown", function (e) {
                if (e.key === "Enter" || e.key === " ") go();
              });
            });
          } else if (currentTab === "favorites") {
            var favs = CN.getFavorites();
            if (!favs.length) {
              el.innerHTML = '<div class="empty">즐겨찾기한 원두가 없습니다.</div>';
              return;
            }
            el.innerHTML = favs
              .map(function (idx) {
                var c = CN.getCoffeeByIndex(idx);
                if (!c) return "";
                return (
                  '<div class="listCard" data-fav-idx="' +
                  idx +
                  '"><strong class="card-title" style="display:block">' +
                  esc(c.name) +
                  "</strong><span class='caption' style='display:block;margin-top:6px'>" +
                  esc(c.roaster) +
                  "</span></div>"
                );
              })
              .filter(Boolean)
              .join("");
            el.querySelectorAll("[data-fav-idx]").forEach(function (node) {
              node.addEventListener("click", function () {
                var idx = node.getAttribute("data-fav-idx");
                location.href = "index.html?coffeeId=" + encodeURIComponent(idx) + "&expand=1";
              });
            });
          } else if (currentTab === "history") {
            var hist = CN.getSearchHistory();
            if (!hist.length) {
              el.innerHTML = '<div class="empty">검색 기록이 없습니다.</div>';
              return;
            }
            el.innerHTML = hist
              .map(function (h, i) {
                var d = new Date(h.ts);
                var dateStr = isNaN(d.getTime()) ? "" : d.toLocaleString("ko-KR");
                return (
                  '<div class="listCard" data-history-i="' +
                  i +
                  '"><strong class="card-title" style="display:block">' +
                  esc(h.query) +
                  "</strong><span class='caption' style='display:block;margin-top:6px'>" +
                  esc(dateStr) +
                  "</span></div>"
                );
              })
              .join("");
            el.querySelectorAll("[data-history-i]").forEach(function (node) {
              node.addEventListener("click", function () {
                var i = Number(node.getAttribute("data-history-i"));
                var q = hist[i] && hist[i].query ? hist[i].query : "";
                location.href = "index.html?q=" + encodeURIComponent(q);
              });
            });
          }
        }

        function showRecordDetail(r) {
          if (!r) return;
          document.getElementById("detailTitle").textContent = r.coffeeName || "기록 상세";
          var scores = r.baseScores || r.scores;
          var scoreLines = SLIDER_ORDER.map(function (k) {
            return "<div class='detailRow'><strong>" + esc(k) + "</strong> " + (scores && scores[k] != null ? scores[k] : "—") + "</div>";
          }).join("");
          var tagSource = (r.flavorSelections || []).map(function (f) {
            return f.ko;
          });
          if (!tagSource.length) tagSource = r.tasteTags || [];
          var tags = tagSource.length ? tagSource.map(esc).join(", ") : "—";
          var koByEn = {};
          (r.flavorSelections || []).forEach(function (f) {
            koByEn[f.en] = f.ko;
          });
          var fiLine = "";
          if (r.flavorIntensities && Object.keys(r.flavorIntensities).length) {
            fiLine =
              "<div class='detailRow'><strong>향미 강도</strong> " +
              Object.keys(r.flavorIntensities)
                .map(function (en) {
                  return esc(koByEn[en] || en) + " " + r.flavorIntensities[en];
                })
                .join(", ") +
              "</div>";
          }
          document.getElementById("detailBody").innerHTML =
            "<div class='detailRow'><strong>날짜</strong> " +
            esc(new Date(r.createdAt).toLocaleString("ko-KR")) +
            "</div>" +
            scoreLines +
            "<div class='detailRow'><strong>향미</strong> " +
            tags +
            "</div>" +
            fiLine +
            "<div class='detailRow'><strong>추출 방법</strong> " +
            esc(r.brewMethod || r.method || "—") +
            "</div>" +
            "<div class='detailRow'><strong>메모</strong> " +
            esc(r.memo || "—") +
            "</div>";
          openSheet(document.getElementById("detailOverlay"));
        }

        document.getElementById("detailClose").addEventListener("click", function () {
          closeSheet(document.getElementById("detailOverlay"));
        });
        document.getElementById("detailOverlay").addEventListener("click", function (e) {
          if (e.target.id === "detailOverlay") closeSheet(document.getElementById("detailOverlay"));
        });

        document.getElementById("tabBar").querySelectorAll(".tabBtn").forEach(function (btn) {
          btn.addEventListener("click", function () {
            document.getElementById("tabBar").querySelectorAll(".tabBtn").forEach(function (b) {
              b.classList.remove("active");
            });
            btn.classList.add("active");
            currentTab = btn.getAttribute("data-tab");
            renderTab();
          });
        });

        function esc(s) {
          return String(s || "")
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;");
        }
        var params = new URLSearchParams(location.search);
        var tabParam = params.get("tab");
        if (tabParam === "notes" || tabParam === "sensory" || tabParam === "records" || tabParam === "beans" || tabParam === "recipes") {
          location.href = "notes.html" + (tabParam ? "?tab=" + tabParam : "");
          return;
        }
        else if (tabParam === "favorites") currentTab = "favorites";
        else if (tabParam === "history") currentTab = "history";
        else currentTab = "favorites";

        document.getElementById("tabBar").querySelectorAll(".tabBtn").forEach(function (b) {
          b.classList.toggle("active", b.getAttribute("data-tab") === currentTab);
        });

        renderTab();
      })();
    </script>
  </body>
</html>
