<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="manifest" href="/manifest.json">
<meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>레시피 등록 — 커피 노트</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css"/>
  <link rel="stylesheet" href="common.css"/>
  <link rel="stylesheet" href="app-shell.css">
  <link rel="stylesheet" href="feature-global-search.css">  <!-- ★ 추가 -->
</head>
<body>
  <div class="wrap">
    <header class="pageHeader">
      <button type="button" class="backBtn" id="btnBack" aria-label="뒤로가기">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      </button>
      <h1 class="title">레시피 등록</h1>
    </header>

    <div class="form-card card">
      <div class="formField">
        <label>레시피 제목 *</label>
        <input type="text" id="rTitle" required placeholder="예: 에티오피아 예가체프 V60 레시피"/>
      </div>
      <div class="formField">
        <label>원두 (선택)</label>
        <div style="display:flex;gap:8px">
          <input type="text" id="rCoffee" placeholder="원두 이름" style="flex:1"/>
          <button type="button" class="btn-secondary" id="btnSearchCoffee" style="width:auto;padding:10px 14px;font-size:13px;flex-shrink:0">검색</button>
        </div>
      </div>
      <div class="formField">
        <label>추출 도구 *</label>
        <div class="chipWrap" id="toolChips"></div>
      </div>
      <div class="formField"><label>물 온도</label><input type="text" id="rTemp" placeholder="예: 93°C"/></div>
      <div class="formField"><label>물 양 (총량)</label><input type="text" id="rWater" placeholder="예: 250ml"/></div>
      <div class="formField"><label>원두 양</label><input type="text" id="rDose" placeholder="예: 15g"/></div>
      <div class="formField"><label>그라인딩</label><input type="text" id="rGrind" placeholder="예: 코만단테 24클릭"/></div>

      <h2 class="section-heading">추출 단계</h2>
      <p class="step-desc">각 회차의 시간, 물 양, 팁을 입력하세요</p>
      <div id="pourSteps"></div>
      <button type="button" class="btn-secondary" id="btnAddStep" style="margin-top:8px;width:auto;padding:8px 16px;font-size:13px">+ 단계 추가</button>

      <div class="formField" style="margin-top:16px">
        <label>추출 메모</label>
        <textarea id="rNote" placeholder="전체적인 추출 팁이나 메모"></textarea>
      </div>

      <label style="display:flex;align-items:center;gap:10px;margin-top:20px;cursor:pointer;font-size:13px;color:var(--text-sub)">
        <input type="checkbox" id="rPublic" checked style="width:16px;height:16px;cursor:pointer">
        커뮤니티에 공개 (다른 사용자가 이 레시피를 볼 수 있습니다)
      </label>
      <button type="button" class="btn-primary" id="btnSave" style="margin-top:12px">레시피 저장</button>
    </div>
  </div>
  <div id="globalToast" class="toast"></div>
  <nav id="bottomNav" class="bottom-nav">
    <a href="home.html" class="nav-item" data-nav="home"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span class="nav-label">홈</span></a>
    <a href="index.html" class="nav-item" data-nav="search"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg><span class="nav-label">검색</span></a>
    <a href="notes.html" class="nav-item active" data-nav="notes"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg><span class="nav-label">노트</span></a>
    <a href="#" class="nav-item" data-nav="map" onclick="CoffeeNote.openCoffeeMap();return false"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg><span class="nav-label">커피맵</span></a>
    <a href="mypage.html" class="nav-item" data-nav="mypage"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span class="nav-label">마이</span></a>
  </nav>
  <script src="common.js"></script>
  <script src="supabase.js"></script>
  <script type="module" src="/src/ui/global-search.js"></script>
  <script type="module" src="/src/pages/recipe-register.js"></script>
</body>
</html>
