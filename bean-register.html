<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <link rel="manifest" href="/manifest.json">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>새 원두 등록 — 커피 노트</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
    <link rel="stylesheet" href="common.css" />
    <link rel="stylesheet" href="app-shell.css">
    <style>
      /* ── Step 전환 ────────────────────────────── */
      .step { display: none; }
      .step.active { display: block; }

      /* ── 안내 배너 ──────────────────────────────── */
      .guide-banner {
        background: #F7F5F2;
        border-left: 3px solid #8C7355;
        padding: 14px 16px;
        margin-bottom: 24px;
      }
      .guide-banner p { font-size: 13px; color: #5C3D1A; margin: 0; line-height: 1.6; }
      .guide-banner strong { display: block; margin-bottom: 4px; font-size: 12px; letter-spacing: .06em; color: #8C7355; }

      /* ── 텍스트 입력 ─────────────────────────────── */
      .bean-input-wrap { position: relative; margin-bottom: 20px; }
      .bean-input-wrap textarea {
        width: 100%; box-sizing: border-box;
        font-size: 16px; font-family: inherit; color: #121212;
        border: 1.5px solid #121212; background: #fff;
        padding: 14px 16px; resize: none; height: 80px;
        outline: none; border-radius: 0;
        line-height: 1.5;
      }
      .bean-input-wrap textarea::placeholder { color: #AAAAAA; }
      .bean-input-wrap textarea:focus { border-color: #8C7355; }

      /* ── 구분선 ──────────────────────────────────── */
      .or-divider {
        display: flex; align-items: center; gap: 12px;
        font-size: 11px; color: #AAAAAA; margin-bottom: 20px;
        letter-spacing: .08em;
      }
      .or-divider::before, .or-divider::after {
        content: ""; flex: 1; height: 0.5px; background: #E0E0E0;
      }

      /* ── 사진 스캔 버튼 ──────────────────────────── */
      .scan-btn {
        display: flex; align-items: center; justify-content: center; gap: 10px;
        width: 100%; padding: 14px; box-sizing: border-box;
        border: 1.5px solid #E0E0E0; background: #fff;
        font-size: 14px; font-family: inherit; color: #121212;
        cursor: pointer; margin-bottom: 32px;
      }
      .scan-btn:active { background: #F7F5F2; }

      /* ── 결과 확인 필드 ──────────────────────────── */
      .confirm-field {
        border-bottom: 0.5px solid #E0E0E0;
        padding: 14px 0;
        display: flex; align-items: flex-start; gap: 10px;
      }
      .confirm-field:first-child { border-top: 0.5px solid #E0E0E0; }
      .confirm-field-inner { flex: 1; min-width: 0; }
      .field-label {
        font-size: 11px; color: #888; letter-spacing: .06em;
        margin-bottom: 4px;
      }
      .field-value {
        font-size: 15px; color: #121212; font-weight: 500;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      }
      .field-value.placeholder { color: #BBBBBB; font-weight: 400; font-size: 14px; }
      .field-edit {
        width: 100%; font-size: 15px; font-family: inherit; color: #121212;
        border: none; border-bottom: 1.5px solid #8C7355;
        background: transparent; outline: none; padding: 2px 0;
        display: none;
      }
      .field-edit.visible { display: block; }
      .info-btn {
        flex-shrink: 0; background: none; border: none; cursor: pointer; padding: 0;
        color: #AAAAAA; line-height: 1; margin-top: 2px;
      }
      .info-btn:hover { color: #8C7355; }

      /* ── confidence 배지 ─────────────────────────── */
      .badge {
        display: inline-block; font-size: 10px; letter-spacing: .04em;
        padding: 2px 6px; margin-left: 6px; vertical-align: middle;
      }
      .badge-high   { background: #E8F5E9; color: #2E7D32; }
      .badge-medium { background: #FFF8E1; color: #E65100; }
      .badge-low    { background: #FAFAFA; color: #AAAAAA; border: 0.5px solid #E0E0E0; }

      /* ── 상태 메시지 ─────────────────────────────── */
      .ai-status {
        font-size: 13px; color: #888; text-align: center;
        padding: 24px 0; display: none;
      }
      .ai-status.visible { display: block; }

      /* ── 버튼 ────────────────────────────────────── */
      .btn-primary {
        width: 100%; padding: 16px; background: #121212; color: #fff;
        border: none; font-size: 15px; font-family: inherit;
        cursor: pointer; font-weight: 600; letter-spacing: .02em;
        margin-top: 24px;
      }
      .btn-primary:disabled { background: #E0E0E0; color: #AAAAAA; cursor: default; }
      .btn-secondary {
        width: 100%; padding: 14px; background: #fff; color: #121212;
        border: 1.5px solid #121212; font-size: 14px; font-family: inherit;
        cursor: pointer; font-weight: 500; margin-top: 12px;
      }

      /* ── 다음 진행 버튼 ──────────────────────────── */
      #btnNext {
        width: 100%; padding: 16px; background: #121212; color: #fff;
        border: none; font-size: 15px; font-family: inherit;
        cursor: pointer; font-weight: 600; letter-spacing: .02em;
      }
      #btnNext:disabled { background: #E0E0E0; color: #AAAAAA; cursor: default; }
    </style>
  </head>
  <body>
    <div class="wrap" style="padding-bottom: 100px;">

      <header class="pageHeader">
        <button type="button" class="backBtn" id="btnBack" aria-label="뒤로가기">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12" /><polyline points="12 19 5 12 12 5" />
          </svg>
        </button>
        <h1 class="title" id="pageTitle">새 원두 등록</h1>
      </header>

      <!-- ════ Step 1: 입력 ════ -->
      <div class="step active" id="step1">
        <div class="guide-banner">
          <strong>TIP</strong>
          <p>원두 이름은 보통 <b>국가 → 지역 → 농장 → 가공방식</b> 순서로 적혀 있어요.<br>
          예: <em>에티오피아 예가체프 콩가 내추럴</em></p>
        </div>

        <div class="bean-input-wrap">
          <textarea id="beanText" placeholder="원두 이름을 입력하세요&#10;예: 에티오피아 예가체프 콩가 워시드"></textarea>
        </div>

        <button id="btnNext" disabled>AI로 정보 파싱하기</button>

        <div class="or-divider" style="margin-top:24px">또는</div>

        <label class="scan-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          원두 봉지 사진으로 스캔
          <input type="file" id="scanInput" accept="image/*" style="display:none">
        </label>

        <p class="ai-status" id="aiStatus">AI가 원두 정보를 파악하고 있어요…</p>
      </div>

      <!-- ════ Step 2: AI 결과 확인 ════ -->
      <div class="step" id="step2">
        <div class="guide-banner" id="confidenceBanner">
          <strong id="bannerLabel">AI 파싱 결과</strong>
          <p id="bannerDesc">아래 정보를 확인하고 틀린 항목을 탭해서 수정하세요.</p>
        </div>

        <div id="confirmFields"></div>

        <button class="btn-primary" id="btnSave">등록하기</button>
        <button class="btn-secondary" id="btnBackToInput">다시 입력하기</button>
      </div>

    </div>

    <div id="globalToast" class="toast"></div>
